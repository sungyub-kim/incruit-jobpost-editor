  .pass { border-color: #22c55e; background: #0a2010; }

  .warn { border-color: #f59e0b; background: #201a0a; }
  .name { font-weight: bold; font-size: 15px; }
  .metric { color: #94a3b8; font-size: 12px; }
  .detail { color: #64748b; font-size: 12px; margin-top: 4px; white-space: pre-wrap; max-height: 200px; overflow: auto; }
  h2 { color: #60a5fa; border-bottom: 1px solid #333; padding-bottom: 6px; }
  .summary { font-size: 18px; padding: 16px; background: #16213e; border-radius: 8px; margin-bottom: 20px; }
  .lost { color: #ef4444; font-weight: bold; }
  .found { color: #22c55e; }
</style>
</head><body>
<h1>Rule Converter 한계 테스트</h1>
<div id="summary" class="summary"></div>
<div id="results"></div>

<script type="module">
import { convertByRules } from './js/services/ruleConverter.js';

const results = document.getElementById('results');
const summary = document.getElementById('summary');
let totalTests = 0, passed = 0, warned = 0, failed = 0;

function stripTags(html) {
  // 블록 요소 경계에 공백 삽입 (td/th/tr/p/div/li/h1~h6 닫는 태그 앞)
  const spaced = html.replace(/<\/(td|th|tr|div|p|li|h[1-6]|ul|ol|table)>/gi, ' </$1>');
  const d = document.createElement('div');
  d.innerHTML = spaced;
  return d.textContent.replace(/\s+/g, ' ').trim();
}

function runTest(name, input, checks) {
  totalTests++;
  const result = convertByRules(input, {});
  const outputText = stripTags(result.html);
  const inputText = stripTags(input);

  // 텍스트 보존율 계산
  const inputWords = [...new Set(inputText.split(/\s+/).filter(w => w.length > 1))];
  const preserved = inputWords.filter(w => outputText.includes(w));
  const preserveRate = inputWords.length ? Math.round(preserved.length / inputWords.length * 100) : 0;
  const lostWords = inputWords.filter(w => !outputText.includes(w));

  // 섹션 감지 확인
  const detectedSections = result.sections.filter(s => s.sectionDef).map(s => s.sectionDef.id);

  // 체크 실행
  let status = 'pass';
  const messages = [];

  if (checks.minPreserve && preserveRate < checks.minPreserve) {
    status = 'fail';
    messages.push(`텍스트 보존율 ${preserveRate}% < 목표 ${checks.minPreserve}%`);
  }
  if (checks.expectedSections) {
    const missing = checks.expectedSections.filter(s => !detectedSections.includes(s));
    if (missing.length > 0) {
      status = status === 'fail' ? 'fail' : 'warn';
      messages.push(`미감지 섹션: ${missing.join(', ')}`);
    }
  }
  if (checks.minConfidence && result.confidence < checks.minConfidence) {
    status = status === 'fail' ? 'fail' : 'warn';
    messages.push(`신뢰도 ${result.confidence} < 목표 ${checks.minConfidence}`);
  }
  if (checks.custom) {
    const customResult = checks.custom(result, outputText);
    if (customResult) {
      status = status === 'fail' ? 'fail' : customResult.status || 'warn';
      messages.push(customResult.msg);
    }
  }

  if (status === 'pass') passed++;
  else if (status === 'warn') warned++;
  else failed++;

  const div = document.createElement('div');
  div.className = `test ${status}`;
  div.innerHTML = `
    <div class="name">${status === 'pass' ? '✅' : status === 'warn' ? '⚠️' : '❌'} ${name}</div>
    <div class="metric">
      입력형식: ${result.inputType} · 섹션: ${detectedSections.length}개 · 신뢰도: ${result.confidence}% · 텍스트보존: ${preserveRate}%
      ${messages.length ? '<br>' + messages.map(m => `→ ${m}`).join('<br>') : ''}
    </div>
    ${lostWords.length > 0 ? `<div class="detail"><span class="lost">유실 단어 (${lostWords.length}):</span> ${lostWords.slice(0, 30).join(', ')}${lostWords.length > 30 ? '...' : ''}</div>` : ''}
    <div class="detail">감지: [${detectedSections.join(', ')}]</div>
    ${status !== 'pass' ? `<details><summary style="cursor:pointer;color:#60a5fa;font-size:12px;">출력 HTML 보기</summary><div class="detail" style="max-height:400px;border:1px solid #444;padding:8px;margin-top:4px;">${result.html.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div></details>` : ''}
  `;
  results.appendChild(div);
}

<tr><td>급여</td><td colspan="2">신입 초봉 3,800만원 (수습 3개월)</td></tr>
<tr><td>복리후생</td><td colspan="2">4대보험, 퇴직금, 경조사비, 자녀학자금, 사내식당</td></tr>
</table>
`, {
  minPreserve: 85,
  expectedSections: ['recruit_title', 'qualification', 'work_condition'],
  custom: (result, outputText) => {
    const hasYeongup = outputText.includes('영업직');
    const hasTech = outputText.includes('기술직');
    const hasSalary = outputText.includes('3,800만원');
    const hasBenefit = outputText.includes('자녀학자금');
    const missing = [];
    if (!hasYeongup) missing.push('영업직');
    if (!hasTech) missing.push('기술직');
    if (!hasSalary) missing.push('3,800만원');
    if (!hasBenefit) missing.push('자녀학자금');
    if (missing.length > 0) return { status: 'fail', msg: `테이블 셀 유실: ${missing.join(', ')}` };
    return null;
  }
});
