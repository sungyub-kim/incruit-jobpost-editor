<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이미지맵 생성기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <aside class="sidebar">
            <header>
                <div class="sidebar-header">
                    <h1>이미지맵 생성기</h1>
                    <button id="reset-btn" class="btn-reset" title="전체 초기화">↺ 초기화</button>
                </div>
            </header>
            <div class="controls">

                <!-- 1. 이미지 불러오기 -->
                <div class="control-group">
                    <label>1. 이미지 불러오기</label>
                    <!-- 파일 업로드 -->
                    <label class="file-upload-label" id="file-upload-label" for="image-input">
                        <span id="file-name-display">파일을 선택하세요</span>
                        <input type="file" id="image-input" accept="image/*">
                    </label>
                    <!-- URL 입력 -->
                    <div class="url-input-row">
                        <input type="text" id="image-url-input" placeholder="또는 이미지 URL 입력 후 Enter" spellcheck="false">
                        <button id="image-url-btn" class="btn-url-load">불러오기</button>
                    </div>
                    <p id="url-error" class="url-error" style="display:none;">이미지를 불러올 수 없습니다.</p>
                </div>

                <!-- 이미지 목록 -->
                <div class="control-group" id="slot-group" style="display:none;">
                    <div class="area-group-header">
                        <label>추가된 이미지 (<span id="slot-count">0</span>개)</label>
                    </div>
                    <div id="slot-list"></div>
                </div>

                <!-- 2. 출력 형식 -->
                <div class="control-group">
                    <label>2. 출력 형식</label>
                    <div class="output-mode-toggle">
                        <label><input type="radio" name="output-mode" value="imagemap" checked> 이미지맵 (&lt;map&gt;)</label>
                        <label><input type="radio" name="output-mode" value="intro"> 인트로 (absolute 링크)</label>
                    </div>
                </div>

                <!-- 3. 맵 이름 -->
                <div class="control-group" id="map-name-group">
                    <label>3. 맵 이름</label>
                    <input type="text" id="map-name" value="map1" placeholder="예: banner_map">
                </div>

                <!-- 4. 기본 링크 타겟 -->
                <div class="control-group">
                    <label>4. 기본 링크 타겟</label>
                    <select id="default-target">
                        <option value="_blank">새 탭 (_blank)</option>
                        <option value="_self">현재 탭 (_self)</option>
                    </select>
                </div>

                <!-- 5. 외부 반출 여부 -->
                <div class="control-group">
                    <label class="export-check-label">
                        <input type="checkbox" id="export-external">
                        <span>외부 반출</span>
                    </label>
                    <p class="export-hint">체크 시 저작권 이미지 노출 (display:block)</p>
                </div>

                <!-- OCR 텍스트 추출 (인트로 모드 전용) -->
                <div class="control-group" id="ocr-group" style="display:none;">
                    <label>6. 숨김 텍스트 (OCR)</label>
                    <button id="ocr-btn" class="btn-ocr">이미지에서 텍스트 추출</button>
                    <textarea id="ocr-text" class="ocr-textarea" rows="4" placeholder="추출된 텍스트가 여기에 표시됩니다. 직접 편집도 가능합니다."></textarea>
                    <p class="export-hint">display:none으로 HTML에 포함됩니다</p>
                </div>

                <!-- 5. 영역 목록 -->
                <div class="control-group" id="area-group">
                    <div class="area-group-header">
                        <label>5. 영역 목록 (<span id="area-count">0</span>개)</label>
                        <button id="undo-btn" class="btn-undo" disabled title="마지막 영역 취소">↩ 취소</button>
                    </div>
                    <div id="area-list">
                        <p class="area-empty">이미지 위에서 드래그하여<br>클릭 영역을 추가하세요</p>
                    </div>
                </div>


            </div>
        </aside>

        <main class="content">
            <!-- 이미지 편집 영역 -->
            <section class="canvas-section">
                <header>
                    <h2>이미지 편집</h2>
                    <span id="canvas-hint" class="hint">이미지를 업로드하면 드래그로 영역을 그릴 수 있습니다</span>
                </header>
                <div id="canvas-container" class="canvas-container">
                    <!-- 드롭존 (이미지 미업로드 시) -->
                    <div id="drop-zone" class="drop-zone">
                        <div class="drop-icon">🖼️</div>
                        <p>이미지를 드래그하거나 클릭하여 업로드</p>
                        <label for="image-input" class="btn-primary" style="cursor:pointer; display:inline-block;">이미지 선택</label>
                    </div>
                    <!-- 이미지 + 오버레이 (업로드 후) -->
                    <div id="img-wrapper" class="img-wrapper" style="display:none;">
                        <img id="preview-img" src="" alt="" draggable="false">
                        <div id="overlay" class="overlay"></div>
                    </div>
                </div>
            </section>

            <!-- 코드 출력 -->
            <section class="code-section">
                <header>
                    <h2>생성된 HTML 코드</h2>
                    <div class="code-actions">
                        <button id="copy-btn" class="btn-primary">코드 복사</button>
                        <button id="download-btn" class="btn-secondary-dl">HTML 다운로드</button>
                    </div>
                </header>
                <pre><code id="code-display"><!-- 이미지를 업로드하고 영역을 그리면 코드가 자동 생성됩니다 --></code></pre>
            </section>
        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
