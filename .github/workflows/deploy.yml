name: Deploy to Cloudflare Pages

# Cloudflare account: kslee@incruit.com
# Required secrets:
#   - CLOUDFLARE_API_TOKEN
#   - CLOUDFLARE_ACCOUNT_ID

on:
  workflow_dispatch:        # ✅ 수동 트리거
    inputs:
      reason:
        description: '배포 사유 (선택)'
        required: false
        default: '수동 배포'
  # push:                   # ← 자동 배포가 필요하면 주석 해제
  #   branches:
  #     - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: incruit-jobpost-editor
          directory: .
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main

      - name: Deployment summary
        if: success()
        run: |
          echo "════════════════════════════════════════════════"
          echo "✅ Cloudflare Pages 배포 완료!"
          echo "════════════════════════════════════════════════"
          echo "🌐 Project: incruit-jobpost-editor"
          echo "💬 사유: ${{ github.event.inputs.reason }}"
          echo "🕐 Time: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo "════════════════════════════════════════════════"