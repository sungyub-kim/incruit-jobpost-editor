<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fair Page Builder | 인크루트 박람회 빌더</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            panel: { bg: '#1e2433', border: '#2e3a52', header: '#161c2d' },
            accent: { DEFAULT: '#0066cc', hover: '#0052a3' }
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; }
    body { display: flex; flex-direction: column; background: #111827; color: #e5e7eb; }

    /* 상단 바 */
    #top-bar { height: 52px; min-height: 52px; background: #161c2d; border-bottom: 1px solid #2e3a52; display: flex; align-items: center; padding: 0 16px; gap: 12px; z-index: 10; }
    #top-bar .brand { font-size: 14px; font-weight: 700; color: #60a5fa; white-space: nowrap; }
    #top-bar .divider { width: 1px; height: 20px; background: #2e3a52; }
    #top-bar input[type=text] { background: #1e2433; border: 1px solid #2e3a52; border-radius: 6px; color: #e5e7eb; font-size: 13px; padding: 5px 10px; width: 180px; outline: none; }
    #top-bar input[type=text]:focus { border-color: #0066cc; }
    #top-bar #ver-badge { font-size: 11px; color: #6b7280; background: #0d1117; padding: 2px 8px; border-radius: 4px; white-space: nowrap; border: 1px solid #2e3a52; }
    #top-bar .spacer { flex: 1; }
    #top-bar .btn { font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer; transition: background .15s; }
    #top-bar .btn-outline { background: transparent; border: 1px solid #2e3a52; color: #9ca3af; }
    #top-bar .btn-outline:hover { border-color: #60a5fa; color: #60a5fa; }
    #top-bar .btn-primary { background: #0066cc; color: #fff; }
    #top-bar .btn-primary:hover { background: #0052a3; }

    /* 메인 영역 */
    #main-area { display: flex; flex: 1; overflow: hidden; }

    /* 좌측 패널 */
    #left-panel { width: 280px; min-width: 280px; background: #1e2433; border-right: 1px solid #2e3a52; display: flex; flex-direction: column; overflow: hidden; }
    #left-panel .panel-tab { display: flex; border-bottom: 1px solid #2e3a52; }
    #left-panel .panel-tab button { flex: 1; padding: 10px 0; font-size: 12px; font-weight: 600; color: #6b7280; background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; }
    #left-panel .panel-tab button.active { color: #60a5fa; border-bottom-color: #0066cc; }
    #left-panel .panel-body { flex: 1; overflow-y: auto; padding: 12px; }
    #left-panel .panel-body::-webkit-scrollbar { width: 4px; }
    #left-panel .panel-body::-webkit-scrollbar-thumb { background: #2e3a52; border-radius: 4px; }

    /* 섹션 항목 */
    .section-item { background: #161c2d; border: 1px solid #2e3a52; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; cursor: grab; user-select: none; transition: border-color .15s; }
    .section-item:hover { border-color: #3b4f6e; }
    .section-item.dragging { opacity: .5; }
    .section-item.drag-over { border-color: #0066cc; background: #1a2a45; }
    .section-item .drag-handle { color: #4b5563; font-size: 14px; cursor: grab; }
    .section-item .section-name { flex: 1; font-size: 13px; color: #d1d5db; }
    .section-item .section-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #1f3a5f; color: #60a5fa; }
    .section-item .section-badge.fixed { background: #1f2937; color: #6b7280; }
    /* 섹션 배경 색상 스와치 */
    .section-bg-swatch { width: 18px; height: 18px; border-radius: 3px; border: 1px solid #374151; position: relative; overflow: hidden; cursor: pointer; flex-shrink: 0; background: repeating-conic-gradient(#374151 0% 25%, #1e2433 0% 50%) 0 0 / 8px 8px; }
    .section-bg-swatch.has-color { background: var(--swatch-bg, #fff); }
    .section-bg-swatch input[type=color] { position: absolute; inset: -4px; width: calc(100% + 8px); height: calc(100% + 8px); opacity: 0; cursor: pointer; }
    #top-bar .btn-danger { background: transparent; border: 1px solid #ef4444; color: #ef4444; }
    #top-bar .btn-danger:hover { background: #ef4444; color: #fff; }
    #top-bar .btn-zip { background: #059669; color: #fff; }
    #top-bar .btn-zip:hover { background: #047857; }

    /* 토글 스위치 */
    .toggle-wrap { display: flex; align-items: center; }
    .toggle { position: relative; width: 34px; height: 18px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: #374151; border-radius: 18px; cursor: pointer; transition: .2s; }
    .toggle-slider:before { content: ''; position: absolute; width: 12px; height: 12px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .2s; }
    .toggle input:checked + .toggle-slider { background: #0066cc; }
    .toggle input:checked + .toggle-slider:before { transform: translateX(16px); }

    /* 색상 탭 */
    .color-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #232f45; }
    .color-item:last-child { border-bottom: none; }
    .color-item label { font-size: 12px; color: #9ca3af; flex: 1; }
    .color-item .color-preview { width: 24px; height: 24px; border-radius: 4px; border: 1px solid #2e3a52; cursor: pointer; position: relative; overflow: hidden; }
    .color-item .color-preview input[type=color] { position: absolute; inset: -4px; width: calc(100% + 8px); height: calc(100% + 8px); opacity: 0; cursor: pointer; }
    .color-item .hex-input { background: #161c2d; border: 1px solid #2e3a52; border-radius: 4px; color: #e5e7eb; font-size: 11px; padding: 3px 6px; width: 72px; outline: none; font-family: monospace; }
    .color-item .hex-input:focus { border-color: #0066cc; }

    /* 우측 미리보기 */
    #preview-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #preview-toolbar { height: 36px; background: #161c2d; border-bottom: 1px solid #2e3a52; display: flex; align-items: center; padding: 0 12px; gap: 8px; }
    #preview-toolbar span { font-size: 11px; color: #6b7280; }
    #preview-toolbar .preview-url { font-size: 11px; color: #4b5563; background: #0d1117; padding: 3px 8px; border-radius: 4px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #preview-toolbar .device-btn { font-size: 11px; padding: 3px 8px; border-radius: 4px; border: 1px solid #2e3a52; background: none; color: #6b7280; cursor: pointer; flex-shrink: 0; }
    #preview-toolbar .device-btn.active { border-color: #0066cc; color: #60a5fa; }
    #preview-frame-wrap { flex: 1; overflow: hidden; display: flex; justify-content: center; align-items: flex-start; background: #0d1117; padding: 0; }
    #preview-frame { width: 100%; height: 100%; border: none; background: #fff; transition: width .3s; }
    #preview-frame-wrap.tablet #preview-frame { width: 768px; }
    #preview-frame-wrap.mobile #preview-frame { width: 375px; }

    /* 패널 섹션 헤더 */
    .p-section-header { font-size: 11px; font-weight: 700; color: #4b5563; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid #2e3a52; }

    /* 로고 설정 */
    .logo-input-wrap { background: #161c2d; border: 1px solid #2e3a52; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
    .logo-input-wrap label { font-size: 11px; color: #6b7280; display: block; margin-bottom: 4px; }
    .logo-input-wrap input { width: 100%; background: #1e2433; border: 1px solid #2e3a52; border-radius: 4px; color: #e5e7eb; font-size: 12px; padding: 5px 8px; outline: none; }
    .logo-input-wrap input:focus { border-color: #0066cc; }

    /* 탭 패널 컨텐츠 */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* 섹션 편집 버튼 */
    .ep-edit-btn { font-size: 11px; padding: 2px 7px; border-radius: 4px; border: 1px solid #2e3a52; background: none; color: #6b7280; cursor: pointer; flex-shrink: 0; line-height: 1.4; }
    .ep-edit-btn:hover { border-color: #60a5fa; color: #60a5fa; }
    .ep-edit-btn.active { border-color: #0066cc; color: #60a5fa; background: #1a2a45; }

    /* 섹션 편집 패널 */
    .section-edit-panel { background: #111827; border: 1px solid #2e3a52; border-top: none; border-radius: 0 0 8px 8px; margin-top: -4px; margin-bottom: 8px; padding: 12px; }
    .ep-title { font-size: 10px; font-weight: 700; color: #4b5563; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }
    .ep-btn-card { background: #1e2433; border: 1px solid #2e3a52; border-radius: 6px; padding: 10px; margin-bottom: 8px; }
    .ep-btn-card:last-child { margin-bottom: 0; }
    .ep-btn-header { font-size: 12px; font-weight: 700; color: #60a5fa; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid #2e3a52; }
    .ep-field { margin-bottom: 6px; }
    .ep-field label { display: block; font-size: 11px; color: #6b7280; margin-bottom: 3px; }
    .ep-field input[type=text] { width: 100%; background: #161c2d; border: 1px solid #2e3a52; border-radius: 4px; color: #e5e7eb; font-size: 12px; padding: 4px 7px; outline: none; box-sizing: border-box; }
    .ep-field input[type=text]:focus { border-color: #0066cc; }
    .ep-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .ep-row > label:first-child { flex: 1; font-size: 11px; color: #6b7280; margin-bottom: 0; }
    .ep-color-wrap { display: flex; align-items: center; gap: 6px; }
    .ep-color-preview { width: 22px; height: 22px; border-radius: 3px; border: 1px solid #374151; position: relative; overflow: hidden; cursor: pointer; flex-shrink: 0; }
    .ep-color-preview input[type=color] { position: absolute; inset: -4px; width: calc(100% + 8px); height: calc(100% + 8px); opacity: 0; cursor: pointer; }
    .ep-hex { background: #161c2d !important; border: 1px solid #2e3a52 !important; border-radius: 4px; color: #e5e7eb !important; font-size: 11px; padding: 2px 6px !important; width: 72px !important; outline: none; font-family: monospace; }
    .ep-hex:focus { border-color: #0066cc !important; }
    .ep-hint { font-size: 10px; color: #4b5563; white-space: nowrap; }
    .ep-hover-sub { padding-left: 10px; border-left: 2px solid #2e3a52; margin-top: 6px; }
    .ep-textarea { width: 100%; background: #161c2d; border: 1px solid #2e3a52; border-radius: 4px; color: #e5e7eb; font-size: 12px; padding: 4px 7px; resize: vertical; outline: none; box-sizing: border-box; min-height: 76px; }
    .ep-textarea:focus { border-color: #0066cc; }
    .ep-repeater-label { font-size: 10px; font-weight: 700; color: #4b5563; text-transform: uppercase; letter-spacing: .05em; margin: 10px 0 4px 0; }

    /* 버튼 설정 패널 */
    #btn-settings-panel .bsp-input { width: 100%; background: #0d1117; border: 1px solid #2e3a52; border-radius: 4px; color: #e5e7eb; font-size: 12px; padding: 4px 8px; outline: none; box-sizing: border-box; }
    #btn-settings-panel .bsp-input:focus { border-color: #0066cc; }

    /* 포맷팅 툴바 (편집 모드 전용) */
    #format-toolbar { display:none; height:36px; min-height:36px; background:#1a2035; border-bottom:1px solid #2e3a52; align-items:center; padding:0 10px; gap:4px; flex-shrink:0; }
    #format-toolbar.show { display:flex; }
    .fmt-btn { height:26px; min-width:28px; padding:0 8px; background:none; border:1px solid transparent; border-radius:4px; color:#9ca3af; cursor:pointer; font-size:12px; font-weight:700; transition:all .12s; flex-shrink:0; line-height:26px; }
    .fmt-btn:hover { background:#2e3a52; color:#e5e7eb; border-color:#2e3a52; }
    .fmt-btn.active { background:rgba(0,102,204,.15); color:#60a5fa; border-color:#0066cc; }
    .fmt-divider { width:1px; height:18px; background:#2e3a52; margin:0 4px; flex-shrink:0; }
    .fmt-label { font-size:10px; color:#4b5563; white-space:nowrap; margin-right:4px; }
    .fmt-select { background:#0d1117; border:1px solid #2e3a52; border-radius:4px; color:#e5e7eb; font-size:11px; padding:2px 4px; height:26px; cursor:pointer; outline:none; max-width:110px; }
    .fmt-select:focus { border-color:#0066cc; }
    .fmt-input-num { background:#0d1117; border:1px solid #2e3a52; border-radius:4px; color:#e5e7eb; font-size:11px; padding:2px 4px; height:26px; width:46px; text-align:center; outline:none; }
    .fmt-input-num:focus { border-color:#0066cc; }
    .fmt-unit { font-size:10px; color:#4b5563; }
    .fmt-color-wrap { display:flex; flex-direction:column; align-items:center; position:relative; cursor:pointer; width:26px; height:26px; border:1px solid #2e3a52; border-radius:4px; overflow:visible; justify-content:center; }
    .fmt-color-wrap:hover { border-color:#60a5fa; }
    .fmt-color-wrap input[type=color] { position:absolute; opacity:0; width:100%; height:100%; cursor:pointer; inset:0; }
    .fmt-color-label { font-size:10px; font-weight:700; color:#e5e7eb; line-height:1; pointer-events:none; }
    .fmt-color-bar { width:18px; height:3px; border-radius:1px; margin-top:1px; pointer-events:none; }

    /* E3: 섹션 ▲▼ 이동 버튼 */
    .sec-move-btn { background: none; border: 1px solid #2e3a52; border-radius: 3px; color: #4b5563; font-size: 10px; width: 16px; height: 16px; cursor: pointer; line-height: 14px; text-align: center; padding: 0; flex-shrink: 0; }
    .sec-move-btn:hover:not(:disabled) { border-color: #60a5fa; color: #60a5fa; }
    .sec-move-btn:disabled { opacity: .2; cursor: default; }
    .sec-move-group { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }

    /* E4: 섹션 이름 클릭 → 스크롤 */
    .section-name { cursor: pointer; }
    .section-name:hover { color: #60a5fa !important; }

    /* E1/E2: 미니 모달 */
    #mini-modal { display: none; position: fixed; inset: 0; z-index: 9500; background: rgba(0,0,0,.55); align-items: center; justify-content: center; }
    #mini-modal.open { display: flex; }
    #mini-modal-box { background: #1e2433; border: 1px solid #2e3a52; border-radius: 10px; padding: 20px; width: 380px; box-shadow: 0 16px 48px rgba(0,0,0,.6); }
    #mini-modal-box h4 { font-size: 13px; font-weight: 700; color: #e5e7eb; margin: 0 0 14px 0; }
    #mini-modal-box .mm-label { font-size: 11px; color: #6b7280; display: block; margin-bottom: 4px; }
    #mini-modal-box input[type=text] { width: 100%; background: #161c2d; border: 1px solid #2e3a52; border-radius: 4px; color: #e5e7eb; font-size: 12px; padding: 5px 8px; outline: none; box-sizing: border-box; }
    #mini-modal-box input[type=text]:focus { border-color: #0066cc; }
    #mini-modal-box .mm-sep { text-align: center; font-size: 11px; color: #4b5563; margin: 10px 0; }
    #mini-modal-box .mm-upload-btn { background: #2e3a52; color: #d1d5db; border: 1px solid #374151; padding: 5px 12px; border-radius: 4px; font-size: 11px; cursor: pointer; display: inline-block; }
    #mini-modal-box .mm-preview { width: 100%; max-height: 100px; object-fit: contain; margin-top: 10px; border-radius: 4px; border: 1px solid #2e3a52; display: none; }
    #mini-modal-box .mm-hint { font-size: 10px; color: #4b5563; margin-top: 6px; }
    #mini-modal-box .mm-actions { display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end; }
    #mini-modal-box .mm-btn { font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer; }
    #mini-modal-box .mm-cancel { background: #374151; color: #9ca3af; }
    #mini-modal-box .mm-apply { background: #0066cc; color: #fff; }


    /* 패치노트 버튼 */
    #top-bar .btn-patch { background: transparent; border: 1px solid #2e3a52; color: #6b7280; font-size: 11px; padding: 3px 9px; }
    #top-bar .btn-patch:hover { border-color: #60a5fa; color: #60a5fa; }

    /* ST1: 여백 편집 패널 */
    .ep-spacing-group { margin-top: 12px; border-top: 1px solid #2e3a52; padding-top: 10px; }
    .ep-spacing-title { font-size: 11px; font-weight: 600; color: #9ca3af; margin-bottom: 6px; }
    .ep-spacing-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
    .ep-spacing-label { font-size: 10px; color: #6b7280; width: 42px; flex-shrink: 0; }
    .ep-spacing-item { display: flex; align-items: center; gap: 3px; font-size: 10px; color: #6b7280; flex: 1; }
    .ep-spacing-item input { width: 100%; background: #1e293b; border: 1px solid #2e3a52; border-radius: 4px; color: #e2e8f0; font-size: 11px; padding: 3px 5px; }
    .ep-spacing-item input:focus { border-color: #3b82f6; outline: none; }

    /* 편집 모드 버튼 & 뱃지 */
    #edit-mode-btn { font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 4px; border: 1px solid #2e3a52; background: none; color: #9ca3af; cursor: pointer; transition: all .15s; flex-shrink: 0; }
    #edit-mode-btn:hover { border-color: #f59e0b; color: #f59e0b; }
    #edit-mode-btn.active { background: #f59e0b; border-color: #f59e0b; color: #000; }
    #edit-mode-badge { display: none; font-size: 10px; font-weight: 700; color: #f59e0b; background: rgba(245,158,11,.12); border: 1px solid rgba(245,158,11,.3); border-radius: 4px; padding: 2px 7px; white-space: nowrap; }
    #edit-mode-badge.show { display: inline-block; }

    /* 패치노트 오버레이 */
    #patch-overlay { display: none; position: fixed; inset: 0; z-index: 9000; background: rgba(0,0,0,.55); align-items: flex-start; justify-content: flex-end; padding: 62px 16px 0 0; }
    #patch-overlay.open { display: flex; }
    #patch-modal { width: 360px; max-height: calc(100vh - 80px); background: #1e2433; border: 1px solid #2e3a52; border-radius: 10px; display: flex; flex-direction: column; box-shadow: 0 16px 48px rgba(0,0,0,.6); overflow: hidden; }
    #patch-modal .pm-head { display: flex; align-items: center; padding: 14px 16px; border-bottom: 1px solid #2e3a52; }
    #patch-modal .pm-head h3 { flex: 1; font-size: 13px; font-weight: 700; color: #e5e7eb; margin: 0; }
    #patch-modal .pm-head .pm-close { background: none; border: none; color: #6b7280; font-size: 18px; cursor: pointer; line-height: 1; padding: 0 2px; }
    #patch-modal .pm-head .pm-close:hover { color: #e5e7eb; }
    #patch-modal .pm-body { overflow-y: auto; flex: 1; padding: 8px 0; }
    #patch-modal .pm-body::-webkit-scrollbar { width: 4px; }
    #patch-modal .pm-body::-webkit-scrollbar-thumb { background: #2e3a52; border-radius: 4px; }
    .pn-item { border-bottom: 1px solid #232f45; }
    .pn-item:last-child { border-bottom: none; }
    .pn-date-btn { width: 100%; background: none; border: none; display: flex; align-items: center; padding: 11px 16px; cursor: pointer; gap: 8px; text-align: left; }
    .pn-date-btn:hover { background: #232f45; }
    .pn-date-btn .pn-date { font-size: 13px; font-weight: 600; color: #d1d5db; flex: 1; }
    .pn-date-btn .pn-arrow { font-size: 10px; color: #4b5563; transition: transform .2s; }
    .pn-item.open .pn-date-btn .pn-arrow { transform: rotate(90deg); }
    .pn-item.open .pn-date-btn .pn-date { color: #60a5fa; }
    .pn-content { display: none; padding: 0 16px 12px 16px; }
    .pn-item.open .pn-content { display: block; }
    .pn-content ul { margin: 0; padding: 0 0 0 16px; }
    .pn-content ul li { font-size: 12px; color: #9ca3af; line-height: 1.7; }
    .pn-content ul li strong { color: #60a5fa; font-weight: 600; }
  </style>
</head>
<body>

<!-- 비밀번호 게이트 -->
<div id="password-gate" style="display:none;position:fixed;inset:0;z-index:9999;background:#111827;display:flex;align-items:center;justify-content:center;">
  <div style="background:#1f2937;border-radius:12px;padding:40px;width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5);">
    <h2 style="color:#f9fafb;font-size:18px;font-weight:700;margin-bottom:6px;">Fair Page Builder</h2>
    <p style="color:#9ca3af;font-size:13px;margin-bottom:24px;">사내 전용 서비스입니다. 비밀번호를 입력하세요.</p>
    <input id="pw-input" type="password" placeholder="비밀번호" style="width:100%;padding:10px 14px;border-radius:8px;border:1px solid #374151;background:#111827;color:#f9fafb;font-size:14px;margin-bottom:12px;box-sizing:border-box;" onkeydown="if(event.key==='Enter')checkPassword()">
    <div id="pw-error" style="color:#ef4444;font-size:12px;margin-bottom:10px;display:none;">비밀번호가 올바르지 않습니다.</div>

<script>
var STATE_KEY = 'fair_builder_state_v1';

/* ── 상태 초기값 ── */

var sectionEnabled = {};
var sectionBgColors = {};
var sectionSpacing = {};  /* ST1: { sId: { pt, pb, mpt, mpb } } */

var navLinks    = [];  /* S2: 네비게이션 링크 [{text,href}] */

/* ── 섹션 DOM 매핑 테이블 ── */

    photo_alt: { sel: '.greetings-photo span img',   prop: 'alt' },
    position:  { sel: '.greetings-photo ins em',     prop: 'textContent' },
    name:      { sel: '.greetings-photo ins strong', prop: 'textContent' },
    body:      { sel: '.greetings-cont p',           prop: 'innerHTML' },
  },
  section_intro_links: {
    sec_title: { sel: 'p.sec_tit.basic', prop: 'textContent' },

  },
  section_joblist: {
    sec_title: { sel: 'p.sec_tit.basic', prop: 'textContent' },
    tabs: { _repeater: true, container: 'label.tab_item', fields: {
      name: { sel: null, prop: 'textContent' },
    }}
  },
  section_success: {
    sec_title: { sel: 'p.sec_tit.basic', prop: 'textContent' },
    items: { _repeater: true, container: '.success-link-view', fields: {
      title:   { sel: '.link-view-t strong', prop: 'innerHTML' },
      sub:     { sel: '.link-view-q',        prop: 'textContent' },
      img_src: { sel: '.l-viewImg img',      prop: 'src' },
      href:    { sel: null,                  prop: 'href' },
    }}
  },
  section_organizations: {
    sec_title: { sel: 'h3.sec_tit.basic', prop: 'textContent' },
    items: { _repeater: true, container: '.fair-introduce ul li', fields: {
      href:    { sel: 'a',                prop: 'href' },
      img_src: { sel: 'img',             prop: 'src' },
      img_alt: { sel: 'img',             prop: 'alt' },
      name:    { sel: '.items__title',    prop: 'textContent' },
      desc:    { sel: '.items__subTitle', prop: 'innerHTML', multi: true },
    }}
  },
  section_videos: { sec_title: { sel: 'p.sec_tit.basic', prop: 'textContent' } },
  section_notice: { sec_title: { sel: 'p.sec_tit.basic', prop: 'textContent' } },
};

var buttonStyles = {
  section_gradient: [
    { text: '취업특강 사전신청',             href: 'https://naver.me/GT6ePxU3',  width: '39.683%', bgColor: '#f46d80', shadowEnabled: true, shadowColor: '#D94E62', hoverEnabled: true, hoverBgColor: '#f78797', hoverShadowColor: '#bd3d50' },
    { text: '이력서·자기소개서 첨삭 사전신청', href: 'https://naver.me/Gq9NKkAu', width: '39.683%', bgColor: '#c91be5', shadowEnabled: true, shadowColor: '#A612BE', hoverEnabled: true, hoverBgColor: '#de33fa', hoverShadowColor: '#910ca5' }
  ]
};

FAIR_BUILDER_DEFAULT_ORDER.forEach(function(id) {
  sectionEnabled[id]  = FAIR_BUILDER_SCHEMA[id].enabled !== false;
  sectionBgColors[id] = '';
  sectionSpacing[id]  = { pt:'', pb:'', mpt:'', mpb:'' };
});
Object.keys(FAIR_BUILDER_COLORS).forEach(function(v) {
  cssColors[v] = FAIR_BUILDER_COLORS[v].default;
});

/* ── localStorage 저장/복원 ── */
function saveState() {
  localStorage.setItem(STATE_KEY, JSON.stringify({
    fairCode:       document.getElementById('fair-code').value,
    logoHref:       document.getElementById('logo-href').value,
    logoTitle:      document.getElementById('logo-title').value,
    sectionOrder:   sectionOrder,
    sectionEnabled: sectionEnabled,
    sectionBgColors:sectionBgColors,
    sectionSpacing: sectionSpacing,
    cssColors:      cssColors,
    buttonStyles:   buttonStyles,
    sectionData:    sectionData,
    posterConfig:   posterConfig,
    navLinks:       navLinks,
    joblistTabs:    joblistTabs
  }));
}

function loadState() {
  var raw = localStorage.getItem(STATE_KEY);
  if (!raw) return;
  try {
    var s = JSON.parse(raw);
    if (s.fairCode)  document.getElementById('fair-code').value  = s.fairCode;
    if (s.logoHref)  document.getElementById('logo-href').value  = s.logoHref;
    if (s.logoTitle) document.getElementById('logo-title').value = s.logoTitle;
    if (s.sectionOrder) {
      sectionOrder = s.sectionOrder;
      FAIR_BUILDER_DEFAULT_ORDER.forEach(function(id) {
        if (sectionOrder.indexOf(id) === -1) sectionOrder.push(id);
      });
    }
    if (s.sectionEnabled) {
      sectionEnabled = s.sectionEnabled;
      FAIR_BUILDER_DEFAULT_ORDER.forEach(function(id) {
        if (sectionEnabled[id] === undefined)
          sectionEnabled[id] = FAIR_BUILDER_SCHEMA[id].enabled !== false;
      });
    }
    if (s.sectionBgColors) {
      sectionBgColors = s.sectionBgColors;
      FAIR_BUILDER_DEFAULT_ORDER.forEach(function(id) {
        if (sectionBgColors[id] === undefined) sectionBgColors[id] = '';
      });
    }
    if (s.sectionSpacing) {
      sectionSpacing = s.sectionSpacing;
      FAIR_BUILDER_DEFAULT_ORDER.forEach(function(id) {
        if (!sectionSpacing[id]) sectionSpacing[id] = { pt:'', pb:'', mpt:'', mpb:'' };
      });
    }
    if (s.cssColors) {
      cssColors = s.cssColors;
      Object.keys(FAIR_BUILDER_COLORS).forEach(function(v) {
        if (cssColors[v] === undefined) cssColors[v] = FAIR_BUILDER_COLORS[v].default;
      });
    }
    if (s.buttonStyles)  buttonStyles  = s.buttonStyles;
    if (s.sectionData)   sectionData   = s.sectionData;
    if (s.posterConfig)  posterConfig  = s.posterConfig;
    if (s.navLinks)      navLinks      = s.navLinks;
    if (s.joblistTabs)   joblistTabs   = s.joblistTabs;
  } catch(e) {}
}

/* ── S2: 네비게이션 편집 ── */
function readNavFromPreview() {
  var doc = getPreviewDoc();
  if (!doc) return;
  var links = doc.querySelectorAll('.nav > li > a.links');
  if (!links.length) return;
  navLinks = [];
  links.forEach(function(a) {
    navLinks.push({ text: a.textContent.trim(), href: a.getAttribute('href') || '' });
  });
}

function renderNavPanel() {
  var el = document.getElementById('nav-link-list');
  if (!el) return;
  if (!navLinks.length) { el.innerHTML = '<div style="font-size:11px;color:#4b5563;padding:4px 0;">미리보기 로드 후 표시됩니다.</div>'; return; }
  el.innerHTML = navLinks.map(function(link, i) {
    return '<div class="logo-input-wrap" style="padding:6px 8px;">' +
      '<label>링크 ' + (i+1) + ' — 텍스트</label>' +
      '<input type="text" value="' + esc(link.text) + '" oninput="updateNavLink(' + i + ',\'text\',this.value)">' +
      '<label style="margin-top:4px;">href</label>' +
      '<input type="text" value="' + esc(link.href) + '" oninput="updateNavLink(' + i + ',\'href\',this.value)">' +
      '</div>';
  }).join('');
}

function updateNavLink(i, key, val) {
  if (!navLinks[i]) return;
  navLinks[i][key] = val;
  applyNavToPreview();
  saveState();
}

function applyNavToPreview() {
  var doc = getPreviewDoc();
  if (!doc || !navLinks.length) return;
  var pcLinks = doc.querySelectorAll('.nav > li > a.links');
  var mbLinks = doc.querySelectorAll('#sitemap > ul > li > a.links');
  navLinks.forEach(function(link, i) {
    if (pcLinks[i]) { pcLinks[i].textContent = link.text; pcLinks[i].setAttribute('href', link.href); }
    if (mbLinks[i]) { mbLinks[i].textContent = link.text; mbLinks[i].setAttribute('href', link.href); }
  });
}

/* ── S1: 채용공고 탭 편집 ── */
function readTabsFromPreview() {
  var doc = getPreviewDoc();
  if (!doc) return;
  var labels = doc.querySelectorAll('[data-builder-section="section_joblist"] label.tab_item');
  if (!labels.length) return;
  joblistTabs = [];
  labels.forEach(function(label) {
    joblistTabs.push({ name: label.textContent.trim() });
  });
}

function renderTabPanel() {
  var el = document.getElementById('joblist-tab-list');
  if (!el) return;
  if (!joblistTabs.length) { el.innerHTML = '<div style="font-size:11px;color:#4b5563;padding:4px 0;">미리보기 로드 후 표시됩니다.</div>'; return; }
  el.innerHTML = joblistTabs.map(function(tab, i) {
    return '<div class="logo-input-wrap" style="padding:6px 8px;">' +
      '<label>탭 ' + (i+1) + '</label>' +
      '<input type="text" value="' + esc(tab.name) + '" oninput="updateJoblistTab(' + i + ',this.value)">' +
      '</div>';
  }).join('');
}

function updateJoblistTab(i, val) {
  if (!joblistTabs[i]) return;
  joblistTabs[i].name = val;
  applyTabsToPreview();
  saveState();
}

function applyTabsToPreview() {
  var doc = getPreviewDoc();
  if (!doc || !joblistTabs.length) return;
  var labels = doc.querySelectorAll('[data-builder-section="section_joblist"] label.tab_item');
  joblistTabs.forEach(function(tab, i) {
    if (labels[i]) labels[i].textContent = tab.name;
  });
}

/* 공통: 고정 패널 토글 */
function toggleFixedPanel(panelId, arrowId) {
  var panel = document.getElementById(panelId);
  var arrow = document.getElementById(arrowId);
  if (!panel) return;
  var isOpen = panel.style.display !== 'none';
  panel.style.display = isOpen ? 'none' : '';
  if (arrow) arrow.textContent = isOpen ? '▶' : '▼';
}

function resetAll() {
  if (!confirm('모든 설정을 초기화하시겠습니까?')) return;
  localStorage.removeItem(STATE_KEY);
  location.reload();
}

/* ── 탭 전환 ── */
function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(function(el) { el.classList.remove('active'); });
  document.querySelectorAll('.panel-tab button').forEach(function(el) { el.classList.remove('active'); });
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

/* ── 디바이스 미리보기 ── */
function setDevice(type, btn) {
  var wrap = document.getElementById('preview-frame-wrap');
  wrap.className = type === 'pc' ? '' : type;
  document.querySelectorAll('.device-btn').forEach(function(el) { el.classList.remove('active'); });
  btn.classList.add('active');
}

/* ── 섹션 리스트 렌더링 ── */
function renderSectionList() {
  var list = document.getElementById('section-list');
  list.innerHTML = '';
  var visibleOrder = sectionOrder.filter(function(id) { return !FAIR_BUILDER_SCHEMA[id].hideFromPanel; });
  sectionOrder.forEach(function(id) {
    var schema  = FAIR_BUILDER_SCHEMA[id];
    if (schema.hideFromPanel) return;
    var isFixed = !!schema.fixed_content;
    var enabled = sectionEnabled[id];
    var bgColor = sectionBgColors[id] || '';
    var swatchStyle = bgColor ? 'background:' + bgColor + ';' : '';
    var visIdx  = visibleOrder.indexOf(id);
    var isFirst = visIdx === 0;
    var isLast  = visIdx === visibleOrder.length - 1;
    var item = document.createElement('div');
    item.className = 'section-item';
    item.setAttribute('draggable', 'true');
    item.dataset.id = id;
    item.innerHTML =
      '<span class="drag-handle">⠿</span>' +
      /* E3: ▲▼ 이동 버튼 */
      '<div class="sec-move-group">' +
        '<button class="sec-move-btn" title="위로" onclick="event.stopPropagation();moveSectionOrder(\'' + id + '\',-1)" ' + (isFirst ? 'disabled' : '') + '>▲</button>' +
        '<button class="sec-move-btn" title="아래로" onclick="event.stopPropagation();moveSectionOrder(\'' + id + '\',1)" ' + (isLast ? 'disabled' : '') + '>▼</button>' +
      '</div>' +
      /* E4: 섹션명 클릭 → 스크롤 */
      '<span class="section-name" onclick="event.stopPropagation();scrollToSection(\'' + id + '\')" title="클릭 시 해당 섹션으로 이동">' + schema.name + '</span>' +
      (isFixed ? '<span class="section-badge fixed">고정</span>' : '') +
      (id === 'section_gradient' ? '' : '<button class="ep-edit-btn" onclick="event.stopPropagation();toggleSectionEdit(\'' + id + '\')" title="섹션 편집">✏</button>') +
      '<div class="section-bg-swatch' + (bgColor ? ' has-color' : '') + '" style="' + swatchStyle + '" title="섹션 배경 색상">' +
        '<input type="color" value="' + (bgColor || '#ffffff') + '" data-section="' + id + '" oninput="onSectionBgChange(this)">' +
      '</div>' +
      '<div class="toggle-wrap">' +
        '<label class="toggle">' +
          '<input type="checkbox" ' + (enabled ? 'checked' : '') + ' onchange="toggleSection(\'' + id + '\', this.checked)">' +
          '<span class="toggle-slider"></span>' +
        '</label>' +
      '</div>';
    list.appendChild(item);
  });
  initDragDrop();
  if (openEditPanelId) toggleSectionEdit(openEditPanelId);
}

/* ── E3: 섹션 ▲▼ 이동 ── */
function moveSectionOrder(id, dir) {
  var idx = sectionOrder.indexOf(id);
  if (idx === -1) return;
  /* 같은 방향으로 이동할 visible 섹션 찾기 */
  var step = dir > 0 ? 1 : -1;
  var target = idx + step;
  while (target >= 0 && target < sectionOrder.length) {
    if (!FAIR_BUILDER_SCHEMA[sectionOrder[target]].hideFromPanel) break;
    target += step;
  }
  if (target < 0 || target >= sectionOrder.length) return;
  var tmp = sectionOrder[idx];
  sectionOrder[idx] = sectionOrder[target];
  sectionOrder[target] = tmp;
  saveState();
  applyToPreview();
  renderSectionList();
}

/* ── E4: 섹션 클릭 → iframe 스크롤 ── */
function scrollToSection(id) {
  var doc = getPreviewDoc();
  if (!doc) return;
  var el = doc.querySelector('[data-builder-section="' + id + '"]');
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function toggleSection(id, val) {
  sectionEnabled[id] = val;
  saveState();
  applyToPreview();
}

function onSectionBgChange(input) {
  var id  = input.dataset.section;
  var hex = input.value;
  sectionBgColors[id] = hex;
  var swatch = input.parentNode;
  swatch.classList.add('has-color');
  swatch.style.background = hex;
  saveState();
  applyToPreview();
}

/* ── 드래그 앤 드롭 ── */
function initDragDrop() {
  var items   = document.querySelectorAll('.section-item');
  var dragged = null;
  items.forEach(function(item) {
    item.addEventListener('dragstart', function() {
      dragged = this;
      setTimeout(function() { dragged.classList.add('dragging'); }, 0);
    });
    item.addEventListener('dragend', function() {
      this.classList.remove('dragging');
      document.querySelectorAll('.section-item').forEach(function(el) { el.classList.remove('drag-over'); });
    });
    item.addEventListener('dragover', function(e) {
      e.preventDefault();
      document.querySelectorAll('.section-item').forEach(function(el) { el.classList.remove('drag-over'); });
      if (this !== dragged) this.classList.add('drag-over');
    });
    item.addEventListener('drop', function(e) {
      e.preventDefault();
      if (this !== dragged) {
        var ids     = Array.from(document.querySelectorAll('.section-item')).map(function(el) { return el.dataset.id; });
        var fromIdx = ids.indexOf(dragged.dataset.id);
        var toIdx   = ids.indexOf(this.dataset.id);
        sectionOrder.splice(fromIdx, 1);
        sectionOrder.splice(toIdx, 0, dragged.dataset.id);
        renderSectionList();
        saveState();
        applyToPreview();
      }
    });
  });
}

/* ── 버튼 배너 편집 ── */
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function toggleSectionEdit(id) {
  var existing = document.getElementById('edit-panel-' + id);
  var btn = document.querySelector('[data-id="' + id + '"] .ep-edit-btn');
  if (existing) {
    existing.remove();
    if (btn) btn.classList.remove('active');
    openEditPanelId = null;
  } else {
    var item = document.querySelector('[data-id="' + id + '"]');
    if (!item) return;
    var panel = document.createElement('div');
    panel.id = 'edit-panel-' + id;
    panel.className = 'section-edit-panel';
    if (id === 'section_gradient') {
      panel.innerHTML = buildGradientPanel();
    } else if (SECTION_DOM_MAP[id]) {
      loadFieldsFromPreview(id);
      panel.innerHTML = buildSectionPanel(id);
    } else {
      panel.innerHTML = '<div class="ep-title" style="color:#4b5563;">편집 기능 준비 중</div>';
    }
    item.insertAdjacentElement('afterend', panel);
    if (btn) btn.classList.add('active');
    openEditPanelId = id;
  }
}

function colorRow(i, key, val, label) {
  return '<div class="ep-field"><label>' + label + '</label>' +
    '<div class="ep-color-wrap">' +
      '<div class="ep-color-preview" style="background:' + val + '">' +
        '<input type="color" value="' + val + '" oninput="updateBtn(' + i + ',\'' + key + '\',this.value);this.parentNode.style.background=this.value;syncEpHex(this,' + i + ',\'' + key + '\')">' +
      '</div>' +
      '<input type="text" class="ep-hex" id="ep-' + key + '-' + i + '" value="' + val + '" maxlength="7" oninput="if(/^#[0-9a-fA-F]{6}$/.test(this.value)){var p=this.previousElementSibling;p.style.background=this.value;p.querySelector(\'input[type=color]\').value=this.value;updateBtn(' + i + ',\'' + key + '\',this.value)}">' +
    '</div></div>';
}

function buildGradientPanel() {

        '</div>' +
        '<input type="text" class="ep-hex" id="ep-shadowColor-' + i + '" value="' + b.shadowColor + '" maxlength="7" oninput="if(/^#[0-9a-fA-F]{6}$/.test(this.value)){var p=this.previousElementSibling;p.style.background=this.value;p.querySelector(\'input[type=color]\').value=this.value;updateBtn(' + i + ',\'shadowColor\',this.value)}">' +

    h += '<div class="ep-row"><label>호버 효과</label>' +

      '<span class="ep-hint">PC (≥1025px)</span></div>';
    h += '<div class="ep-hover-sub" id="ep-hover-sub-' + i + '" style="' + (b.hoverEnabled ? '' : 'display:none') + '">';
    h += colorRow(i, 'hoverBgColor', b.hoverBgColor, '호버 배경색');
    h += colorRow(i, 'hoverShadowColor', b.hoverShadowColor, '호버 쉐도우색');

function toggleEpHoverSub(i, show) {
  var sub = document.getElementById('ep-hover-sub-' + i);
  if (sub) sub.style.display = show ? '' : 'none';
}

function syncEpHex(colorInput, i, key) {
  var hex = document.getElementById('ep-' + key + '-' + i);
  if (hex) hex.value = colorInput.value;
}

/* ── 섹션 데이터 읽기 (iframe → state) ── */
function loadFieldsFromPreview(sectionId) {
  if (!previewReady) return;
  var doc = getPreviewDoc();
  if (!doc) return;
  var map = SECTION_DOM_MAP[sectionId];
  if (!map) return;
  var sEl = doc.querySelector('[data-builder-section="' + sectionId + '"]');
  if (!sEl) return;
  var data = {};
  Object.keys(map).forEach(function(fk) {
    var m = map[fk];
    if (m._repeater) {
      var nodes = sEl.querySelectorAll(m.container);
      data[fk] = Array.from(nodes).map(function(node) {
        var item = {};
        Object.keys(m.fields).forEach(function(sfk) {
          var fm = m.fields[sfk];
          var el = fm.sel ? node.querySelector(fm.sel) : node;
          var v = el ? (el[fm.prop] || '') : '';
          item[sfk] = typeof v === 'string' ? v.trim() : v;
        });
        return item;
      });
    } else {
      var el = sEl.querySelector(m.sel);
      var v = el ? (el[m.prop] || '') : '';
      data[fk] = typeof v === 'string' ? v.trim() : v;
    }
  });
  sectionData[sectionId] = data;
}

/* ── 섹션 데이터 적용 (state → iframe) ── */
function applyFieldsToPreview(sectionId) {
  var doc = getPreviewDoc();
  if (!doc) return;
  var map = SECTION_DOM_MAP[sectionId];
  if (!map) return;
  var sEl = doc.querySelector('[data-builder-section="' + sectionId + '"]');
  if (!sEl) return;
  var data = sectionData[sectionId];
  if (!data) return;
  Object.keys(map).forEach(function(fk) {
    var m = map[fk];
    var val = data[fk];
    if (val === undefined) return;
    if (m._repeater) {
      var nodes = sEl.querySelectorAll(m.container);
      nodes.forEach(function(node, i) {
        if (!val[i]) return;
        Object.keys(m.fields).forEach(function(sfk) {
          var fm = m.fields[sfk];
          if (val[i][sfk] === undefined) return;
          if (fm.multi) {
            node.querySelectorAll(fm.sel).forEach(function(e) { e[fm.prop] = val[i][sfk]; });
          } else {
            var el = fm.sel ? node.querySelector(fm.sel) : node;
            if (el) el[fm.prop] = val[i][sfk];
          }
        });
      });
    } else {
      if (m.multi) {
        sEl.querySelectorAll(m.sel).forEach(function(e) { e[m.prop] = val; });
      } else {
        var el = sEl.querySelector(m.sel);
        if (el) el[m.prop] = val;
      }
    }
  });
}

function applyAllFieldsToPreview() {
  Object.keys(sectionData).forEach(function(id) { applyFieldsToPreview(id); });
}

/* ── 필드 값 업데이트 ── */
function updateField(sectionId, path, val) {
  if (!sectionData[sectionId]) sectionData[sectionId] = {};
  var parts = path.split('.');
  var obj = sectionData[sectionId];
  for (var i = 0; i < parts.length - 1; i++) {
    var k = isNaN(parts[i]) ? parts[i] : +parts[i];
    if (obj == null || typeof obj !== 'object') return;
    obj = obj[k];
  }
  if (obj == null || typeof obj !== 'object') return;
  var last = parts[parts.length - 1];
  obj[isNaN(last) ? last : +last] = val;
  saveState();
  applyFieldsToPreview(sectionId);
}

/* ── 섹션 편집 폼 빌더 ── */
function buildSectionPanel(sectionId) {
  var schema = FAIR_BUILDER_SCHEMA[sectionId];
  var data   = sectionData[sectionId] || {};
  var map    = SECTION_DOM_MAP[sectionId] || {};
  var h = '<div class="ep-title">' + schema.name + ' 편집</div>';
  if (sectionId === 'section_event_info') h += buildPosterLayoutCtrl();
  Object.keys(schema.fields).forEach(function(fk) {
    var field = schema.fields[fk];
    if (!map[fk]) return; // DOM_MAP에 없는 필드는 폼에서 제외
    if (field.type === 'repeater') {
      var items = data[fk] || [];
      h += '<div class="ep-repeater-label">' + field.label + '</div>';
      items.forEach(function(item, i) {
        h += '<div class="ep-btn-card"><div class="ep-btn-header">' + field.itemLabel + ' ' + (i + 1) + '</div>';
        Object.keys(field.fields).forEach(function(sfk) {
          if (field.fields[sfk].type === 'repeater') return;
          if (!map[fk]._repeater || !map[fk].fields || !map[fk].fields[sfk]) return; // 리피터 내 미매핑 필드 제외
          h += buildFieldInput(sectionId, fk + '.' + i + '.' + sfk, field.fields[sfk], item[sfk]);
        });
        h += '</div>';
      });
    } else {
      h += buildFieldInput(sectionId, fk, field, data[fk]);
    }
  });
  h += buildSpacingPanel(sectionId);
  return h;
}

function buildFieldInput(sectionId, path, field, val) {
  val = val !== undefined ? String(val) : (field.default || '');
  var cb = 'updateField(\'' + sectionId + '\',\'' + path + '\',this.value)';
  var hint = (field.type === 'image') ? ' <span class="ep-hint">(경로)</span>' : (field.type === 'link') ? ' <span class="ep-hint">(URL)</span>' : '';
  var label = '<label>' + field.label + hint + '</label>';
  if (field.type === 'textarea') {
    return '<div class="ep-field">' + label + '<textarea class="ep-textarea" oninput="' + cb + '">' + esc(val) + '</textarea></div>';
  }
  return '<div class="ep-field">' + label + '<input type="text" value="' + esc(val) + '" oninput="' + cb + '"></div>';
}

function updateBtn(i, key, val) {
  var bs = buttonStyles['section_gradient'];
  if (!bs || !bs[i]) return;
  bs[i][key] = val;
  saveState();
  applyBtnStylesToPreview();
}

/* ── ST1: 섹션 여백 편집 ── */
function applySpacingToPreview() {
  var doc = getPreviewDoc();
  if (!doc) return;
  var tag = doc.getElementById('builder-spacing-css');
  if (!tag) { tag = doc.createElement('style'); tag.id = 'builder-spacing-css'; doc.head.appendChild(tag); }
  var css = '';
  Object.keys(sectionSpacing).forEach(function(sId) {
    var sp = sectionSpacing[sId];
    var pc = [];
    if (sp.pt !== '' && sp.pt !== null) pc.push('padding-top:' + sp.pt + 'px!important');
    if (sp.pb !== '' && sp.pb !== null) pc.push('padding-bottom:' + sp.pb + 'px!important');
    if (pc.length) css += '[data-builder-section="' + sId + '"]{' + pc.join(';') + '}';
    var mo = [];
    if (sp.mpt !== '' && sp.mpt !== null) mo.push('padding-top:' + sp.mpt + 'px!important');
    if (sp.mpb !== '' && sp.mpb !== null) mo.push('padding-bottom:' + sp.mpb + 'px!important');
    if (mo.length) css += '@media(max-width:768px){[data-builder-section="' + sId + '"]{' + mo.join(';') + '}}';
  });
  tag.textContent = css;
}

function updateSpacing(sId, key, val) {
  if (!sectionSpacing[sId]) sectionSpacing[sId] = { pt:'', pb:'', mpt:'', mpb:'' };
  sectionSpacing[sId][key] = val === '' ? '' : parseInt(val, 10);
  saveState();
  applySpacingToPreview();
}

function buildSpacingPanel(sId) {
  var sp = sectionSpacing[sId] || { pt:'', pb:'', mpt:'', mpb:'' };
  return '<div class="ep-spacing-group">' +
    '<div class="ep-spacing-title">여백 설정 <span class="ep-hint">(px)</span></div>' +
    '<div class="ep-spacing-row">' +
      '<span class="ep-spacing-label">PC</span>' +
      '<span class="ep-spacing-item">상단<input type="number" min="0" max="300" value="' + sp.pt + '" placeholder="기본" oninput="updateSpacing(\'' + sId + '\',\'pt\',this.value)"></span>' +
      '<span class="ep-spacing-item">하단<input type="number" min="0" max="300" value="' + sp.pb + '" placeholder="기본" oninput="updateSpacing(\'' + sId + '\',\'pb\',this.value)"></span>' +
    '</div>' +
    '<div class="ep-spacing-row">' +
      '<span class="ep-spacing-label">모바일</span>' +
      '<span class="ep-spacing-item">상단<input type="number" min="0" max="300" value="' + sp.mpt + '" placeholder="기본" oninput="updateSpacing(\'' + sId + '\',\'mpt\',this.value)"></span>' +
      '<span class="ep-spacing-item">하단<input type="number" min="0" max="300" value="' + sp.mpb + '" placeholder="기본" oninput="updateSpacing(\'' + sId + '\',\'mpb\',this.value)"></span>' +
    '</div>' +
  '</div>';
}

function applyBtnStylesToPreview() {
  var doc = getPreviewDoc();
  if (!doc) return;
  var btns = doc.querySelectorAll('[data-builder-section="section_gradient"] .round-btn');
  var styles = buttonStyles['section_gradient'] || [];

  btns.forEach(function(el, i) {
    var s = styles[i];
    if (!s) return;
    el.textContent = s.text;
    el.href = s.href;
    el.style.width = s.width;
    el.style.backgroundColor = s.bgColor;
    el.style.boxShadow = s.shadowEnabled ? ('-5px -5px 4px 0 ' + s.shadowColor + ' inset') : 'none';
  });

  /* 호버 스타일 주입 */
  var styleId = 'builder-btn-styles';

  if (!tag) { tag = doc.createElement('style'); tag.id = styleId; doc.head.appendChild(tag); }
  var css = '';
  styles.forEach(function(s, i) {
    if (!s.hoverEnabled) return;
    css += '@media (hover:hover) and (min-width:1025px){' +
      '[data-builder-section="section_gradient"] .round-btn:nth-child(' + (i + 1) + '):hover{' +
        'background-color:' + s.hoverBgColor + '!important;' +
        'box-shadow:-5px -5px 4px 0 ' + s.hoverShadowColor + ' inset!important;' +
      '}}';
  });

/* ── 포맷팅 툴바 (Step C/D) ── */
var _savedRange = null;

function saveIframeSelection() {
  var doc = getPreviewDoc();
  if (!doc) return;
  var sel = doc.getSelection();
  if (sel && sel.rangeCount) _savedRange = sel.getRangeAt(0).cloneRange();
}

function restoreIframeSelection() {
  var doc = getPreviewDoc();
  if (!doc || !_savedRange) return;
  var sel = doc.getSelection();
  sel.removeAllRanges();
  sel.addRange(_savedRange);
}

function execFmt(cmd, value) {
  var doc = getPreviewDoc();
  if (!doc) return;
  doc.execCommand(cmd, false, value !== undefined ? value : null);
}

function execFmtLink() {
  var doc = getPreviewDoc();
  if (!doc) return;
  var sel = doc.getSelection();
  var url = prompt('링크 URL 입력:', 'https://');
  if (!url) return;
  doc.execCommand('createLink', false, url);
  /* 새 탭 열기 처리 */
  sel = doc.getSelection();
  if (sel && sel.rangeCount) {
    var node = sel.getRangeAt(0).commonAncestorContainer;
    var a = (node.nodeType === 1 ? node : node.parentElement);
    a = a.closest ? a.closest('a') : (a.tagName === 'A' ? a : null);
    if (a) { a.target = '_blank'; a.rel = 'noopener'; }
  }
}

function execFmtFontName(name) {
  var doc = getPreviewDoc();
  if (!doc || !name) return;
  doc.execCommand('fontName', false, name);
}

function execFmtFontSize(px) {
  px = parseInt(px, 10);
  if (!px || px < 1) return;
  var doc = getPreviewDoc();
  if (!doc) return;
  doc.execCommand('fontSize', false, '7');
  doc.querySelectorAll('[data-builder-section] font[size="7"]').forEach(function(f) {
    var span = doc.createElement('span');
    span.style.fontSize = px + 'px';
    span.innerHTML = f.innerHTML;
    f.parentNode.replaceChild(span, f);
  });
}

function execFmtLineHeight(lh) {
  lh = parseFloat(lh);
  if (!lh) return;
  var doc = getPreviewDoc();
  if (!doc) return;
  var sel = doc.getSelection();
  if (!sel || !sel.rangeCount) return;
  var node = sel.getRangeAt(0).commonAncestorContainer;
  if (node.nodeType === 3) node = node.parentElement;
  var BLOCK = { P:1, DIV:1, H1:1, H2:1, H3:1, H4:1, H5:1, H6:1, LI:1, DT:1, DD:1, SECTION:1, ARTICLE:1 };
  while (node && !BLOCK[node.tagName] && !node.dataset.builderSection) node = node.parentElement;
  if (node && !node.dataset.builderSection) node.style.lineHeight = lh;
}

function insertElement(tag) {
  var doc = getPreviewDoc();
  if (!doc) return;
  var el = doc.createElement(tag);
  el.innerHTML = '&#8203;'; /* zero-width space for caret positioning */
  doc.execCommand('insertHTML', false, el.outerHTML);
}

function insertInlineEl(tag) {
  var doc = getPreviewDoc();
  if (!doc) return;
  var sel = doc.getSelection();
  if (!sel || !sel.rangeCount) return;
  var range = sel.getRangeAt(0);
  var text = range.toString();
  if (text) {
    doc.execCommand('insertHTML', false, '<' + tag + '>' + text + '</' + tag + '>');
  } else {
    doc.execCommand('insertHTML', false, '<' + tag + '>&#8203;</' + tag + '>');
  }
}

/* ── 섹션 드래그 순서 변경 (Step F) ── */
window.sectionDragReorder = function(fromId, toId) {
  var fromIdx = sectionOrder.indexOf(fromId);
  var toIdx   = sectionOrder.indexOf(toId);
  if (fromIdx < 0 || toIdx < 0 || fromIdx === toIdx) return;
  sectionOrder.splice(fromIdx, 1);
  sectionOrder.splice(toIdx, 0, fromId);
  saveState();
  applyToPreview();
  renderSectionList();
};

function injectSectionDragHandles(doc) {
  sectionOrder.forEach(function(sId) {
    var sEl = doc.querySelector('[data-builder-section="' + sId + '"]');
    if (!sEl || doc.getElementById('builder-sec-handle-' + sId)) return;
    var schema = FAIR_BUILDER_SCHEMA[sId];
    var name = schema ? schema.name : sId;

    var handle = doc.createElement('div');
    handle.id = 'builder-sec-handle-' + sId;
    handle.setAttribute('data-builder-ui', '');
    handle.draggable = true;
    handle.dataset.handleFor = sId;
    handle.style.cssText = 'display:flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(0,0,0,.45);position:relative;z-index:98;cursor:grab;user-select:none;color:rgba(255,255,255,.65);font-size:11px;font-family:sans-serif;';

    var hIcon = doc.createElement('span');
    hIcon.textContent = '⠿';
    hIcon.setAttribute('data-builder-ui', '');
    hIcon.style.cssText = 'font-size:13px;opacity:.55;';

    var hName = doc.createElement('span');
    hName.textContent = name + ' 섹션';
    hName.setAttribute('data-builder-ui', '');

    handle.appendChild(hIcon);
    handle.appendChild(hName);

    handle.addEventListener('dragstart', function(e) {
      e.dataTransfer.setData('text/plain', sId);
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(function() { handle.style.opacity = '.45'; }, 0);
    });
    handle.addEventListener('dragend', function() {
      handle.style.opacity = '';
      doc.querySelectorAll('[data-builder-section]').forEach(function(s) {
        s.style.outline = '';
        s.style.outlineOffset = '';
      });
    });

    /* H4: 핸들 외 영역에서 시작된 dragstart 차단 */
    sEl.addEventListener('dragstart', function(e) {
      if (!e.target.closest('[data-handle-for]')) {
        e.preventDefault();
        e.stopPropagation();
      }
    });

    sEl.addEventListener('dragover', function(e) {
      if (!editMode) return;
      e.preventDefault();
      sEl.style.outline = '3px dashed rgba(96,165,250,.55)';
      sEl.style.outlineOffset = '-3px';
    });
    sEl.addEventListener('dragleave', function() {
      sEl.style.outline = '';
      sEl.style.outlineOffset = '';
    });
    sEl.addEventListener('drop', function(e) {
      if (!editMode) return;
      e.preventDefault();
      sEl.style.outline = '';
      sEl.style.outlineOffset = '';
      var fromId = e.dataTransfer.getData('text/plain');
      if (fromId && fromId !== sId) window.parent.sectionDragReorder(fromId, sId);
    });

    sEl.insertAdjacentElement('afterbegin', handle);
  });
}

function removeSectionDragHandles(doc) {
  doc.querySelectorAll('[data-handle-for]').forEach(function(el) { el.remove(); });
  doc.querySelectorAll('[data-builder-section]').forEach(function(sEl) {
    sEl.style.outline = '';
    sEl.style.outlineOffset = '';
  });
}

/* ── 버튼 배너 인라인 편집 (Step B-btn) ── */
window.builderBtnAction = function(action, idx, extra) {
  var bs = buttonStyles['section_gradient'];
  if (action === 'delete') {
    if (bs.length <= 1) return;
    bs.splice(idx, 1);
    saveState(); syncBtnDOM(); refreshBtnEditCards(); closeBtnSettingsPanel();
  } else if (action === 'add') {
    if (bs.length >= 4) return;
    bs.push({ text: '새 버튼', href: '', width: '39.683%', bgColor: '#f46d80',
              shadowEnabled: false, shadowColor: '#D94E62',
              hoverEnabled: false, hoverBgColor: '#f78797', hoverShadowColor: '#bd3d50' });
    saveState(); syncBtnDOM(); refreshBtnEditCards();
  } else if (action === 'reorder') {
    var from = extra.from, to = extra.to;
    if (from < 0 || to < 0 || from >= bs.length || to >= bs.length) return;
    var moved = bs.splice(from, 1)[0];
    bs.splice(to, 0, moved);
    saveState(); syncBtnDOM(); refreshBtnEditCards();
  } else if (action === 'settings') {
    openBtnSettingsPanel(idx);
  }
};

function syncBtnDOM() {
  var doc = getPreviewDoc();
  if (!doc) return;
  var group = doc.querySelector('[data-builder-section="section_gradient"] .btn-group');
  if (!group) return;
  var bs = buttonStyles['section_gradient'] || [];
  var existing = Array.from(group.querySelectorAll('.round-btn'));
  while (existing.length < bs.length) {
    var a = doc.createElement('a');
    a.className = 'round-btn';
    a.href = '#';
    a.target = '_blank';
    group.appendChild(a);
    existing.push(a);
  }
  while (existing.length > bs.length) {
    var rem = existing.pop();
    rem.removeEventListener('focus', onEditableFocus);
    rem.removeEventListener('blur',  onEditableBlur);
    rem.removeAttribute('data-editable');
    rem.removeAttribute('contenteditable');
    rem.remove();
  }
  applyBtnStylesToPreview();
  if (editMode) applyEditableAttr(doc);
}

function injectBtnEditUI(doc) {
  var sEl = doc.querySelector('[data-builder-section="section_gradient"]');
  if (!sEl) return;
  removeBtnEditUI(doc);
  var ui = doc.createElement('div');
  ui.id = 'builder-btn-edit-ui';
  ui.setAttribute('data-builder-ui', '');
  ui.style.cssText = 'display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:8px 16px;background:rgba(0,0,0,.62);position:relative;z-index:100;';
  var bs = buttonStyles['section_gradient'] || [];
  bs.forEach(function(b, i) { ui.appendChild(makeBeuCard(doc, b, i)); });
  var addBtn = doc.createElement('button');
  addBtn.className = 'beu-add';
  addBtn.setAttribute('data-builder-ui', '');
  addBtn.textContent = '＋ 버튼 추가';
  addBtn.disabled = bs.length >= 4;
  addBtn.style.cssText = 'padding:4px 12px;background:#0066cc;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;flex-shrink:0;';
  addBtn.addEventListener('click', function() { window.parent.builderBtnAction('add'); });
  ui.appendChild(addBtn);
  sEl.insertAdjacentElement('afterbegin', ui);
}

function removeBtnEditUI(doc) {
  var ui = doc.getElementById('builder-btn-edit-ui');
  if (ui) ui.remove();
  closeBtnSettingsPanel();
}

function refreshBtnEditCards() {
  var doc = getPreviewDoc();
  if (!doc) return;
  var ui = doc.getElementById('builder-btn-edit-ui');
  if (!ui) return;
  var bs = buttonStyles['section_gradient'] || [];
  Array.from(ui.querySelectorAll('.beu-card')).forEach(function(c) { c.remove(); });
  var addBtn = ui.querySelector('.beu-add');
  bs.forEach(function(b, i) { ui.insertBefore(makeBeuCard(doc, b, i), addBtn); });
  if (addBtn) addBtn.disabled = bs.length >= 4;
}

function makeBeuCard(doc, b, i) {
  var card = doc.createElement('div');
  card.className = 'beu-card';
  card.draggable = true;
  card.dataset.beuIdx = String(i);
  card.setAttribute('data-builder-ui', '');
  card.style.cssText = 'display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.2);border-radius:6px;padding:4px 8px;color:#fff;font-size:12px;user-select:none;cursor:grab;';

  var handle = doc.createElement('span');
  handle.textContent = '⠿';
  handle.setAttribute('data-builder-ui', '');
  handle.style.cssText = 'opacity:.6;';

  var label = doc.createElement('span');
  label.textContent = b.text || ('버튼 ' + (i + 1));
  label.setAttribute('data-builder-ui', '');
  label.style.cssText = 'max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';

  var settingsBtn = doc.createElement('button');
  settingsBtn.setAttribute('data-builder-ui', '');
  settingsBtn.textContent = '⚙';
  settingsBtn.style.cssText = 'background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:3px;padding:1px 5px;cursor:pointer;font-size:11px;flex-shrink:0;';
  settingsBtn.addEventListener('click', function(e) { e.stopPropagation(); window.parent.builderBtnAction('settings', i); });

  var deleteBtn = doc.createElement('button');
  deleteBtn.setAttribute('data-builder-ui', '');
  deleteBtn.textContent = '✕';
  deleteBtn.style.cssText = 'background:rgba(239,68,68,.25);border:none;color:#fca5a5;border-radius:3px;padding:1px 5px;cursor:pointer;font-size:11px;flex-shrink:0;';
  deleteBtn.addEventListener('click', function(e) { e.stopPropagation(); window.parent.builderBtnAction('delete', i); });

  card.addEventListener('dragstart', function(e) {
    e.dataTransfer.setData('text/plain', String(i));
    setTimeout(function() { card.style.opacity = '.4'; }, 0);
  });
  card.addEventListener('dragend', function() { card.style.opacity = ''; card.style.outline = ''; });
  card.addEventListener('dragover', function(e) { e.preventDefault(); card.style.outline = '2px dashed #60a5fa'; });
  card.addEventListener('dragleave', function() { card.style.outline = ''; });
  card.addEventListener('drop', function(e) {
    e.preventDefault(); card.style.outline = '';
    var from = +e.dataTransfer.getData('text/plain');
    var to = +card.dataset.beuIdx;
    if (from !== to) window.parent.builderBtnAction('reorder', null, { from: from, to: to });
  });

  card.appendChild(handle);
  card.appendChild(label);
  card.appendChild(settingsBtn);
  card.appendChild(deleteBtn);
  return card;
}

/* ── 버튼 설정 패널 (부모 프레임 플로팅) ── */
var activeBtnIdx = -1;

function openBtnSettingsPanel(idx) {
  activeBtnIdx = idx;
  var b = (buttonStyles['section_gradient'] || [])[idx];
  if (b === undefined) return;
  var panel = getBtnSettingsPanel();
  panel.innerHTML = buildBtnSettingsPanelHTML(idx, b);
  panel.style.display = '';
}

function closeBtnSettingsPanel() {
  var panel = document.getElementById('btn-settings-panel');
  if (panel) panel.style.display = 'none';
  activeBtnIdx = -1;
}

function getBtnSettingsPanel() {
  var panel = document.getElementById('btn-settings-panel');
  if (!panel) {
    panel = document.createElement('div');
    panel.id = 'btn-settings-panel';
    panel.style.cssText = 'position:fixed;right:20px;top:80px;width:256px;background:#1e2433;border:1px solid #2e3a52;border-radius:8px;padding:14px;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.6);font-size:12px;color:#e5e7eb;display:none;';
    document.body.appendChild(panel);
  }
  return panel;
}

function buildBtnSettingsPanelHTML(idx, b) {
  var h = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">' +
    '<strong style="font-size:13px;">버튼 ' + (idx + 1) + ' 설정</strong>' +
    '<button onclick="closeBtnSettingsPanel()" style="background:none;border:none;color:#9ca3af;cursor:pointer;font-size:16px;line-height:1;padding:0;">✕</button>' +
    '</div>';
  h += bspRow('버튼 텍스트', '<input type="text" class="bsp-input" value="' + esc(b.text) + '" oninput="updateBtnField(' + idx + ',\'text\',this.value)">');
  h += bspRow('링크 URL', '<input type="text" class="bsp-input" value="' + esc(b.href) + '" oninput="updateBtnField(' + idx + ',\'href\',this.value)">');
  h += bspRow('너비', '<input type="text" class="bsp-input" value="' + esc(b.width) + '" placeholder="예: 40% / 320px" oninput="updateBtnField(' + idx + ',\'width\',this.value)">');
  h += bspColorRow(idx, 'bgColor', b.bgColor, '배경색');
  h += '<div style="display:flex;align-items:center;gap:8px;margin:6px 0;">' +
    '<span style="flex:1;color:#9ca3af;">인셋 쉐도우</span>' +
    '<label class="toggle"><input type="checkbox" ' + (b.shadowEnabled ? 'checked' : '') + ' onchange="updateBtnField(' + idx + ',\'shadowEnabled\',this.checked)"><span class="toggle-slider"></span></label>' +
    bspColorSwatch(idx, 'shadowColor', b.shadowColor) +
    '</div>';
  h += '<div style="display:flex;align-items:center;gap:8px;margin:6px 0;">' +
    '<span style="flex:1;color:#9ca3af;">호버 효과 <span style="font-size:10px;color:#4b5563;">PC</span></span>' +
    '<label class="toggle"><input type="checkbox" ' + (b.hoverEnabled ? 'checked' : '') + ' onchange="updateBtnField(' + idx + ',\'hoverEnabled\',this.checked);var s=document.getElementById(\'bsp-hover-sub\');if(s)s.style.display=this.checked?\'\':\'none\'"><span class="toggle-slider"></span></label>' +
    '</div>';
  h += '<div id="bsp-hover-sub" style="' + (b.hoverEnabled ? '' : 'display:none') + '">';
  h += bspColorRow(idx, 'hoverBgColor', b.hoverBgColor, '호버 배경색');
  h += bspColorRow(idx, 'hoverShadowColor', b.hoverShadowColor, '호버 쉐도우색');
  h += '</div>';
  return h;
}

function bspRow(label, inputHtml) {
  return '<div style="margin:6px 0;"><div style="color:#9ca3af;margin-bottom:3px;">' + label + '</div>' + inputHtml + '</div>';
}

function bspColorSwatch(idx, key, val) {
  return '<div style="width:22px;height:22px;border-radius:3px;border:1px solid #374151;background:' + val + ';position:relative;overflow:hidden;cursor:pointer;flex-shrink:0;">' +
    '<input type="color" value="' + val + '" style="opacity:0;position:absolute;inset:0;cursor:pointer;width:100%;height:100%;" ' +
    'oninput="updateBtnField(' + idx + ',\'' + key + '\',this.value);this.parentNode.style.background=this.value;">' +
    '</div>';
}

function bspColorRow(idx, key, val, label) {
  return '<div style="margin:6px 0;"><div style="color:#9ca3af;margin-bottom:3px;">' + label + '</div>' +
    '<div style="display:flex;gap:6px;align-items:center;">' +
    bspColorSwatch(idx, key, val) +
    '<input type="text" class="bsp-input" value="' + val + '" maxlength="7" style="width:76px !important;" ' +
    'oninput="if(/^#[0-9a-fA-F]{6}$/.test(this.value)){updateBtnField(' + idx + ',\'' + key + '\',this.value);var sw=this.previousElementSibling;sw.style.background=this.value;sw.querySelector(\'input[type=color]\').value=this.value}">' +
    '</div></div>';
}

function updateBtnField(idx, key, val) {
  var bs = buttonStyles['section_gradient'];
  if (!bs || bs[idx] === undefined) return;
  bs[idx][key] = val;
  saveState();
  syncBtnDOM();
  if (key === 'text') {
    var doc = getPreviewDoc();
    if (doc) {
      var cards = doc.querySelectorAll('.beu-card');
      var card = cards[idx];
      if (card) {
        var spans = Array.from(card.querySelectorAll('span[data-builder-ui]'));
        var lbl = spans.find(function(s) { return s.textContent !== '⠿'; });
        if (lbl) lbl.textContent = val || ('버튼 ' + (idx + 1));
      }
    }
  }
}

/* ── CSS 색상 피커 렌더링 ── */
function renderColorList() {
  var list = document.getElementById('color-list');
  list.innerHTML = '';
  Object.keys(FAIR_BUILDER_COLORS).forEach(function(varName) {
    var cfg = FAIR_BUILDER_COLORS[varName];
    var val = cssColors[varName] || cfg.default;
    var item = document.createElement('div');
    item.className = 'color-item';
    item.innerHTML =
      '<label>' + cfg.label + '<br><span style="color:#4b5563;font-size:10px;">' + varName + '</span></label>' +
      '<div class="color-preview" style="background:' + val + ';">' +
        '<input type="color" value="' + val + '" data-var="' + varName + '" oninput="onColorChange(this)">' +
      '</div>' +
      '<input class="hex-input" type="text" value="' + val + '" data-var="' + varName + '" maxlength="7" oninput="onHexChange(this)" placeholder="#000000">';
    list.appendChild(item);
  });
}

function onColorChange(input) {
  var hex = input.value;
  var varName = input.dataset.var;
  cssColors[varName] = hex;
  var wrap = input.closest('.color-item');
  wrap.querySelector('.color-preview').style.background = hex;
  wrap.querySelector('.hex-input').value = hex;
  saveState();
  applyColorToPreview(varName, hex);
}

function onHexChange(input) {
  var hex = input.value;
  if (!/^#[0-9a-fA-F]{6}$/.test(hex)) return;
  var varName = input.dataset.var;
  cssColors[varName] = hex;
  var wrap = input.closest('.color-item');
  wrap.querySelector('input[type=color]').value = hex;
  wrap.querySelector('.color-preview').style.background = hex;
  saveState();
  applyColorToPreview(varName, hex);
}

function applyColorToPreview(varName, value) {
  try { document.getElementById('preview-frame').contentDocument.documentElement.style.setProperty(varName, value); } catch(e) {}
}

/* ── 포스터 레이아웃 (Step G) ── */
function applyPosterLayout(doc) {
  var styleId = 'builder-poster-layout';
  var tag = doc.getElementById(styleId);
  if (!tag) {
    tag = doc.createElement('style');
    tag.id = styleId;
    doc.head.appendChild(tag);
  }
  if (posterConfig === 'online') {
    tag.textContent = '.poster-box.type--offline{display:none!important}' +
      '.poster-box-wrap .poster-box.type--online{width:100%!important}';
  } else if (posterConfig === 'offline') {
    tag.textContent = '.poster-box.type--online{display:none!important}' +
      '.poster-box-wrap .poster-box.type--offline{width:100%!important}';
  } else {
    tag.textContent = '';
  }
}

function setPosterConfig(val) {
  posterConfig = val;
  saveState();
  var doc = getPreviewDoc();
  if (doc) applyPosterLayout(doc);
  if (openEditPanelId === 'section_event_info') {
    var panel = document.getElementById('edit-panel-section_event_info');
    if (panel) {
      loadFieldsFromPreview('section_event_info');
      panel.innerHTML = buildSectionPanel('section_event_info');
    }
  }
}

function buildPosterLayoutCtrl() {
  var configs = [
    { val: 'both',    label: '온+오프 (2개)' },
    { val: 'online',  label: '온라인만' },
    { val: 'offline', label: '오프라인만' },
  ];
  var h = '<div class="ep-title" style="margin-top:6px;font-size:10px;">포스터 레이아웃</div>' +
    '<div style="display:flex;gap:4px;margin-bottom:10px;">';
  configs.forEach(function(c) {
    var active = posterConfig === c.val;
    h += '<button onclick="setPosterConfig(\'' + c.val + '\')" style="flex:1;padding:5px 2px;font-size:10px;border-radius:4px;' +
      'border:1px solid ' + (active ? '#0066cc' : '#2e3a52') + ';' +
      'background:' + (active ? '#0066cc' : 'transparent') + ';' +
      'color:' + (active ? '#fff' : '#9ca3af') + ';cursor:pointer;">' + c.label + '</button>';
  });
  h += '</div>';
  return h;
}

/* ── 편집 모드 ── */
function toggleEditMode() {
  if (editMode) { exitEditMode(); } else { enterEditMode(); }
}

function enterEditMode() {
  if (!previewReady) { alert('미리보기가 로드된 후 편집 모드를 사용하세요.'); return; }
  var doc = getPreviewDoc();
  if (!doc) return;
  doc.body.classList.add('builder-edit-mode');
  injectEditModeCSS(doc);
  restoreExtraEdits(doc);
  applyEditableAttr(doc);
  injectSectionDragHandles(doc);
  injectBtnEditUI(doc);
  applyImageEditListeners(doc);   /* E1 */
  applyYoutubeEditListeners(doc); /* E2 */
  editMode = true;
  document.getElementById('edit-mode-btn').classList.add('active');
  document.getElementById('edit-mode-btn').textContent = '✕ 편집 종료';
  document.getElementById('edit-mode-badge').classList.add('show');
  document.getElementById('format-toolbar').classList.add('show');
}

function exitEditMode() {
  var doc = getPreviewDoc();
  if (!doc) return;
  removeBtnEditUI(doc);
  removeSectionDragHandles(doc);
  collectEditableValues(doc);
  doc.querySelectorAll('[data-editable]').forEach(function(el) {
    el.removeEventListener('focus', onEditableFocus);
    el.removeEventListener('blur',  onEditableBlur);
    el.removeAttribute('contenteditable');
    el.removeAttribute('data-editable');
    el.removeAttribute('data-builder-section');
    el.removeAttribute('data-builder-field');
    el.removeAttribute('data-builder-prop');
  });
  doc.querySelectorAll('.builder-section-active').forEach(function(s) {
    s.classList.remove('builder-section-active');
  });
  doc.body.classList.remove('builder-edit-mode');
  var styleEl = doc.getElementById('builder-edit-css');
  if (styleEl) styleEl.parentNode.removeChild(styleEl);
  saveState();
  editMode = false;
  document.getElementById('edit-mode-btn').classList.remove('active');
  document.getElementById('edit-mode-btn').textContent = '✏ 편집 모드';
  document.getElementById('edit-mode-badge').classList.remove('show');
  document.getElementById('format-toolbar').classList.remove('show');
}

function injectEditModeCSS(doc) {
  if (doc.getElementById('builder-edit-css')) return;
  var s = doc.createElement('style');
  s.id = 'builder-edit-css';
  s.textContent =
    '.builder-edit-mode [data-editable]{' +
      'outline:2px dashed rgba(0,102,204,.45)!important;' +
      'outline-offset:2px;cursor:text;border-radius:2px;' +
      'transition:outline-color .15s,background .15s;' +
    '}' +
    '.builder-edit-mode [data-editable]:hover{' +
      'outline-color:rgba(0,102,204,.85)!important;' +
      'background:rgba(0,102,204,.06)!important;' +
      'color:inherit!important;' +          /* H2: 컬러 버튼 위 흰색 텍스트 보존 */
    '}' +
    '.builder-edit-mode [data-editable]:focus{' +
      'outline:2px solid #0066cc!important;' +
      'outline-offset:2px;' +
      'background:rgba(0,102,204,.09)!important;' +
      'color:inherit!important;' +          /* H2: 포커스 시 텍스트색 유지 */
    '}' +
    '.builder-section-active{' +
      'outline:3px solid rgba(0,102,204,.28)!important;' +

/* ── 편집 경로 헬퍼 ── */
function getElPath(el, root) {
  var parts = [];
  var cur = el;
  while (cur && cur !== root) {
    var tag = cur.tagName.toLowerCase();
    var siblings = cur.parentNode ? Array.prototype.filter.call(
      cur.parentNode.children, function(c) { return c.tagName === cur.tagName; }
    ) : [];
    parts.unshift(tag + ':' + siblings.indexOf(cur));
    cur = cur.parentNode;
  }
  return parts.join('/');
}

function findElByPath(path, root) {
  var parts = path.split('/');
  var cur = root;
  for (var i = 0; i < parts.length; i++) {
    var m = parts[i].match(/^([a-z0-9]+):(\d+)$/);
    if (!m || !cur) return null;
    var tag = m[1].toUpperCase();
    var idx = +m[2];
    var children = Array.prototype.filter.call(
      cur.children, function(c) { return c.tagName === tag; }
    );
    cur = children[idx] || null;
  }
  return cur;
}

function getDomMapField(sId, el, sEl) {
  var map = SECTION_DOM_MAP[sId];
  if (!map) return null;
  var SKIP_PROP = { href: 1, src: 1, alt: 1 };
  for (var fk in map) {
    var m = map[fk];
    if (m._repeater) {
      var found = null;
      sEl.querySelectorAll(m.container).forEach(function(node, i) {
        if (found) return;
        for (var sfk in m.fields) {
          var fm = m.fields[sfk];
          if (SKIP_PROP[fm.prop]) continue;
          var target = fm.sel ? node.querySelector(fm.sel) : node;
          if (target === el) { found = { field: fk + '.' + i + '.' + sfk, prop: fm.prop }; return; }
        }
      });
      if (found) return found;
    } else {
      if (SKIP_PROP[m.prop]) continue;
      if (m.sel && sEl.querySelector(m.sel) === el) return { field: fk, prop: m.prop };
    }
  }
  return null;
}

          closeMiniModal();

      );

function ytToEmbed(url) {
  if (url.includes('/embed/')) return url;
  var m = url.match(/[?&]v=([A-Za-z0-9_-]+)/);
  if (m) return 'https://www.youtube.com/embed/' + m[1];
  var m2 = url.match(/youtu\.be\/([A-Za-z0-9_-]+)/);
  if (m2) return 'https://www.youtube.com/embed/' + m2[1];
  return url;
}

function restoreExtraEdits(doc) {
  Object.keys(sectionData).forEach(function(sId) {
    var extra = sectionData[sId] && sectionData[sId]._extra;
    if (!extra) return;
    var sEl = doc.querySelector('[data-builder-section="' + sId + '"]');
    if (!sEl) return;
    Object.keys(extra).forEach(function(field) {
      if (field.startsWith('_el:')) {
        var el = findElByPath(field.slice(4), sEl);
        if (el) el.innerHTML = extra[field];
      } else if (field.startsWith('_img:')) {
        var img = findElByPath(field.slice(5), sEl);
        if (img) img.src = extra[field];
      } else if (field.startsWith('_iframe:')) {
        var ifr = findElByPath(field.slice(8), sEl);
        if (ifr) ifr.src = extra[field];
      }
    });
  });
}

function applyEditableAttr(doc) {
  var SKIP_TAGS = { SCRIPT:1, STYLE:1, IMG:1, INPUT:1, SELECT:1, TEXTAREA:1,
                    IFRAME:1, SVG:1, CANVAS:1, NOSCRIPT:1, BR:1, HR:1 };
  var SKIP_PROP = { href: 1, src: 1, alt: 1 };
  doc.querySelectorAll('[data-builder-section]').forEach(function(sEl) {
    var sId = sEl.dataset.builderSection;
    sEl.querySelectorAll('*').forEach(function(el) {
      if (SKIP_TAGS[el.tagName]) return;
      if (el.closest('[contenteditable="true"]')) return;
      if (el.dataset.builderUi) return;
      var hasText = false;
      for (var n = 0; n < el.childNodes.length; n++) {
        if (el.childNodes[n].nodeType === 3 && el.childNodes[n].textContent.trim()) {
          hasText = true; break;
        }
      }
      if (!hasText) return;
      var mapped = getDomMapField(sId, el, sEl);
      if (mapped && SKIP_PROP[mapped.prop]) return;
      var fieldKey = mapped ? mapped.field : '_el:' + getElPath(el, sEl);
      var prop     = mapped ? mapped.prop  : 'innerHTML';
      makeEditable(el, sId, fieldKey, prop);
      if (el.tagName === 'A') el.addEventListener('click', preventEditNavigation);
    });
  });
  /* H1: 텍스트 없는 <a>(이미지 링크 등)도 탐색 차단 */
  doc.querySelectorAll('[data-builder-section] a').forEach(function(a) {
    if (!a.dataset.editNavBlocked) {
      a.dataset.editNavBlocked = '';
      a.addEventListener('click', preventEditNavigation);
    }
  });
}

function makeEditable(el, sId, field, prop) {
  if (el.hasAttribute('data-editable')) return;
  el.contentEditable = 'true';
  el.dataset.editable = '';
  el.dataset.builderSection = sId;
  el.dataset.builderField = field;
  el.dataset.builderProp = prop;
  el.addEventListener('focus', onEditableFocus);
  el.addEventListener('blur',  onEditableBlur);
}

function onEditableFocus(e) {
  var doc = getPreviewDoc();
  if (!doc) return;
  var sId = e.target.dataset.builderSection;
  doc.querySelectorAll('[data-builder-section].builder-section-active').forEach(function(s) {
    s.classList.remove('builder-section-active');
  });
  if (sId) {
    var sEl = doc.querySelector('[data-builder-section="' + sId + '"]');
    if (sEl) sEl.classList.add('builder-section-active');
  }
}

function onEditableBlur(e) {
  var el = e.target;
  var sId   = el.dataset.builderSection;
  var field = el.dataset.builderField;
  var prop  = el.dataset.builderProp;
  if (!sId || !field) return;
  var val = prop === 'textContent' ? el.textContent.trim() : el.innerHTML;
  if (field.startsWith('_el:')) {
    if (!sectionData[sId]) sectionData[sId] = {};
    if (!sectionData[sId]._extra) sectionData[sId]._extra = {};
    sectionData[sId]._extra[field] = val;
  } else {
    setFieldDirect(sId, field, val);
  }
  saveState();
}

function collectEditableValues(doc) {
  doc.querySelectorAll('[data-editable]').forEach(function(el) {
    var sId   = el.dataset.builderSection;
    var field = el.dataset.builderField;
    var prop  = el.dataset.builderProp;
    if (!sId || !field) return;
    var val = prop === 'textContent' ? el.textContent.trim() : el.innerHTML;
    if (field.startsWith('_el:')) {
      if (!sectionData[sId]) sectionData[sId] = {};
      if (!sectionData[sId]._extra) sectionData[sId]._extra = {};
      sectionData[sId]._extra[field] = val;
    } else {
      setFieldDirect(sId, field, val);
    }
  });
}

function setFieldDirect(sectionId, path, val) {
  if (!sectionData[sectionId]) sectionData[sectionId] = {};
  var parts = path.split('.');
  var obj = sectionData[sectionId];
  for (var i = 0; i < parts.length - 1; i++) {
    var k = isNaN(parts[i]) ? parts[i] : +parts[i];
    if (!obj[k] || typeof obj[k] !== 'object') obj[k] = isNaN(parts[i + 1]) ? {} : [];
    obj = obj[k];
  }
  var last = parts[parts.length - 1];
  obj[isNaN(last) ? last : +last] = val;
}

var previewReady = false;

document.getElementById('preview-frame').addEventListener('load', function() {
  previewReady = true;

  try {

    doc.querySelectorAll('a[href]').forEach(function(a) {

  });
  try { applyPosterLayout(this.contentDocument); } catch(e) {}

  if (!navLinks.length)    readNavFromPreview();

  renderNavPanel();
  renderTabPanel();
});

function getPreviewDoc() {
  try { return document.getElementById('preview-frame').contentDocument; } catch(e) { return null; }
}

function applyToPreview() {
  if (!previewReady) return;
  var doc = getPreviewDoc();
  if (!doc) return;

  /* 1. 섹션 show/hide + 개별 배경색 */
  sectionOrder.forEach(function(id) {
    var el = doc.querySelector('[data-builder-section="' + id + '"]');
    if (!el) return;
    el.style.display = sectionEnabled[id] ? '' : 'none';
    if (sectionBgColors[id]) {
      el.style.backgroundColor = sectionBgColors[id];
    }
  });

  /* 2. 섹션 순서 재배치 */
  var parent  = null;
  var anchors = {};

  sectionOrder.forEach(function(id) {
    var el = doc.querySelector('[data-builder-section="' + id + '"]');
    if (!el) return;
    if (!parent) parent = el.parentNode;
    var prev = el.previousElementSibling;
    if (prev && prev.tagName === 'A' && prev.classList.contains('href-height')) {
      anchors[id] = prev;
    }
  });

  if (!parent) return;

  sectionOrder.forEach(function(id) {
    var el = doc.querySelector('[data-builder-section="' + id + '"]');
    if (!el) return;
    if (anchors[id]) parent.appendChild(anchors[id]);
    parent.appendChild(el);
  });

  applyBtnStylesToPreview();
  applyPosterLayout(doc);
  if (!editMode) applyAllFieldsToPreview(); // 편집 모드 중엔 contenteditable 덮어쓰기 방지
}

function renderPatchNotes() {
  var body = document.getElementById('patch-body');
  body.innerHTML = '';
  PATCH_NOTES.forEach(function(entry, idx) {
    var item = document.createElement('div');
    item.className = 'pn-item' + (idx === 0 ? ' open' : '');
    item.innerHTML =
      '<button class="pn-date-btn" onclick="togglePatchItem(this.parentNode)">' +
        '<span class="pn-date">' + entry.date + '</span>' +
        '<span class="pn-arrow">▶</span>' +
      '</button>' +
      '<div class="pn-content"><ul>' +
        entry.items.map(function(t) { return '<li>' + t + '</li>'; }).join('') +
      '</ul></div>';
    body.appendChild(item);
  });
}

function togglePatchItem(item) {
  item.classList.toggle('open');
}

function togglePatchNotes() {
  var overlay = document.getElementById('patch-overlay');
  overlay.classList.toggle('open');
}

/* ── 초기화 ── */
loadState();
renderSectionList();
renderColorList();
