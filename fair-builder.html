/* ── 포맷팅 툴바 (Step C/D) ── */
var _savedRange = null;

function saveIframeSelection() {
  var doc = getPreviewDoc();
  if (!doc) return;
  var sel = doc.getSelection();
  if (sel && sel.rangeCount) _savedRange = sel.getRangeAt(0).cloneRange();
}

function restoreIframeSelection() {
  var doc = getPreviewDoc();
  if (!doc || !_savedRange) return;
  var sel = doc.getSelection();
  sel.removeAllRanges();
  sel.addRange(_savedRange);
}

/* 통합 포맷팅: 하나의 span에 모든 style 속성 누적 */
function applyUnifiedFormatting(styleProp, styleValue) {
  var doc = getPreviewDoc();
  if (!doc) return;

  var selection = doc.getSelection ? doc.getSelection() : window.getSelection();
  if (!selection.rangeCount) return;
  var range = selection.getRangeAt(0);

  if (range.collapsed) return;

  /* 선택된 범위 내에서 data-fmt-unified span 찾기 */
  var commonAncestor = range.commonAncestorContainer;
  var ancestorElement = commonAncestor.nodeType === 3 ? commonAncestor.parentElement : commonAncestor;
  var existingSpan = ancestorElement ? ancestorElement.closest('[data-fmt-unified]') : null;

  /* 기존 span이 있고 선택이 완전히 그 안에 있으면: style만 업데이트 */
  if (existingSpan && existingSpan.contains(range.startContainer) && existingSpan.contains(range.endContainer)) {
    existingSpan.style[styleProp] = styleValue;
    selection.removeAllRanges();
    return;
  }

  /* 새로운 span 생성 (처음 한 번만) */
  var contents = range.extractContents();
  var span = doc.createElement('span');
  span.setAttribute('data-fmt-unified', 'true');
  span.style[styleProp] = styleValue;
  span.appendChild(contents);

  range.insertNode(span);
  selection.removeAllRanges();
}

/* contenteditable 포맷팅 정리: <font> 태그만 제거 (data-fmt-unified는 유지) */
function cleanupFormattingInElement(el) {
  if (!el) return;

  /* 1. <font> 태그 제거 (execCommand로 인한 레거시 제거) */
  el.querySelectorAll('font').forEach(function(font) {
    while (font.firstChild) {
      font.parentNode.insertBefore(font.firstChild, font);
    }
    font.parentNode.removeChild(font);
  });

  /* 2. 비어있는 data-fmt-unified span 제거 */
  el.querySelectorAll('[data-fmt-unified]').forEach(function(span) {
    if (!span.textContent.trim() && !span.querySelector('img')) {
      while (span.firstChild) {
        span.parentNode.insertBefore(span.firstChild, span);
      }
      span.parentNode.removeChild(span);
    }
  });

  /* 3. contenteditable 요소 자체: 부모 스타일 상속 방지 */
  el.style.fontFamily = 'inherit';
  el.style.fontWeight = 'normal';
  el.style.fontSize = 'inherit';
}

function execFmt(cmd, value) {
  var doc = getPreviewDoc();
  if (!doc) return;
  doc.execCommand(cmd, false, value !== undefined ? value : null);
}

function execFmtLink() {
  var doc = getPreviewDoc();
  if (!doc) return;
  var sel = doc.getSelection();
  var url = prompt('링크 URL 입력:', 'https://');
  if (!url) return;
  doc.execCommand('createLink', false, url);
  /* 새 탭 열기 처리 */
  sel = doc.getSelection();
  if (sel && sel.rangeCount) {
    var node = sel.getRangeAt(0).commonAncestorContainer;
    var a = (node.nodeType === 1 ? node : node.parentElement);
    a = a.closest ? a.closest('a') : (a.tagName === 'A' ? a : null);
    if (a) { a.target = '_blank'; a.rel = 'noopener'; }
  }
}

function execFmtFontName(name) {
  if (!name) return;
  applyUnifiedFormatting('fontFamily', name);
}

function execFmtFontSize(px) {
  px = parseInt(px, 10);
  if (!px || px < 1) return;
  applyUnifiedFormatting('fontSize', px + 'px');
}

/* 메인 비주얼: 폰트 굵기 적용 (선택된 부분만) */
function execFmtFontWeight(weight) {
  if (!weight) return;
  applyUnifiedFormatting('fontWeight', weight);
}

/* 포맷팅 툴바: 폰트별 굵기 옵션 동적 업데이트 */
function updateFmtWeightOptions() {
  var fontSelect = document.getElementById('fmt-font');
  var weightSelect = document.getElementById('fmt-weight');
  if (!fontSelect || !weightSelect) return;

  var selectedFont = fontSelect.value;
  var fontObj = WEBFONTS.find(f => f.family === selectedFont.replace(/'/g, '"').replace(/"/g, "'"));

  if (!fontObj || !fontObj.weights) {
    /* 기본 weights */
    var defaultWeights = [400, 700];
    weightSelect.innerHTML = '<option value="">굵기</option>' +
      defaultWeights.map(w => '<option value="' + w + '" ' + (w === 400 ? 'selected' : '') + '>' + w + '</option>').join('');
    return;
  }

  /* 폰트별 가능한 weights 표시 */
  weightSelect.innerHTML = '<option value="">굵기</option>' +
    fontObj.weights.map(w => '<option value="' + w + '" ' + (w === 400 ? 'selected' : '') + '>' + w + '</option>').join('');
}

function execFmtLineHeight(lh) {
  lh = parseFloat(lh);
  if (!lh) return;
  applyUnifiedFormatting('lineHeight', lh);
}

function insertElement(tag) {
  var doc = getPreviewDoc();
  if (!doc) return;
  var el = doc.createElement(tag);
  el.innerHTML = '&#8203;'; /* zero-width space for caret positioning */
  doc.execCommand('insertHTML', false, el.outerHTML);
}

function insertInlineEl(tag) {
  var doc = getPreviewDoc();
  if (!doc) return;
  var sel = doc.getSelection();
  if (!sel || !sel.rangeCount) return;
  var range = sel.getRangeAt(0);
  var text = range.toString();
  if (text) {
    doc.execCommand('insertHTML', false, '<' + tag + '>' + text + '</' + tag + '>');
  } else {
    doc.execCommand('insertHTML', false, '<' + tag + '>&#8203;</' + tag + '>');
  }
}

/* ── 섹션 드래그 순서 변경 (Step F) ── */
window.sectionDragReorder = function(fromId, toId) {
  var fromIdx = sectionOrder.indexOf(fromId);
  var toIdx   = sectionOrder.indexOf(toId);
  if (fromIdx < 0 || toIdx < 0 || fromIdx === toIdx) return;
  sectionOrder.splice(fromIdx, 1);
  sectionOrder.splice(toIdx, 0, fromId);
  saveState();
  applyToPreview();
  renderSectionList();
};

function injectSectionDragHandles(doc) {
  sectionOrder.forEach(function(sId) {
    var sEl = doc.querySelector('[data-builder-section="' + sId + '"]');
    if (!sEl || doc.getElementById('builder-sec-handle-' + sId)) return;
    var schema = FAIR_BUILDER_SCHEMA[sId];
    var name = schema ? schema.name : sId;

    var handle = doc.createElement('div');
    handle.id = 'builder-sec-handle-' + sId;
    handle.setAttribute('data-builder-ui', '');
    handle.draggable = true;
    handle.dataset.handleFor = sId;
    handle.style.cssText = 'display:flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(0,0,0,.45);position:relative;z-index:98;cursor:grab;user-select:none;color:rgba(255,255,255,.65);font-size:11px;font-family:sans-serif;';

    var hIcon = doc.createElement('span');
    hIcon.textContent = '⠿';
    hIcon.setAttribute('data-builder-ui', '');
    hIcon.style.cssText = 'font-size:13px;opacity:.55;';

    var hName = doc.createElement('span');
    hName.textContent = name + ' 섹션';
    hName.setAttribute('data-builder-ui', '');

    handle.appendChild(hIcon);
    handle.appendChild(hName);

    handle.addEventListener('dragstart', function(e) {
      e.dataTransfer.setData('text/plain', sId);
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(function() { handle.style.opacity = '.45'; }, 0);
    });
    handle.addEventListener('dragend', function() {
      handle.style.opacity = '';
      doc.querySelectorAll('[data-builder-section]').forEach(function(s) {
        s.style.outline = '';
        s.style.outlineOffset = '';
      });
    });

    /* H4: 핸들 외 영역에서 시작된 dragstart 차단 */
    sEl.addEventListener('dragstart', function(e) {
      if (!e.target.closest('[data-handle-for]')) {
        e.preventDefault();
        e.stopPropagation();
      }
    });

    sEl.addEventListener('dragover', function(e) {
      if (!editMode) return;
      e.preventDefault();
      sEl.style.outline = '3px dashed rgba(96,165,250,.55)';
      sEl.style.outlineOffset = '-3px';
    });
    sEl.addEventListener('dragleave', function() {
      sEl.style.outline = '';
      sEl.style.outlineOffset = '';
    });
    sEl.addEventListener('drop', function(e) {
      if (!editMode) return;
      e.preventDefault();
      sEl.style.outline = '';
      sEl.style.outlineOffset = '';
      var fromId = e.dataTransfer.getData('text/plain');
      if (fromId && fromId !== sId) window.parent.sectionDragReorder(fromId, sId);
    });

    sEl.insertAdjacentElement('afterbegin', handle);
  });
}

function removeSectionDragHandles(doc) {
  doc.querySelectorAll('[data-handle-for]').forEach(function(el) { el.remove(); });
  doc.querySelectorAll('[data-builder-section]').forEach(function(sEl) {
    sEl.style.outline = '';
    sEl.style.outlineOffset = '';
  });
}

/* ── 버튼 배너 인라인 편집 (Step B-btn) ── */
window.builderBtnAction = function(action, idx, extra) {
  var bs = buttonStyles['section_gradient'];
  if (action === 'delete') {
    if (bs.length <= 1) return;
    bs.splice(idx, 1);
    saveState(); syncBtnDOM(); refreshBtnEditCards(); closeBtnSettingsPanel();
  } else if (action === 'add') {
    if (bs.length >= 4) return;
    bs.push({ text: '새 버튼', href: '', width: '39.683%', bgColor: '#f46d80',
              shadowEnabled: false, shadowColor: '#D94E62',
              hoverEnabled: false, hoverBgColor: '#f78797', hoverShadowColor: '#bd3d50' });
    saveState(); syncBtnDOM(); refreshBtnEditCards();
  } else if (action === 'reorder') {
    var from = extra.from, to = extra.to;
    if (from < 0 || to < 0 || from >= bs.length || to >= bs.length) return;
    var moved = bs.splice(from, 1)[0];
    bs.splice(to, 0, moved);
    saveState(); syncBtnDOM(); refreshBtnEditCards();
  } else if (action === 'settings') {
    openBtnSettingsPanel(idx);
  }
};

function syncBtnDOM() {
  var doc = getPreviewDoc();
  if (!doc) return;
  var group = doc.querySelector('[data-builder-section="section_gradient"] .btn-group');
  if (!group) return;
  var bs = buttonStyles['section_gradient'] || [];
  var existing = Array.from(group.querySelectorAll('.round-btn'));
  while (existing.length < bs.length) {
    var a = doc.createElement('a');
    a.className = 'round-btn';
    a.href = '#';
    a.target = '_blank';
    group.appendChild(a);
    existing.push(a);
  }
  while (existing.length > bs.length) {
    var rem = existing.pop();
    rem.removeEventListener('focus', onEditableFocus);
    rem.removeEventListener('blur',  onEditableBlur);
    rem.removeAttribute('data-editable');
    rem.removeAttribute('contenteditable');
    rem.remove();
  }
  applyBtnStylesToPreview();
  if (editMode) applyEditableAttr(doc);
}

function injectBtnEditUI(doc) {
  var sEl = doc.querySelector('[data-builder-section="section_gradient"]');
  if (!sEl) return;
  removeBtnEditUI(doc);
  var ui = doc.createElement('div');
  ui.id = 'builder-btn-edit-ui';
  ui.setAttribute('data-builder-ui', '');
  ui.style.cssText = 'display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:8px 16px;background:rgba(0,0,0,.62);position:relative;z-index:100;';
  var bs = buttonStyles['section_gradient'] || [];
  bs.forEach(function(b, i) { ui.appendChild(makeBeuCard(doc, b, i)); });
  var addBtn = doc.createElement('button');
  addBtn.className = 'beu-add';
  addBtn.setAttribute('data-builder-ui', '');
  addBtn.textContent = '＋ 버튼 추가';
  addBtn.disabled = bs.length >= 4;
  addBtn.style.cssText = 'padding:4px 12px;background:#0066cc;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;flex-shrink:0;';
  addBtn.addEventListener('click', function() { window.parent.builderBtnAction('add'); });
  ui.appendChild(addBtn);
  sEl.insertAdjacentElement('afterbegin', ui);
}

function removeBtnEditUI(doc) {
  var ui = doc.getElementById('builder-btn-edit-ui');
  if (ui) ui.remove();
  closeBtnSettingsPanel();
}

function refreshBtnEditCards() {
  var doc = getPreviewDoc();
  if (!doc) return;
  var ui = doc.getElementById('builder-btn-edit-ui');
  if (!ui) return;
  var bs = buttonStyles['section_gradient'] || [];
  Array.from(ui.querySelectorAll('.beu-card')).forEach(function(c) { c.remove(); });
  var addBtn = ui.querySelector('.beu-add');
  bs.forEach(function(b, i) { ui.insertBefore(makeBeuCard(doc, b, i), addBtn); });
  if (addBtn) addBtn.disabled = bs.length >= 4;
}

function makeBeuCard(doc, b, i) {
  var card = doc.createElement('div');
  card.className = 'beu-card';
  card.draggable = true;
  card.dataset.beuIdx = String(i);
  card.setAttribute('data-builder-ui', '');
  card.style.cssText = 'display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.2);border-radius:6px;padding:4px 8px;color:#fff;font-size:12px;user-select:none;cursor:grab;';

  var handle = doc.createElement('span');
  handle.textContent = '⠿';
  handle.setAttribute('data-builder-ui', '');
  handle.style.cssText = 'opacity:.6;';

  var label = doc.createElement('span');
  label.textContent = b.text || ('버튼 ' + (i + 1));
  label.setAttribute('data-builder-ui', '');
  label.style.cssText = 'max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';

  var settingsBtn = doc.createElement('button');
  settingsBtn.setAttribute('data-builder-ui', '');
  settingsBtn.textContent = '⚙';
  settingsBtn.style.cssText = 'background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:3px;padding:1px 5px;cursor:pointer;font-size:11px;flex-shrink:0;';
  settingsBtn.addEventListener('click', function(e) { e.stopPropagation(); window.parent.builderBtnAction('settings', i); });

  var deleteBtn = doc.createElement('button');
  deleteBtn.setAttribute('data-builder-ui', '');
  deleteBtn.textContent = '✕';
  deleteBtn.style.cssText = 'background:rgba(239,68,68,.25);border:none;color:#fca5a5;border-radius:3px;padding:1px 5px;cursor:pointer;font-size:11px;flex-shrink:0;';
  deleteBtn.addEventListener('click', function(e) { e.stopPropagation(); window.parent.builderBtnAction('delete', i); });

  card.addEventListener('dragstart', function(e) {
    e.dataTransfer.setData('text/plain', String(i));
    setTimeout(function() { card.style.opacity = '.4'; }, 0);
  });
  card.addEventListener('dragend', function() { card.style.opacity = ''; card.style.outline = ''; });
  card.addEventListener('dragover', function(e) { e.preventDefault(); card.style.outline = '2px dashed #60a5fa'; });
  card.addEventListener('dragleave', function() { card.style.outline = ''; });
  card.addEventListener('drop', function(e) {
    e.preventDefault(); card.style.outline = '';
    var from = +e.dataTransfer.getData('text/plain');
    var to = +card.dataset.beuIdx;
    if (from !== to) window.parent.builderBtnAction('reorder', null, { from: from, to: to });
  });

  card.appendChild(handle);
  card.appendChild(label);
  card.appendChild(settingsBtn);
  card.appendChild(deleteBtn);
  return card;
}

/* ── 버튼 설정 패널 (부모 프레임 플로팅) ── */
var activeBtnIdx = -1;

function openBtnSettingsPanel(idx) {
  activeBtnIdx = idx;
  var b = (buttonStyles['section_gradient'] || [])[idx];
  if (b === undefined) return;
  var panel = getBtnSettingsPanel();
  panel.innerHTML = buildBtnSettingsPanelHTML(idx, b);
  panel.style.display = '';
}

function closeBtnSettingsPanel() {
  var panel = document.getElementById('btn-settings-panel');
  if (panel) panel.style.display = 'none';
  activeBtnIdx = -1;
}

function getBtnSettingsPanel() {
  var panel = document.getElementById('btn-settings-panel');
  if (!panel) {
    panel = document.createElement('div');
    panel.id = 'btn-settings-panel';
    panel.style.cssText = 'position:fixed;right:20px;top:80px;width:256px;background:#1e2433;border:1px solid #2e3a52;border-radius:8px;padding:14px;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.6);font-size:12px;color:#e5e7eb;display:none;';
    document.body.appendChild(panel);
  }
  return panel;
}

function buildBtnSettingsPanelHTML(idx, b) {
  var h = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">' +
    '<strong style="font-size:13px;">버튼 ' + (idx + 1) + ' 설정</strong>' +
    '<button onclick="closeBtnSettingsPanel()" style="background:none;border:none;color:#9ca3af;cursor:pointer;font-size:16px;line-height:1;padding:0;">✕</button>' +
    '</div>';
  h += bspRow('버튼 텍스트', '<input type="text" class="bsp-input" value="' + esc(b.text) + '" oninput="updateBtnField(' + idx + ',\'text\',this.value)">');
  h += bspRow('링크 URL', '<input type="text" class="bsp-input" value="' + esc(b.href) + '" oninput="updateBtnField(' + idx + ',\'href\',this.value)">');
  h += bspRow('너비', '<input type="text" class="bsp-input" value="' + esc(b.width) + '" placeholder="예: 40% / 320px" oninput="updateBtnField(' + idx + ',\'width\',this.value)">');
  h += bspColorRow(idx, 'bgColor', b.bgColor, '배경색');
  h += '<div style="display:flex;align-items:center;gap:8px;margin:6px 0;">' +
    '<span style="flex:1;color:#9ca3af;">인셋 쉐도우</span>' +
    '<label class="toggle"><input type="checkbox" ' + (b.shadowEnabled ? 'checked' : '') + ' onchange="updateBtnField(' + idx + ',\'shadowEnabled\',this.checked)"><span class="toggle-slider"></span></label>' +
    bspColorSwatch(idx, 'shadowColor', b.shadowColor) +
    '</div>';
  h += '<div style="display:flex;align-items:center;gap:8px;margin:6px 0;">' +
    '<span style="flex:1;color:#9ca3af;">호버 효과 <span style="font-size:10px;color:#4b5563;">PC</span></span>' +
    '<label class="toggle"><input type="checkbox" ' + (b.hoverEnabled ? 'checked' : '') + ' onchange="updateBtnField(' + idx + ',\'hoverEnabled\',this.checked);var s=document.getElementById(\'bsp-hover-sub\');if(s)s.style.display=this.checked?\'\':\'none\'"><span class="toggle-slider"></span></label>' +
    '</div>';
  h += '<div id="bsp-hover-sub" style="' + (b.hoverEnabled ? '' : 'display:none') + '">';
  h += bspColorRow(idx, 'hoverBgColor', b.hoverBgColor, '호버 배경색');
  h += bspColorRow(idx, 'hoverShadowColor', b.hoverShadowColor, '호버 쉐도우색');
  h += '</div>';
  return h;
}

function bspRow(label, inputHtml) {
  return '<div style="margin:6px 0;"><div style="color:#9ca3af;margin-bottom:3px;">' + label + '</div>' + inputHtml + '</div>';
}

function bspColorSwatch(idx, key, val) {
  return '<div style="width:22px;height:22px;border-radius:3px;border:1px solid #374151;background:' + val + ';position:relative;overflow:hidden;cursor:pointer;flex-shrink:0;">' +
    '<input type="color" value="' + val + '" style="opacity:0;position:absolute;inset:0;cursor:pointer;width:100%;height:100%;" ' +
    'oninput="updateBtnField(' + idx + ',\'' + key + '\',this.value);this.parentNode.style.background=this.value;">' +
    '</div>';
}

function bspColorRow(idx, key, val, label) {
  return '<div style="margin:6px 0;"><div style="color:#9ca3af;margin-bottom:3px;">' + label + '</div>' +
    '<div style="display:flex;gap:6px;align-items:center;">' +
    bspColorSwatch(idx, key, val) +
    '<input type="text" class="bsp-input" value="' + val + '" maxlength="7" style="width:76px !important;" ' +
    'oninput="if(/^#[0-9a-fA-F]{6}$/.test(this.value)){updateBtnField(' + idx + ',\'' + key + '\',this.value);var sw=this.previousElementSibling;sw.style.background=this.value;sw.querySelector(\'input[type=color]\').value=this.value}">' +
    '</div></div>';
}

function updateBtnField(idx, key, val) {
  var bs = buttonStyles['section_gradient'];
  if (!bs || bs[idx] === undefined) return;
  bs[idx][key] = val;
  saveState();
  syncBtnDOM();
  if (key === 'text') {
    var doc = getPreviewDoc();
    if (doc) {
      var cards = doc.querySelectorAll('.beu-card');
      var card = cards[idx];
      if (card) {
        var spans = Array.from(card.querySelectorAll('span[data-builder-ui]'));
        var lbl = spans.find(function(s) { return s.textContent !== '⠿'; });
        if (lbl) lbl.textContent = val || ('버튼 ' + (idx + 1));
      }
    }
  }
}

/* ── CSS 색상 피커 렌더링 ── */
function renderColorList() {
  var list = document.getElementById('color-list');
  list.innerHTML = '';
  Object.keys(FAIR_BUILDER_COLORS).forEach(function(varName) {
    var cfg = FAIR_BUILDER_COLORS[varName];
    var val = cssColors[varName] || cfg.default;
    var item = document.createElement('div');
    item.className = 'color-item';
    item.innerHTML =
      '<label>' + cfg.label + '<br><span style="color:#4b5563;font-size:10px;">' + varName + '</span></label>' +
      '<div class="color-preview" style="background:' + val + ';">' +
        '<input type="color" value="' + val + '" data-var="' + varName + '" oninput="onColorChange(this)">' +
      '</div>' +
      '<input class="hex-input" type="text" value="' + val + '" data-var="' + varName + '" maxlength="7" oninput="onHexChange(this)" placeholder="#000000">';
    list.appendChild(item);
  });
}

function onColorChange(input) {
  var hex = input.value;
  var varName = input.dataset.var;
  cssColors[varName] = hex;
  var wrap = input.closest('.color-item');
  wrap.querySelector('.color-preview').style.background = hex;
  wrap.querySelector('.hex-input').value = hex;
  saveState();
  applyColorToPreview(varName, hex);
}

function onHexChange(input) {
  var hex = input.value;
  if (!/^#[0-9a-fA-F]{6}$/.test(hex)) return;
  var varName = input.dataset.var;
  cssColors[varName] = hex;
  var wrap = input.closest('.color-item');
  wrap.querySelector('input[type=color]').value = hex;
  wrap.querySelector('.color-preview').style.background = hex;
  saveState();
  applyColorToPreview(varName, hex);
}

function applyColorToPreview(varName, value) {
  try { document.getElementById('preview-frame').contentDocument.documentElement.style.setProperty(varName, value); } catch(e) {}
}

/* ── 포스터 레이아웃 (Step G) ── */
function applyPosterLayout(doc) {
  var styleId = 'builder-poster-layout';
  var tag = doc.getElementById(styleId);
  if (!tag) {
    tag = doc.createElement('style');
    tag.id = styleId;
    doc.head.appendChild(tag);
  }
  if (posterConfig === 'online') {
    tag.textContent = '.poster-box.type--offline{display:none!important}' +
      '.poster-box-wrap .poster-box.type--online{width:100%!important}';
  } else if (posterConfig === 'offline') {
    tag.textContent = '.poster-box.type--online{display:none!important}' +
      '.poster-box-wrap .poster-box.type--offline{width:100%!important}';
  } else {
    tag.textContent = '';
  }
}

function setPosterConfig(val) {
  posterConfig = val;
  saveState();
  var doc = getPreviewDoc();
  if (doc) applyPosterLayout(doc);
  if (openEditPanelId === 'section_event_info') {
    var body = document.getElementById('edit-drawer-body');
    if (body) {
      loadFieldsFromPreview('section_event_info');
      body.innerHTML = buildSectionPanel('section_event_info');
    }
  }
}

function buildPosterLayoutCtrl() {
  var configs = [
    { val: 'both',    label: '온+오프 (2개)' },
    { val: 'online',  label: '온라인만' },
    { val: 'offline', label: '오프라인만' },
  ];
  var h = '<div class="ep-title" style="margin-top:6px;font-size:10px;">포스터 레이아웃</div>' +
    '<div style="display:flex;gap:4px;margin-bottom:10px;">';
  configs.forEach(function(c) {
    var active = posterConfig === c.val;
    h += '<button onclick="setPosterConfig(\'' + c.val + '\')" style="flex:1;padding:5px 2px;font-size:10px;border-radius:4px;' +
      'border:1px solid ' + (active ? '#0066cc' : '#2e3a52') + ';' +
      'background:' + (active ? '#0066cc' : 'transparent') + ';' +
      'color:' + (active ? '#fff' : '#9ca3af') + ';cursor:pointer;">' + c.label + '</button>';
  });
  h += '</div>';
  return h;
}

/* ── 편집 모드 ── */
function toggleEditMode() {
  if (editMode) { exitEditMode(); } else { enterEditMode(); }
}

function enterEditMode() {
  if (!previewReady) { alert('미리보기가 로드된 후 편집 모드를 사용하세요.'); return; }
  var doc = getPreviewDoc();
  if (!doc) return;
  doc.body.classList.add('builder-edit-mode');
  injectEditModeCSS(doc);
  restoreExtraEdits(doc);
  applyEditableAttr(doc);
  injectSectionDragHandles(doc);
  injectBtnEditUI(doc);
  applyImageEditListeners(doc);   /* E1 */
  applyYoutubeEditListeners(doc); /* E2 */
  editMode = true;
  document.getElementById('edit-mode-btn').classList.add('active');
  document.getElementById('edit-mode-btn').textContent = '✕ 편집 종료';
  document.getElementById('edit-mode-badge').classList.add('show');
  document.getElementById('format-toolbar').classList.add('show');
}

function exitEditMode() {
  var doc = getPreviewDoc();
  if (!doc) return;
  removeBtnEditUI(doc);
  removeSectionDragHandles(doc);
  collectEditableValues(doc);
  doc.querySelectorAll('[data-editable]').forEach(function(el) {
    el.removeEventListener('focus', onEditableFocus);
    el.removeEventListener('blur',  onEditableBlur);
    el.removeAttribute('contenteditable');
    el.removeAttribute('data-editable');
    el.removeAttribute('data-builder-section');
    el.removeAttribute('data-builder-field');
    el.removeAttribute('data-builder-prop');
  });
  doc.querySelectorAll('.builder-section-active').forEach(function(s) {
    s.classList.remove('builder-section-active');
  });
  doc.body.classList.remove('builder-edit-mode');
  var styleEl = doc.getElementById('builder-edit-css');
  if (styleEl) styleEl.parentNode.removeChild(styleEl);
  saveState();
  editMode = false;
  document.getElementById('edit-mode-btn').classList.remove('active');
  document.getElementById('edit-mode-btn').textContent = '✏ 편집 모드';
  document.getElementById('edit-mode-badge').classList.remove('show');
  document.getElementById('format-toolbar').classList.remove('show');
}

/* ── 편집 경로 헬퍼 ── */
function getElPath(el, root) {
  var parts = [];
  var cur = el;
  while (cur && cur !== root) {
    var tag = cur.tagName.toLowerCase();
    var siblings = cur.parentNode ? Array.prototype.filter.call(
      cur.parentNode.children, function(c) { return c.tagName === cur.tagName; }
    ) : [];
    parts.unshift(tag + ':' + siblings.indexOf(cur));
    cur = cur.parentNode;
  }
  return parts.join('/');
}

function findElByPath(path, root) {
  var parts = path.split('/');
  var cur = root;
  for (var i = 0; i < parts.length; i++) {
    var m = parts[i].match(/^([a-z0-9]+):(\d+)$/);
    if (!m || !cur) return null;
    var tag = m[1].toUpperCase();
    var idx = +m[2];
    var children = Array.prototype.filter.call(
      cur.children, function(c) { return c.tagName === tag; }
    );
    cur = children[idx] || null;
  }
  return cur;
}

function getDomMapField(sId, el, sEl) {
  var map = SECTION_DOM_MAP[sId];
  if (!map) return null;
  var SKIP_PROP = { href: 1, src: 1, alt: 1 };
  for (var fk in map) {
    var m = map[fk];
    if (m._repeater) {
      var found = null;
      sEl.querySelectorAll(m.container).forEach(function(node, i) {
        if (found) return;
        for (var sfk in m.fields) {
          var fm = m.fields[sfk];
          if (SKIP_PROP[fm.prop]) continue;
          var target = fm.sel ? node.querySelector(fm.sel) : node;
          if (target === el) { found = { field: fk + '.' + i + '.' + sfk, prop: fm.prop }; return; }
        }
      });
      if (found) return found;
    } else {
      if (SKIP_PROP[m.prop]) continue;
      if (m.sel && sEl.querySelector(m.sel) === el) return { field: fk, prop: m.prop };
    }
  }
  return null;
}

function ytToEmbed(url) {
  if (url.includes('/embed/')) return url;
  var m = url.match(/[?&]v=([A-Za-z0-9_-]+)/);
  if (m) return 'https://www.youtube.com/embed/' + m[1];
  var m2 = url.match(/youtu\.be\/([A-Za-z0-9_-]+)/);
  if (m2) return 'https://www.youtube.com/embed/' + m2[1];
  return url;
}

/* 공통: _extra 경로 저장 헬퍼 */
function _saveExtraPath(sId, prefix, el, val) {
  if (!sId) return;

  if (!sEl) return;
  if (!sectionData[sId]) sectionData[sId] = {};
  if (!sectionData[sId]._extra) sectionData[sId]._extra = {};
  sectionData[sId]._extra[prefix + getElPath(el, sEl)] = val;
  saveState();
}

var _miniModalApply = null;

function restoreExtraEdits(doc) {
  Object.keys(sectionData).forEach(function(sId) {
    var extra = sectionData[sId] && sectionData[sId]._extra;
    if (!extra) return;
    var sEl = doc.querySelector('[data-builder-section="' + sId + '"]');
    if (!sEl) return;
    Object.keys(extra).forEach(function(field) {
      if (field.startsWith('_el:')) {
        var el = findElByPath(field.slice(4), sEl);
        if (el) el.innerHTML = extra[field];
      } else if (field.startsWith('_img:')) {
        var img = findElByPath(field.slice(5), sEl);
        if (img) img.src = extra[field];
      } else if (field.startsWith('_iframe:')) {
        var ifr = findElByPath(field.slice(8), sEl);
        if (ifr) ifr.src = extra[field];
      }
    });
  });
}

function applyEditableAttr(doc) {
  var SKIP_TAGS = { SCRIPT:1, STYLE:1, IMG:1, INPUT:1, SELECT:1, TEXTAREA:1,
                    IFRAME:1, SVG:1, CANVAS:1, NOSCRIPT:1, BR:1, HR:1 };
  var SKIP_PROP = { href: 1, src: 1, alt: 1 };
  doc.querySelectorAll('[data-builder-section]').forEach(function(sEl) {
    var sId = sEl.dataset.builderSection;
    sEl.querySelectorAll('*').forEach(function(el) {
      if (SKIP_TAGS[el.tagName]) return;
      if (el.closest('[contenteditable="true"]')) return;
      if (el.dataset.builderUi) return;
      var hasText = false;
      for (var n = 0; n < el.childNodes.length; n++) {
        if (el.childNodes[n].nodeType === 3 && el.childNodes[n].textContent.trim()) {
          hasText = true; break;
        }
      }
      if (!hasText) return;
      var mapped = getDomMapField(sId, el, sEl);
      if (mapped && SKIP_PROP[mapped.prop]) return;
      var fieldKey = mapped ? mapped.field : '_el:' + getElPath(el, sEl);
      var prop     = mapped ? mapped.prop  : 'innerHTML';
      makeEditable(el, sId, fieldKey, prop);
      if (el.tagName === 'A') el.addEventListener('click', preventEditNavigation);
    });
  });
  /* H1: 텍스트 없는 <a>(이미지 링크 등)도 탐색 차단 */
  doc.querySelectorAll('[data-builder-section] a').forEach(function(a) {
    if (!a.dataset.editNavBlocked) {
      a.dataset.editNavBlocked = '';
      a.addEventListener('click', preventEditNavigation);
    }
  });
}

function makeEditable(el, sId, field, prop) {
  if (el.hasAttribute('data-editable')) return;
  el.contentEditable = 'true';
  el.dataset.editable = '';
  el.dataset.builderSection = sId;
  el.dataset.builderField = field;
  el.dataset.builderProp = prop;
  el.addEventListener('focus', onEditableFocus);
  el.addEventListener('blur',  onEditableBlur);
}

function onEditableFocus(e) {
  var doc = getPreviewDoc();
  if (!doc) return;
  var sId = e.target.dataset.builderSection;
  doc.querySelectorAll('[data-builder-section].builder-section-active').forEach(function(s) {
    s.classList.remove('builder-section-active');
  });
  if (sId) {
    var sEl = doc.querySelector('[data-builder-section="' + sId + '"]');
    if (sEl) sEl.classList.add('builder-section-active');
  }
}

function onEditableBlur(e) {
  var el = e.target;
  var sId   = el.dataset.builderSection;
  var field = el.dataset.builderField;
  var prop  = el.dataset.builderProp;
  if (!sId || !field) return;

  /* 포맷팅 정리 (font 태그 제거 + nested span unwrap) */
  if (prop === 'innerHTML') {
    cleanupFormattingInElement(el);
  }

  var val = prop === 'textContent' ? el.textContent.trim() : el.innerHTML;
  if (field.startsWith('_el:')) {
    if (!sectionData[sId]) sectionData[sId] = {};
    if (!sectionData[sId]._extra) sectionData[sId]._extra = {};
    sectionData[sId]._extra[field] = val;
  } else {
    setFieldDirect(sId, field, val);
  }
  saveState();
}

function collectEditableValues(doc) {
  doc.querySelectorAll('[data-editable]').forEach(function(el) {
    var sId   = el.dataset.builderSection;
    var field = el.dataset.builderField;
    var prop  = el.dataset.builderProp;
    if (!sId || !field) return;

    /* 포맷팅 정리 (font 태그 제거 + nested span unwrap) */
    if (prop === 'innerHTML') {
      cleanupFormattingInElement(el);
    }

    var val = prop === 'textContent' ? el.textContent.trim() : el.innerHTML;
    if (field.startsWith('_el:')) {
      if (!sectionData[sId]) sectionData[sId] = {};
      if (!sectionData[sId]._extra) sectionData[sId]._extra = {};
      sectionData[sId]._extra[field] = val;
    } else {
      setFieldDirect(sId, field, val);
    }
  });
}

function setFieldDirect(sectionId, path, val) {
  if (!sectionData[sectionId]) sectionData[sectionId] = {};
  var parts = path.split('.');
  var obj = sectionData[sectionId];
  for (var i = 0; i < parts.length - 1; i++) {
    var k = isNaN(parts[i]) ? parts[i] : +parts[i];
    if (!obj[k] || typeof obj[k] !== 'object') obj[k] = isNaN(parts[i + 1]) ? {} : [];
    obj = obj[k];
  }
  var last = parts[parts.length - 1];
  obj[isNaN(last) ? last : +last] = val;
}

/* ── iframe 로드 후 처리 ── */
var previewReady = false;

document.getElementById('preview-frame').addEventListener('load', function() {
  previewReady = true;
  /* 모든 링크 새 탭으로 */
  try {
    var doc = this.contentDocument;

    });
  } catch(e) {}
  applyToPreview();
  /* 저장된 CSS 색상 + 포스터 레이아웃 복원 */
  Object.keys(cssColors).forEach(function(varName) {
    applyColorToPreview(varName, cssColors[varName]);
  });
  try { applyPosterLayout(this.contentDocument); } catch(e) {}
  /* S1/S2: 초기 읽기 (저장 상태 없을 때만) */
  if (!navLinks.length)    readNavFromPreview();
  if (!joblistTabs.length) readTabsFromPreview();
  applyNavToPreview();
  applyTabsToPreview();
  applySpacingToPreview();
  applyBgImagesToPreview();
  applyAdvancedStylesToPreview();
  applyAosToPreview();
  applyVisualRightToPreview();
  applyLogoImagesToPreview();
  renderVisualTexts();  /* Step 2: 메인 비주얼 텍스트 요소 렌더링 */
  renderNavPanel();
  renderTabPanel();
});

function getPreviewDoc() {
  try { return document.getElementById('preview-frame').contentDocument; } catch(e) { return null; }
}

function applyToPreview() {
  if (!previewReady) return;
  var doc = getPreviewDoc();
  if (!doc) return;

  /* 1. 섹션 show/hide + 개별 배경색 */
  sectionOrder.forEach(function(id) {
    var el = doc.querySelector('[data-builder-section="' + id + '"]');
    if (!el) return;
    el.style.display = sectionEnabled[id] ? '' : 'none';
    if (sectionBgColors[id]) {
      el.style.backgroundColor = sectionBgColors[id];
      /* section_gradient는 CSS linear-gradient 덮어써야 색 보임 */
      if (id === 'section_gradient') el.style.backgroundImage = 'none';
    } else {
      el.style.backgroundColor = '';
      if (id === 'section_gradient') el.style.backgroundImage = '';
    }
  });

  /* 2. 섹션 순서 재배치 */
  var parent  = null;
  var anchors = {};

  sectionOrder.forEach(function(id) {
    var el = doc.querySelector('[data-builder-section="' + id + '"]');
    if (!el) return;
    if (!parent) parent = el.parentNode;
    var prev = el.previousElementSibling;
    if (prev && prev.tagName === 'A' && prev.classList.contains('href-height')) {
      anchors[id] = prev;
    }
  });

  if (!parent) return;

  sectionOrder.forEach(function(id) {
    var el = doc.querySelector('[data-builder-section="' + id + '"]');
    if (!el) return;
    if (anchors[id]) parent.appendChild(anchors[id]);
    parent.appendChild(el);
  });

  applyBtnStylesToPreview();
  applyPosterLayout(doc);
  applyAdvancedStylesToPreview();
  if (!editMode) applyAllFieldsToPreview(); // 편집 모드 중엔 contenteditable 덮어쓰기 방지
}

/* ── M1: 멀티 프로젝트 히스토리 ── */
var PROJECTS_KEY = 'fair_builder_projects_v1';

function getProjects() {
  try { return JSON.parse(localStorage.getItem(PROJECTS_KEY)) || []; } catch(e) { return []; }
}

function saveProject() {
  var name = document.getElementById('proj-name-input').value.trim();
  if (!name) { alert('프로젝트 이름을 입력하세요.'); return; }
  var code = document.getElementById('fair-code').value.trim();
  var raw  = localStorage.getItem(STATE_KEY);
  var projects = getProjects();
  var id = Date.now().toString(36);
  var now = new Date();
  var savedAt = now.getFullYear() + '.' +
    String(now.getMonth()+1).padStart(2,'0') + '.' +
    String(now.getDate()).padStart(2,'0') + ' ' +
    String(now.getHours()).padStart(2,'0') + ':' +
    String(now.getMinutes()).padStart(2,'0');
  projects.unshift({ id: id, name: name, code: code, savedAt: savedAt, state: raw });
  localStorage.setItem(PROJECTS_KEY, JSON.stringify(projects));
  document.getElementById('proj-name-input').value = '';
  renderProjectList();
}

function loadProject(id) {
  if (!confirm('현재 작업이 저장된 프로젝트로 교체됩니다. 계속하시겠습니까?')) return;
  var projects = getProjects();
  var proj = projects.find(function(p) { return p.id === id; });
  if (!proj || !proj.state) return;
  localStorage.setItem(STATE_KEY, proj.state);
  closeProjectPanel();
  location.reload();
}

function deleteProject(id) {
  if (!confirm('이 프로젝트를 삭제하시겠습니까?')) return;
  var projects = getProjects().filter(function(p) { return p.id !== id; });
  localStorage.setItem(PROJECTS_KEY, JSON.stringify(projects));
  renderProjectList();
}

function renderProjectList() {
  var list = document.getElementById('project-list');
  if (!list) return;
  var projects = getProjects();
  if (!projects.length) {
    list.innerHTML = '<div class="proj-empty">저장된 프로젝트가 없습니다.</div>';
    return;
  }
  list.innerHTML = projects.map(function(p) {
    return '<div class="proj-item">' +
      '<div class="proj-item-info">' +
        '<span class="proj-item-name">' + esc(p.name) + '</span>' +
        '<span class="proj-item-meta">' + esc(p.code || '-') + ' · ' + esc(p.savedAt) + '</span>' +
      '</div>' +
      '<div class="proj-item-actions">' +
        '<button class="proj-btn-load" onclick="loadProject(\'' + p.id + '\')">불러오기</button>' +
        '<button class="proj-btn-del" onclick="deleteProject(\'' + p.id + '\')">삭제</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

function openProjectPanel() {
  renderProjectList();
  document.getElementById('project-overlay').classList.add('open');
}

function closeProjectPanel() {
  document.getElementById('project-overlay').classList.remove('open');
}

/* ── Step 6: 파일 내보내기 ── */
function getFileBaseName() {
  var code = document.getElementById('fair-code').value.trim() || 'unnamed';
  return 'fair_2026_' + code;
}

function downloadBlob(filename, blob) {
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function() { URL.revokeObjectURL(a.href); }, 200);
}

function downloadText(filename, content, mime) {
  downloadBlob(filename, new Blob([content], { type: mime || 'text/plain; charset=utf-8' }));
}

/* ── Step 6-A: 오버라이드 CSS 생성 ── */
function buildOverrideCSS() {
  var css = '/* ═══════════════════════════════════════════\n';
  css += ' * Fair Builder 생성 오버라이드\n';
  css += ' * 생성: ' + new Date().toISOString().slice(0,19).replace('T',' ') + '\n';
  css += ' * ═══════════════════════════════════════════ */\n\n';

  /* 1. CSS 변수 (:root) */
  var varEntries = Object.keys(cssColors).filter(function(k){ return cssColors[k]; })
    .map(function(k) { return '  ' + k + ': ' + cssColors[k] + ';'; });
  if (varEntries.length) css += ':root {\n' + varEntries.join('\n') + '\n}\n\n';

  /* 2. 섹션 배경색 */
  Object.keys(sectionBgColors).forEach(function(sId) {
    if (sectionBgColors[sId]) {
      var rules = 'background-color:' + sectionBgColors[sId] + ' !important;';
      if (sId === 'section_gradient') rules += 'background-image:none !important;';
      css += '[data-builder-section="' + sId + '"]{' + rules + '}\n';
    }
  });

  /* 3. 섹션 배경 이미지 */
  Object.keys(sectionBgImages).forEach(function(sId) {
    if (sectionBgImages[sId]) {
      css += '[data-builder-section="' + sId + '"]{' +
        'background-image:url("' + sectionBgImages[sId] + '") !important;' +
        'background-size:cover !important;' +
        'background-position:center !important;' +
        'background-repeat:no-repeat !important;' +
      '}\n';
    }
  });

  /* 4. 섹션 여백 */
  Object.keys(sectionSpacing).forEach(function(sId) {
    var sp = sectionSpacing[sId];
    var pc = [];
    if (sp.pt !== '' && sp.pt !== null) pc.push('padding-top:' + sp.pt + 'px !important');
    if (sp.pb !== '' && sp.pb !== null) pc.push('padding-bottom:' + sp.pb + 'px !important');
    if (pc.length) css += '[data-builder-section="' + sId + '"]{' + pc.join(';') + '}\n';
    var mo = [];
    if (sp.mpt !== '' && sp.mpt !== null) mo.push('padding-top:' + sp.mpt + 'px !important');
    if (sp.mpb !== '' && sp.mpb !== null) mo.push('padding-bottom:' + sp.mpb + 'px !important');
    if (mo.length) css += '@media(max-width:768px){[data-builder-section="' + sId + '"]{' + mo.join(';') + '}}\n';
  });

  /* 5. 로고 이미지 */
  if (logoImages.logo1) css += '.sec-wrap .logo_f{background-image:url("' + logoImages.logo1 + '") !important;}\n';
  if (logoImages.logo2) css += '.sec-wrap .logo_f2{background-image:url("' + logoImages.logo2 + '") !important;}\n';

  /* 6. 버튼 배너 스타일 */
  var btnStyles = buttonStyles.section_gradient || [];
  btnStyles.forEach(function(s, i) {
    if (!s) return;
    var sel = '[data-builder-section="section_gradient"] .round-btn:nth-of-type(' + (i+1) + ')';
    var rules = [];
    if (s.width)    rules.push('width:' + s.width);
    if (s.bgColor)  rules.push('background-color:' + s.bgColor);
    if (s.shadowEnabled && s.shadowColor) rules.push('box-shadow:-5px -5px 4px 0 ' + s.shadowColor + ' inset');
    if (rules.length) css += sel + '{' + rules.join(' !important;') + ' !important;}\n';
    if (s.hoverEnabled) {
      css += '@media(hover:hover) and (min-width:1025px){' + sel + ':hover{' +
        'background-color:' + s.hoverBgColor + ' !important;' +
        'box-shadow:-5px -5px 4px 0 ' + s.hoverShadowColor + ' inset !important;' +
      '}}\n';
    }
  });

  /* 7. 포스터 레이아웃 */
  if (posterConfig === 'online') {
    css += '[data-builder-section="section_event_info"] .poster-box.offline{display:none !important;}\n';
    css += '[data-builder-section="section_event_info"] .poster-box.online{width:100% !important;}\n';
  } else if (posterConfig === 'offline') {
    css += '[data-builder-section="section_event_info"] .poster-box.online{display:none !important;}\n';
    css += '[data-builder-section="section_event_info"] .poster-box.offline{width:100% !important;}\n';
  }

  /* 8. 섹션 숨김 */
  sectionOrder.forEach(function(sId) {
    if (!sectionEnabled[sId]) {
      css += '[data-builder-section="' + sId + '"]{display:none !important;}\n';
    }
  });

  return css;
}

}

/* ── Step 6-B: ASP 클린업 생성 ── */
function buildExportASP() {
  var doc = getPreviewDoc();
  if (!doc) throw new Error('미리보기가 로드되지 않았습니다.');

  /* iframe 전체 DOM 복제 */
  var clone = doc.documentElement.cloneNode(true);

  /* 1. 빌더 주입 스타일 태그 제거 */
  ['builder-edit-css','builder-spacing-css','builder-bgimage-css',
   'builder-aos-disable','builder-logo-css','builder-btn-styles',
   'builder-poster-layout'].forEach(function(id) {
    var el = clone.querySelector('#' + id);
    if (el) el.parentNode.removeChild(el);
  });

  /* 2. 빌더 UI 요소 제거 */
  clone.querySelectorAll('[data-builder-ui]').forEach(function(el) { el.parentNode.removeChild(el); });
  clone.querySelectorAll('[data-handle-for]').forEach(function(el) { el.parentNode.removeChild(el); });

  /* 3. 편집 관련 속성/클래스 제거 */
  var editAttrs = ['contenteditable','data-editable','data-builder-field',
                   'data-builder-prop','data-img-edit-bound','data-yt-edit-bound',
                   'data-edit-nav-blocked'];
  clone.querySelectorAll('*').forEach(function(el) {
    editAttrs.forEach(function(a) { el.removeAttribute(a); });
    /* 편집 힌트 title 제거 */
    if (el.tagName === 'IMG' && el.title === '클릭하여 이미지 교체') el.removeAttribute('title');
    if (el.title === '클릭하여 YouTube URL 변경') el.removeAttribute('title');
  });
  if (clone.querySelector('body')) {
    clone.querySelector('body').classList.remove('builder-edit-mode');
  }
  clone.querySelectorAll('.builder-section-active').forEach(function(el) {
    el.classList.remove('builder-section-active');
  });

  /* 4. CSS 파일 링크를 내보낸 CSS로 교체 */
  var baseName = getFileBaseName();
  clone.querySelectorAll('link[rel="stylesheet"]').forEach(function(link) {
    var href = link.getAttribute('href') || '';
    if (href.indexOf('fair_2026_temp.css') !== -1) {
      link.setAttribute('href', '/ui/static/css/specialty/' + baseName + '.css');
    }
  });

  /* 5. 인라인 style에서 display:none 제거(실제 배포 시 CSS 오버라이드로 처리) */
  clone.querySelectorAll('[data-builder-section]').forEach(function(el) {
    if (el.style.display === 'none') el.style.display = '';
    if (el.style.backgroundColor) el.style.backgroundColor = ''; /* CSS 오버라이드에서 처리 */
  });

  /* 6. 직렬화 */
  var html = '<!DOCTYPE html>\n' + clone.outerHTML;
  /* ASP 파일 헤더 추가 */
  var aspHeader = '<%@ Language="VBScript" CodePage="65001" %>\n<% Response.Charset = "utf-8" %>\n';
  return aspHeader + html;
}

/* ── Step 6-B: ASP 다운로드 ── */
function exportASP() {
  try {
    var baseName = getFileBaseName();
    var asp = buildExportASP();
    downloadText(baseName + '.asp', asp, 'text/html; charset=utf-8');
  } catch(e) {
    alert('ASP 내보내기 실패: ' + e.message);
  }
}

/* ── Step 6-C: ZIP 일괄 다운로드 ── */
function exportZIP() {
  if (typeof JSZip === 'undefined') { alert('JSZip 라이브러리 로드 실패. 새로고침 후 다시 시도하세요.'); return; }
  var baseName = getFileBaseName();
  fetch('ui/static/css/specialty/fair_2026_temp.css')
    .then(function(r) { if (!r.ok) throw new Error('CSS 템플릿 로드 실패'); return r.text(); })
    .then(function(baseCss) {
      var zip = new JSZip();
      var finalCss = baseCss + '\n\n' + buildOverrideCSS();
      var asp = buildExportASP();
      zip.file(baseName + '.asp', asp);
      zip.file(baseName + '.css', finalCss);
      /* README */
      zip.file('README.txt',
        'Fair Builder 내보낸 파일\n' +
        '생성: ' + new Date().toISOString().slice(0,19).replace('T',' ') + '\n\n' +
        '파일:\n' +
        '  - ' + baseName + '.asp → event/ 폴더에 업로드\n' +
        '  - ' + baseName + '.css → ui/static/css/specialty/ 폴더에 업로드\n\n' +
        '※ ASP 파일은 UTF-8로 저장됩니다. 서버가 EUC-KR을 요구하면 변환 후 업로드하세요.\n'
      );
      return zip.generateAsync({ type: 'blob' });
    })
    .then(function(blob) {
      downloadBlob(baseName + '.zip', blob);
    })
    .catch(function(e) { alert('ZIP 내보내기 실패: ' + e.message); });
}

      '<strong>[v0.3.6]</strong> 버전 뱃지 추가 — 상단 바 박람회 코드 입력 옆 배포 버전 표시',
    ]
  }
];

function renderPatchNotes() {
  var body = document.getElementById('patch-body');
  body.innerHTML = '';
  PATCH_NOTES.forEach(function(entry, idx) {
    var item = document.createElement('div');
    item.className = 'pn-item' + (idx === 0 ? ' open' : '');
    item.innerHTML =
      '<button class="pn-date-btn" onclick="togglePatchItem(this.parentNode)">' +
        '<span class="pn-date">' + entry.date + '</span>' +
        '<span class="pn-arrow">▶</span>' +
      '</button>' +
      '<div class="pn-content"><ul>' +
        entry.items.map(function(t) { return '<li>' + t + '</li>'; }).join('') +
      '</ul></div>';
    body.appendChild(item);
  });
}

function togglePatchItem(item) {
  item.classList.toggle('open');
}

function togglePatchNotes() {
  var overlay = document.getElementById('patch-overlay');
  overlay.classList.toggle('open');
}

/* ── 초기화 ── */
loadState();
renderSectionList();
renderColorList();

  if (logoImages.logo2) { var el=document.getElementById('logo-url-logo2'); if(el) el.value=logoImages.logo2; var t=document.getElementById('logo-thumb-logo2'); if(t){t.src=logoImages.logo2;t.style.display='block';} }
