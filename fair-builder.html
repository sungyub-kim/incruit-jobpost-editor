<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fair Page Builder | 인크루트 박람회 빌더</title>
  <!-- 웹폰트 (나눔고딕, 나눔명조) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* 나눔 폰트 로드 */
    @import url('https://cdn.rawgit.com/moonspam/NanumSquare/master/nanumsquare.css');
    @import url('http://fonts.googleapis.com/earlyaccess/nanumgothic.css');
    @import url('//fonts.googleapis.com/earlyaccess/notosanskr.css');

    /* 추가 웹폰트 */
    @font-face { font-family: 'Paperozi'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-1Thin.woff2') format('woff2'); font-weight: 100; font-display: swap; }
    @font-face { font-family: 'Paperozi'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-2ExtraLight.woff2') format('woff2'); font-weight: 200; font-display: swap; }
    @font-face { font-family: 'Paperozi'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-3Light.woff2') format('woff2'); font-weight: 300; font-display: swap; }
    @font-face { font-family: 'Paperozi'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2') format('woff2'); font-weight: 400; font-display: swap; }
    @font-face { font-family: 'Paperozi'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-5Medium.woff2') format('woff2'); font-weight: 500; font-display: swap; }
    @font-face { font-family: 'Paperozi'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-6SemiBold.woff2') format('woff2'); font-weight: 600; font-display: swap; }
    @font-face { font-family: 'Paperozi'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-7Bold.woff2') format('woff2'); font-weight: 700; font-display: swap; }
    @font-face { font-family: 'Paperozi'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-8ExtraBold.woff2') format('woff2'); font-weight: 800; font-display: swap; }
    @font-face { font-family: 'Paperozi'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-9Black.woff2') format('woff2'); font-weight: 900; font-display: swap; }
    @font-face { font-family: 'GMarketSans'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansLight.woff') format('woff'); font-weight: 300; font-display: swap; }
    @font-face { font-family: 'GMarketSans'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff'); font-weight: 500; font-display: swap; }
    @font-face { font-family: 'GMarketSans'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff') format('woff'); font-weight: 700; font-display: swap; }
    @font-face { font-family: 'YeogiOttaeJalnan'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_four@1.2/JalnanOTF00.woff') format('woff'); font-weight: normal; font-display: swap; }
    @font-face { font-family: 'Pretendard'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Thin.woff2') format('woff2'); font-weight: 100; font-display: swap; }
    @font-face { font-family: 'Pretendard'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-ExtraLight.woff2') format('woff2'); font-weight: 200; font-display: swap; }
    @font-face { font-family: 'Pretendard'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Light.woff2') format('woff2'); font-weight: 300; font-display: swap; }
    @font-face { font-family: 'Pretendard'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Regular.woff2') format('woff2'); font-weight: 400; font-display: swap; }
    @font-face { font-family: 'Pretendard'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Medium.woff2') format('woff2'); font-weight: 500; font-display: swap; }
    @font-face { font-family: 'Pretendard'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-SemiBold.woff2') format('woff2'); font-weight: 600; font-display: swap; }
    @font-face { font-family: 'Pretendard'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Bold.woff2') format('woff2'); font-weight: 700; font-display: swap; }
    @font-face { font-family: 'Pretendard'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-ExtraBold.woff2') format('woff2'); font-weight: 800; font-display: swap; }
    @font-face { font-family: 'Pretendard'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Black.woff2') format('woff2'); font-weight: 900; font-display: swap; }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            panel: { bg: '#1e2433', border: '#2e3a52', header: '#161c2d' },
            accent: { DEFAULT: '#0066cc', hover: '#0052a3' }
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; }
    body { display: flex; flex-direction: column; background: #111827; color: #e5e7eb; }

    /* 상단 바 */
    #top-bar { height: 52px; min-height: 52px; background: #161c2d; border-bottom: 1px solid #2e3a52; display: flex; align-items: center; padding: 0 16px; gap: 12px; z-index: 10; }
    #top-bar .brand { font-size: 14px; font-weight: 700; color: #60a5fa; white-space: nowrap; }
    #top-bar .divider { width: 1px; height: 20px; background: #2e3a52; }
    #top-bar input[type=text] { background: #1e2433; border: 1px solid #2e3a52; border-radius: 6px; color: #e5e7eb; font-size: 13px; padding: 5px 10px; width: 180px; outline: none; }
    #top-bar input[type=text]:focus { border-color: #0066cc; }
    #top-bar #ver-badge { font-size: 11px; color: #6b7280; background: #0d1117; padding: 2px 8px; border-radius: 4px; white-space: nowrap; border: 1px solid #2e3a52; }
    #top-bar .spacer { flex: 1; }
    #top-bar .btn { font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer; transition: background .15s; }
    #top-bar .btn-outline { background: transparent; border: 1px solid #2e3a52; color: #9ca3af; }
    #top-bar .btn-outline:hover { border-color: #60a5fa; color: #60a5fa; }
    #top-bar .btn-primary { background: #0066cc; color: #fff; }
    #top-bar .btn-primary:hover { background: #0052a3; }

    /* 메인 영역 */
    #main-area { display: flex; flex: 1; overflow: hidden; }

    /* 좌측 패널 */
    #left-panel { width: 280px; min-width: 280px; background: #1e2433; border-right: 1px solid #2e3a52; display: flex; flex-direction: column; overflow: hidden; }
    #left-panel .panel-tab { display: flex; border-bottom: 1px solid #2e3a52; }
    #left-panel .panel-tab button { flex: 1; padding: 10px 0; font-size: 12px; font-weight: 600; color: #6b7280; background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; }
    #left-panel .panel-tab button.active { color: #60a5fa; border-bottom-color: #0066cc; }
    #left-panel .panel-body { flex: 1; overflow-y: auto; padding: 12px; }
    #left-panel .panel-body::-webkit-scrollbar { width: 4px; }
    #left-panel .panel-body::-webkit-scrollbar-thumb { background: #2e3a52; border-radius: 4px; }

    /* 섹션 항목 */
    .section-item { background: #161c2d; border: 1px solid #2e3a52; border-radius: 8px; padding: 8px 10px; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; cursor: grab; user-select: none; transition: all .15s; }
    .section-item:hover { border-color: #3b4f6e; }
    .section-item.editing { border-color: #0066cc; background: #1a2a45; }
    .sec-name-btn { flex: 1; text-align: left; background: none; border: none; color: #e2e8f0; font-size: 12px; font-weight: 500; padding: 4px 6px; border-radius: 4px; cursor: pointer; line-height: 1.4; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; transition: all .15s; }
    .sec-name-btn:hover { background: rgba(96, 165, 250, .1); color: #60a5fa; }
    .section-item.editing .sec-name-btn { color: #60a5fa; }
    .section-item.dragging { opacity: .5; }
    .section-item.drag-over { border-color: #0066cc; background: #1a2a45; }
    .section-item .drag-handle { color: #4b5563; font-size: 14px; cursor: grab; }
    .section-item .section-name { flex: 1; font-size: 13px; color: #d1d5db; }
    .section-item .section-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #1f3a5f; color: #60a5fa; }
    .section-item .section-badge.fixed { background: #1f2937; color: #6b7280; }
    /* E5: Repeater 아이템 개수 표시 */
    .sec-repeater-badge { font-size: 9px; color: #6b7280; margin-left: 4px; }
    .sec-quick-add-btn { background: none; border: none; color: #059669; cursor: pointer; font-size: 12px; padding: 0 6px; transition: color .15s; flex-shrink: 0; }
    .sec-quick-add-btn:hover { color: #047857; }
    #top-bar .btn-danger { background: transparent; border: 1px solid #ef4444; color: #ef4444; }
    #top-bar .btn-danger:hover { background: #ef4444; color: #fff; }
    #top-bar .btn-zip { background: #059669; color: #fff; }
    #top-bar .btn-zip:hover { background: #047857; }

    /* 토글 스위치 */
    .toggle-wrap { display: flex; align-items: center; }
    .toggle { position: relative; width: 34px; height: 18px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: #374151; border-radius: 18px; cursor: pointer; transition: .2s; }
    .toggle-slider:before { content: ''; position: absolute; width: 12px; height: 12px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .2s; }
    .toggle input:checked + .toggle-slider { background: #0066cc; }
    .toggle input:checked + .toggle-slider:before { transform: translateX(16px); }

    /* 색상 탭 */
    .color-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #232f45; }
    .color-item:last-child { border-bottom: none; }
    .color-item label { font-size: 12px; color: #9ca3af; flex: 1; }
    .color-item .color-preview { width: 24px; height: 24px; border-radius: 4px; border: 1px solid #2e3a52; cursor: pointer; position: relative; overflow: hidden; }
    .color-item .color-preview input[type=color] { position: absolute; inset: -4px; width: calc(100% + 8px); height: calc(100% + 8px); opacity: 0; cursor: pointer; }
    .color-item .hex-input { background: #161c2d; border: 1px solid #2e3a52; border-radius: 4px; color: #e5e7eb; font-size: 11px; padding: 3px 6px; width: 72px; outline: none; font-family: monospace; }
    .color-item .hex-input:focus { border-color: #0066cc; }

    /* 우측 미리보기 + 편집 드로어 */
    #preview-area { flex: 1; display: flex; flex-direction: row; overflow: hidden; position: relative; }
    #preview-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    #edit-drawer { width: 0; background: #1a2235; border-left: 1px solid #2e3a52; overflow: hidden; transition: width .25s ease; display: flex; flex-direction: column; flex-shrink: 0; }
    #edit-drawer.open { width: 400px; }
    #edit-drawer-head { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid #2e3a52; flex-shrink: 0; background: #141b2b; }
    #edit-drawer-title { font-size: 13px; font-weight: 600; color: #e2e8f0; margin: 0; white-space: nowrap; }
    #edit-drawer-close { background: none; border: none; color: #6b7280; font-size: 16px; cursor: pointer; padding: 4px 8px; border-radius: 4px; transition: all .15s; }
    #edit-drawer-close:hover { color: #f87171; background: rgba(248,113,113,.1); }
    #edit-drawer-body { flex: 1; overflow-y: auto; padding: 14px 16px; min-width: 400px; }
    #preview-toolbar { height: 36px; background: #161c2d; border-bottom: 1px solid #2e3a52; display: flex; align-items: center; padding: 0 12px; gap: 8px; }
    #preview-toolbar span { font-size: 11px; color: #6b7280; }
    #preview-toolbar .preview-url { font-size: 11px; color: #4b5563; background: #0d1117; padding: 3px 8px; border-radius: 4px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #preview-toolbar .device-btn { font-size: 11px; padding: 3px 8px; border-radius: 4px; border: 1px solid #2e3a52; background: none; color: #6b7280; cursor: pointer; flex-shrink: 0; }
    #preview-toolbar .device-btn.active { border-color: #0066cc; color: #60a5fa; }
    #preview-frame-wrap { flex: 1; overflow: hidden; display: flex; justify-content: center; align-items: flex-start; background: #0d1117; padding: 0; }
    #preview-frame { width: 100%; height: 100%; border: none; background: #fff; transition: width .3s; }
    #preview-frame-wrap.tablet #preview-frame { width: 768px; }
    #preview-frame-wrap.mobile #preview-frame { width: 375px; }

    /* R3: 반응형 미리보기 탭 */
    #breakpoint-tabs { display: flex; gap: 8px; padding: 8px 12px; background: #0d1117; border-bottom: 1px solid #2e3a52; }
    .breakpoint-btn { background: #161c2d; border: 1px solid #2e3a52; color: #9ca3af; font-size: 11px; padding: 6px 10px; border-radius: 4px; cursor: pointer; transition: all .2s; }
    .breakpoint-btn:hover { border-color: #3b82f6; color: #93c5fd; }
    .breakpoint-btn.active { background: #1e3a8a; border-color: #3b82f6; color: #93c5fd; }

    /* 패널 섹션 헤더 */
    .p-section-header { font-size: 11px; font-weight: 700; color: #4b5563; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid #2e3a52; }

    /* 로고 설정 */
    .logo-input-wrap { background: #161c2d; border: 1px solid #2e3a52; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
    .logo-input-wrap label { font-size: 11px; color: #6b7280; display: block; margin-bottom: 4px; }
    .logo-input-wrap input { width: 100%; background: #1e2433; border: 1px solid #2e3a52; border-radius: 4px; color: #e5e7eb; font-size: 12px; padding: 5px 8px; outline: none; }
    .logo-input-wrap input:focus { border-color: #0066cc; }

    /* 탭 패널 컨텐츠 */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .ep-title { font-size: 10px; font-weight: 700; color: #4b5563; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }
    .ep-btn-card { background: #1e2433; border: 1px solid #2e3a52; border-radius: 6px; padding: 10px; margin-bottom: 8px; }
    .ep-btn-card:last-child { margin-bottom: 0; }
    .ep-btn-header { font-size: 12px; font-weight: 700; color: #60a5fa; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid #2e3a52; }
    .ep-field { margin-bottom: 6px; }
    .ep-field label { display: block; font-size: 11px; color: #6b7280; margin-bottom: 3px; }
    .ep-field input[type=text] { width: 100%; background: #161c2d; border: 1px solid #2e3a52; border-radius: 4px; color: #e5e7eb; font-size: 12px; padding: 4px 7px; outline: none; box-sizing: border-box; }
    .ep-field input[type=text]:focus { border-color: #0066cc; }
    .ep-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .ep-row > label:first-child { flex: 1; font-size: 11px; color: #6b7280; margin-bottom: 0; }
    .ep-color-wrap { display: flex; align-items: center; gap: 6px; }
    .ep-color-preview { width: 22px; height: 22px; border-radius: 3px; border: 1px solid #374151; position: relative; overflow: hidden; cursor: pointer; flex-shrink: 0; }
    .ep-color-preview input[type=color] { position: absolute; inset: -4px; width: calc(100% + 8px); height: calc(100% + 8px); opacity: 0; cursor: pointer; }
    .ep-hex { background: #161c2d !important; border: 1px solid #2e3a52 !important; border-radius: 4px; color: #e5e7eb !important; font-size: 11px; padding: 2px 6px !important; width: 72px !important; outline: none; font-family: monospace; }
    .ep-hex:focus { border-color: #0066cc !important; }
    .ep-hint { font-size: 10px; color: #4b5563; white-space: nowrap; }
    .ep-hover-sub { padding-left: 10px; border-left: 2px solid #2e3a52; margin-top: 6px; }
    .ep-textarea { width: 100%; background: #161c2d; border: 1px solid #2e3a52; border-radius: 4px; color: #e5e7eb; font-size: 12px; padding: 4px 7px; resize: vertical; outline: none; box-sizing: border-box; min-height: 76px; }
    .ep-textarea:focus { border-color: #0066cc; }
    .ep-repeater-label { font-size: 10px; font-weight: 700; color: #4b5563; text-transform: uppercase; letter-spacing: .05em; margin: 10px 0 4px 0; display: flex; justify-content: space-between; align-items: center; }
    .ep-add-btn { background: #059669; color: #fff; border: none; border-radius: 4px; font-size: 10px; padding: 3px 8px; cursor: pointer; transition: background .15s; }
    .ep-add-btn:hover { background: #047857; }
    .ep-remove-btn { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 14px; padding: 0; margin-left: 4px; transition: color .15s; }
    .ep-remove-btn:hover { color: #dc2626; }

    /* 버튼 설정 패널 */
    #btn-settings-panel .bsp-input { width: 100%; background: #0d1117; border: 1px solid #2e3a52; border-radius: 4px; color: #e5e7eb; font-size: 12px; padding: 4px 8px; outline: none; box-sizing: border-box; }
    #btn-settings-panel .bsp-input:focus { border-color: #0066cc; }

    /* 포맷팅 툴바 (편집 모드 전용) */
    #format-toolbar { display:none; height:36px; min-height:36px; background:#1a2035; border-bottom:1px solid #2e3a52; align-items:center; padding:0 10px; gap:4px; flex-shrink:0; }
    #format-toolbar.show { display:flex; }
    .fmt-btn { height:26px; min-width:28px; padding:0 8px; background:none; border:1px solid transparent; border-radius:4px; color:#9ca3af; cursor:pointer; font-size:12px; font-weight:700; transition:all .12s; flex-shrink:0; line-height:26px; }
    .fmt-btn:hover { background:#2e3a52; color:#e5e7eb; border-color:#2e3a52; }
    .fmt-btn.active { background:rgba(0,102,204,.15); color:#60a5fa; border-color:#0066cc; }
    .fmt-divider { width:1px; height:18px; background:#2e3a52; margin:0 4px; flex-shrink:0; }
    .fmt-label { font-size:10px; color:#4b5563; white-space:nowrap; margin-right:4px; }
    .fmt-select { background:#0d1117; border:1px solid #2e3a52; border-radius:4px; color:#e5e7eb; font-size:11px; padding:2px 4px; height:26px; cursor:pointer; outline:none; max-width:110px; }
    .fmt-select:focus { border-color:#0066cc; }
    .fmt-input-num { background:#0d1117; border:1px solid #2e3a52; border-radius:4px; color:#e5e7eb; font-size:11px; padding:2px 4px; height:26px; width:46px; text-align:center; outline:none; }
    .fmt-input-num:focus { border-color:#0066cc; }
    .fmt-unit { font-size:10px; color:#4b5563; }
    .fmt-color-wrap { display:flex; flex-direction:column; align-items:center; position:relative; cursor:pointer; width:26px; height:26px; border:1px solid #2e3a52; border-radius:4px; overflow:visible; justify-content:center; }
    .fmt-color-wrap:hover { border-color:#60a5fa; }
    .fmt-color-wrap input[type=color] { position:absolute; opacity:0; width:100%; height:100%; cursor:pointer; inset:0; }
    .fmt-color-label { font-size:10px; font-weight:700; color:#e5e7eb; line-height:1; pointer-events:none; }
    .fmt-color-bar { width:18px; height:3px; border-radius:1px; margin-top:1px; pointer-events:none; }

    /* E3: 섹션 ▲▼ 이동 버튼 (hover 시에만 표시) */
    .sec-move-btn { background: none; border: 1px solid #2e3a52; border-radius: 3px; color: #4b5563; font-size: 10px; width: 16px; height: 16px; cursor: pointer; line-height: 14px; text-align: center; padding: 0; flex-shrink: 0; }
    .sec-move-btn:hover:not(:disabled) { border-color: #60a5fa; color: #60a5fa; }
    .sec-move-btn:disabled { opacity: .2; cursor: default; }
    .sec-move-group { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; opacity: 0; transition: opacity .15s; }
    .section-item:hover .sec-move-group,
    .section-item.editing .sec-move-group { opacity: 1; }

    /* E4: 섹션 이름 클릭 → 스크롤 */
    .section-name { cursor: pointer; }
    .section-name:hover { color: #60a5fa !important; }

<div id="password-gate" style="display:none;position:fixed;inset:0;z-index:9999;background:#111827;display:flex;align-items:center;justify-content:center;">
  <div style="background:#1f2937;border-radius:12px;padding:40px;width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5);">

    <div id="pw-error" style="color:#ef4444;font-size:12px;margin-bottom:10px;display:none;">비밀번호가 올바르지 않습니다.</div>
    <button onclick="checkPassword()" style="width:100%;padding:11px;background:#0066cc;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;">입장하기</button>
  </div>
</div>
<script>
(function() {
  var PW = 'incruit2026!';
  var KEY = 'ije_auth';
  var gate = document.getElementById('password-gate');
  if (localStorage.getItem(KEY) === 'ok') { gate.style.display = 'none'; }
  else { gate.style.display = 'flex'; }
  window.checkPassword = function() {
    var val = document.getElementById('pw-input').value;
    if (val === PW) { localStorage.setItem(KEY, 'ok'); gate.style.display = 'none'; }
    else { document.getElementById('pw-error').style.display = 'block'; document.getElementById('pw-input').value = ''; document.getElementById('pw-input').focus(); }
  };
})();
</script>

/* ── localStorage 저장/복원 ── */
function saveState() {
  localStorage.setItem(STATE_KEY, JSON.stringify({
    fairCode:       document.getElementById('fair-code').value,
    logoHref:       document.getElementById('logo-href').value,
    logoTitle:      document.getElementById('logo-title').value,
    sectionOrder:   sectionOrder,
    sectionEnabled: sectionEnabled,
    sectionBgColors:sectionBgColors,
    sectionBgImages:sectionBgImages,
    sectionSpacing: sectionSpacing,
    sectionAdvancedStyles: sectionAdvancedStyles,
    aosEnabled:          aosEnabled,
    visualRightVisible:  visualRightVisible,
    logoImages:          logoImages,
    exportSettings:      exportSettings,
    cssColors:      cssColors,
    buttonStyles:   buttonStyles,
    sectionData:    sectionData,
    posterConfig:   posterConfig,
    previewBreakpoint: previewBreakpoint,
    sectionTemplates: sectionTemplates,
    navLinks:       navLinks,
    joblistTabs:    joblistTabs
  }));
}

function loadState() {
  var raw = localStorage.getItem(STATE_KEY);
  if (!raw) return;
  try {
    var s = JSON.parse(raw);
    if (s.fairCode)  document.getElementById('fair-code').value  = s.fairCode;
    if (s.logoHref)  document.getElementById('logo-href').value  = s.logoHref;
    if (s.logoTitle) document.getElementById('logo-title').value = s.logoTitle;
    if (s.sectionOrder) {
      sectionOrder = s.sectionOrder;
      FAIR_BUILDER_DEFAULT_ORDER.forEach(function(id) {
        if (sectionOrder.indexOf(id) === -1) sectionOrder.push(id);
      });
    }
    if (s.sectionEnabled) {
      sectionEnabled = s.sectionEnabled;
      FAIR_BUILDER_DEFAULT_ORDER.forEach(function(id) {
        if (sectionEnabled[id] === undefined)
          sectionEnabled[id] = FAIR_BUILDER_SCHEMA[id].enabled !== false;
      });
    }
    if (s.sectionBgColors) {
      sectionBgColors = s.sectionBgColors;
      FAIR_BUILDER_DEFAULT_ORDER.forEach(function(id) {
        if (sectionBgColors[id] === undefined) sectionBgColors[id] = '';
      });
    }
    if (s.sectionBgImages) {
      sectionBgImages = s.sectionBgImages;
      FAIR_BUILDER_DEFAULT_ORDER.forEach(function(id) {
        if (sectionBgImages[id] === undefined) sectionBgImages[id] = '';
      });
    }
    if (s.sectionSpacing) {
      sectionSpacing = s.sectionSpacing;
      FAIR_BUILDER_DEFAULT_ORDER.forEach(function(id) {
        if (!sectionSpacing[id]) sectionSpacing[id] = { pt:'', pb:'', mpt:'', mpb:'' };
      });
    }
    if (s.sectionAdvancedStyles) {
      sectionAdvancedStyles = s.sectionAdvancedStyles;
      FAIR_BUILDER_DEFAULT_ORDER.forEach(function(id) {
        if (!sectionAdvancedStyles[id]) sectionAdvancedStyles[id] = { borderColor:'', borderWidth:'', borderStyle:'solid', shadowColor:'', shadowBlur:'', shadowSpread:'', shadowX:'', shadowY:'', opacity:'' };
      });
    }
    if (s.cssColors) {
      cssColors = s.cssColors;
      Object.keys(FAIR_BUILDER_COLORS).forEach(function(v) {
        if (cssColors[v] === undefined) cssColors[v] = FAIR_BUILDER_COLORS[v].default;
      });
    }
    if (s.buttonStyles)  buttonStyles  = s.buttonStyles;
    if (s.sectionData)   sectionData   = s.sectionData;
    if (s.posterConfig)  posterConfig  = s.posterConfig;
    if (s.navLinks)      navLinks      = s.navLinks;
    if (s.joblistTabs)   joblistTabs   = s.joblistTabs;
    if (s.aosEnabled !== undefined)         aosEnabled         = s.aosEnabled;
    if (s.visualRightVisible !== undefined) visualRightVisible = s.visualRightVisible;
    if (s.logoImages)      { logoImages = Object.assign({ logo1:'', logo2:'' }, s.logoImages); }
    if (s.exportSettings)  { exportSettings = Object.assign({ imgBasePath:'/ui/static/image/specialty/', fairName:'' }, s.exportSettings); }
    if (s.previewBreakpoint) { setPreviewBreakpoint(s.previewBreakpoint); }
    if (s.sectionTemplates) { sectionTemplates = s.sectionTemplates; }
  } catch(e) {}
}

/* ── S2: 네비게이션 편집 ── */
function readNavFromPreview() {
  var doc = getPreviewDoc();
  if (!doc) return;
  var links = doc.querySelectorAll('.nav > li > a.links');
  if (!links.length) return;
  navLinks = [];
  links.forEach(function(a) {
    navLinks.push({ text: a.textContent.trim(), href: a.getAttribute('href') || '' });
  });
}

function renderNavPanel() {
  var el = document.getElementById('nav-link-list');
  if (!el) return;
  if (!navLinks.length) { el.innerHTML = '<div style="font-size:11px;color:#4b5563;padding:4px 0;">미리보기 로드 후 표시됩니다.</div>'; return; }
  el.innerHTML = navLinks.map(function(link, i) {
    return '<div class="logo-input-wrap" style="padding:6px 8px;">' +
      '<label>링크 ' + (i+1) + ' — 텍스트</label>' +
      '<input type="text" value="' + esc(link.text) + '" oninput="updateNavLink(' + i + ',\'text\',this.value)">' +
      '<label style="margin-top:4px;">href</label>' +
      '<input type="text" value="' + esc(link.href) + '" oninput="updateNavLink(' + i + ',\'href\',this.value)">' +
      '</div>';
  }).join('');
}

function updateNavLink(i, key, val) {
  if (!navLinks[i]) return;
  navLinks[i][key] = val;
  applyNavToPreview();
  saveState();
}

function applyNavToPreview() {
  var doc = getPreviewDoc();
  if (!doc || !navLinks.length) return;
  var pcLinks = doc.querySelectorAll('.nav > li > a.links');
  var mbLinks = doc.querySelectorAll('#sitemap > ul > li > a.links');
  navLinks.forEach(function(link, i) {
    if (pcLinks[i]) { pcLinks[i].textContent = link.text; pcLinks[i].setAttribute('href', link.href); }
    if (mbLinks[i]) { mbLinks[i].textContent = link.text; mbLinks[i].setAttribute('href', link.href); }
  });
}

/* ── S1: 채용공고 탭 편집 ── */
function readTabsFromPreview() {
  var doc = getPreviewDoc();
  if (!doc) return;
  var labels = doc.querySelectorAll('[data-builder-section="section_joblist"] label.tab_item');
  if (!labels.length) return;
  joblistTabs = [];
  labels.forEach(function(label) {
    joblistTabs.push({ name: label.textContent.trim() });
  });
}

function renderTabPanel() {
  var el = document.getElementById('joblist-tab-list');
  if (!el) return;
  if (!joblistTabs.length) { el.innerHTML = '<div style="font-size:11px;color:#4b5563;padding:4px 0;">미리보기 로드 후 표시됩니다.</div>'; return; }
  el.innerHTML = joblistTabs.map(function(tab, i) {
    return '<div class="logo-input-wrap" style="padding:6px 8px;">' +
      '<label>탭 ' + (i+1) + '</label>' +
      '<input type="text" value="' + esc(tab.name) + '" oninput="updateJoblistTab(' + i + ',this.value)">' +
      '</div>';
  }).join('');
}

function updateJoblistTab(i, val) {
  if (!joblistTabs[i]) return;
  joblistTabs[i].name = val;
  applyTabsToPreview();
  saveState();
}

function applyTabsToPreview() {
  var doc = getPreviewDoc();
  if (!doc || !joblistTabs.length) return;
  var labels = doc.querySelectorAll('[data-builder-section="section_joblist"] label.tab_item');
  joblistTabs.forEach(function(tab, i) {
    if (labels[i]) labels[i].textContent = tab.name;
  });
}

/* 공통: 고정 패널 토글 */
function toggleFixedPanel(panelId, arrowId) {
  var panel = document.getElementById(panelId);
  var arrow = document.getElementById(arrowId);
  if (!panel) return;
  var isOpen = panel.style.display !== 'none';
  panel.style.display = isOpen ? 'none' : '';
  if (arrow) arrow.textContent = isOpen ? '▶' : '▼';
}

function resetAll() {
  if (!confirm('모든 설정을 초기화하시겠습니까?')) return;
  localStorage.removeItem(STATE_KEY);
  location.reload();
}

/* ── 탭 전환 ── */
function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(function(el) { el.classList.remove('active'); });
  document.querySelectorAll('.panel-tab button').forEach(function(el) { el.classList.remove('active'); });
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'style') renderExportSettings();
}

/* ── 디바이스 미리보기 ── */
function setDevice(type, btn) {
  var wrap = document.getElementById('preview-frame-wrap');
  wrap.className = type === 'pc' ? '' : type;
  document.querySelectorAll('.device-btn').forEach(function(el) { el.classList.remove('active'); });
  btn.classList.add('active');
}

/* ── 섹션 리스트 렌더링 ── */
function renderSectionList() {
  var list = document.getElementById('section-list');
  list.innerHTML = '';
  var visibleOrder = sectionOrder.filter(function(id) { return !FAIR_BUILDER_SCHEMA[id].hideFromPanel; });
  sectionOrder.forEach(function(id) {
    var schema  = FAIR_BUILDER_SCHEMA[id];
    if (schema.hideFromPanel) return;
    var isFixed = !!schema.fixed_content;
    var enabled = sectionEnabled[id];
    var visIdx  = visibleOrder.indexOf(id);
    var isFirst = visIdx === 0;
    var isLast  = visIdx === visibleOrder.length - 1;
    var isEditing = openEditPanelId === id;
    var item = document.createElement('div');
    item.className = 'section-item' + (isEditing ? ' editing' : '');
    item.setAttribute('draggable', 'true');
    item.dataset.id = id;
    /* E5: repeater 아이템 개수 계산 */
    var repeaterCount = '';
    var mainRepeaterKey = '';
    Object.keys(schema.fields).forEach(function(fk) {
      var f = schema.fields[fk];
      if (f.type === 'repeater' && !mainRepeaterKey) {
        mainRepeaterKey = fk;
        var items = (sectionData[id] && sectionData[id][fk]) ? sectionData[id][fk].length : 0;
        repeaterCount = ' <span class="sec-repeater-badge">' + items + '/' + f.maxItems + '</span>';
      }
    });
    item.innerHTML =
      '<span class="drag-handle">⠿</span>' +
      /* 섹션명 버튼: 클릭 → 편집 드로어 열기 */
      '<button class="sec-name-btn" onclick="event.stopPropagation();toggleSectionEdit(\'' + id + '\')" title="클릭하여 편집 · Shift+클릭 시 미리보기로 스크롤">' + schema.name + repeaterCount + '</button>' +
      (isFixed ? '<span class="section-badge fixed">고정</span>' : '') +
      /* ▲▼ 이동 버튼 (hover 시 표시) */
      '<div class="sec-move-group">' +
        '<button class="sec-move-btn" title="위로" onclick="event.stopPropagation();moveSectionOrder(\'' + id + '\',-1)" ' + (isFirst ? 'disabled' : '') + '>▲</button>' +
        '<button class="sec-move-btn" title="아래로" onclick="event.stopPropagation();moveSectionOrder(\'' + id + '\',1)" ' + (isLast ? 'disabled' : '') + '>▼</button>' +
      '</div>' +
      (mainRepeaterKey && sectionData[id] && sectionData[id][mainRepeaterKey] && sectionData[id][mainRepeaterKey].length < schema.fields[mainRepeaterKey].maxItems
        ? '<button class="sec-quick-add-btn" onclick="event.stopPropagation();addRepeaterItem(\'' + id + '\',\'' + mainRepeaterKey + '\');renderSectionList();toggleSectionEdit(\'' + id + '\')" title="빠른 추가">+</button>'
        : '') +
      '<div class="toggle-wrap">' +
        '<label class="toggle">' +
          '<input type="checkbox" ' + (enabled ? 'checked' : '') + ' onchange="toggleSection(\'' + id + '\', this.checked)">' +
          '<span class="toggle-slider"></span>' +
        '</label>' +
      '</div>';
    /* Shift+클릭 시 스크롤 */
    var nameBtn = item.querySelector('.sec-name-btn');
    if (nameBtn) {
      nameBtn.addEventListener('click', function(e) {
        if (e.shiftKey) { e.stopPropagation(); e.preventDefault(); scrollToSection(id); }
      }, true);
    }
    list.appendChild(item);
  });
  initDragDrop();
}

/* ── E3: 섹션 ▲▼ 이동 ── */
function moveSectionOrder(id, dir) {
  var idx = sectionOrder.indexOf(id);
  if (idx === -1) return;
  /* 같은 방향으로 이동할 visible 섹션 찾기 */
  var step = dir > 0 ? 1 : -1;
  var target = idx + step;
  while (target >= 0 && target < sectionOrder.length) {
    if (!FAIR_BUILDER_SCHEMA[sectionOrder[target]].hideFromPanel) break;
    target += step;
  }
  if (target < 0 || target >= sectionOrder.length) return;
  var tmp = sectionOrder[idx];
  sectionOrder[idx] = sectionOrder[target];
  sectionOrder[target] = tmp;
  saveState();
  applyToPreview();
  renderSectionList();
}

/* ── E4: 섹션 클릭 → iframe 스크롤 ── */
function scrollToSection(id) {
  var doc = getPreviewDoc();
  if (!doc) return;
  var el = doc.querySelector('[data-builder-section="' + id + '"]');
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* R3: 반응형 미리보기 breakpoint 전환 */
function setPreviewBreakpoint(bp) {
  previewBreakpoint = bp;
  var wrap = document.getElementById('preview-frame-wrap');
  wrap.classList.remove('tablet', 'mobile');
  if (bp === 'tablet') wrap.classList.add('tablet');
  else if (bp === 'mobile') wrap.classList.add('mobile');
  /* 탭 버튼 활성화 상태 업데이트 */
  document.querySelectorAll('.breakpoint-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.bp === bp);
  });
  saveState();
}

/* Adv: 컴포넌트 템플릿 저장/로드 */
function saveSectionTemplate(sectionId) {
  var name = prompt('템플릿 이름을 입력하세요 (예: "포스터 스타일 1"):', sectionId + '_' + new Date().getTime());
  if (!name) return;

  var templateId = 'template_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
  sectionTemplates[templateId] = {
    sectionId: sectionId,
    sectionData: JSON.parse(JSON.stringify(sectionData[sectionId] || {})),
    bgColor: sectionBgColors[sectionId] || '',
    bgImage: sectionBgImages[sectionId] || '',
    spacing: JSON.parse(JSON.stringify(sectionSpacing[sectionId] || {})),
    advancedStyles: JSON.parse(JSON.stringify(sectionAdvancedStyles[sectionId] || {})),
    buttonStyles: sectionId === 'section_gradient' ? JSON.parse(JSON.stringify(buttonStyles || [])) : [],
    timestamp: new Date().toLocaleString('ko-KR'),
    name: name
  };

  saveState();
  alert('템플릿이 저장되었습니다: ' + name);
}

function applySectionTemplate(sectionId) {
  if (!Object.keys(sectionTemplates).length) {
    alert('저장된 템플릿이 없습니다. 먼저 다른 섹션에서 템플릿을 저장하세요.');
    return;
  }

  var opts = Object.keys(sectionTemplates).map(function(tId) {
    var t = sectionTemplates[tId];
    return '[' + t.sectionId + '] ' + t.name + ' (' + t.timestamp + ')';
  }).join('\n');

  var idx = prompt('적용할 템플릿을 선택하세요 (0부터 시작):\n\n' + opts + '\n\n번호를 입력:');
  if (idx === null) return;

  var keys = Object.keys(sectionTemplates);
  var templateId = keys[parseInt(idx, 10)];
  if (!templateId || !sectionTemplates[templateId]) {
    alert('유효하지 않은 선택입니다.');
    return;
  }

  var template = sectionTemplates[templateId];
  sectionData[sectionId] = JSON.parse(JSON.stringify(template.sectionData));
  sectionBgColors[sectionId] = template.bgColor;
  sectionBgImages[sectionId] = template.bgImage;
  sectionSpacing[sectionId] = JSON.parse(JSON.stringify(template.spacing));
  sectionAdvancedStyles[sectionId] = JSON.parse(JSON.stringify(template.advancedStyles));

  if (sectionId === 'section_gradient' && template.buttonStyles.length) {
    buttonStyles = JSON.parse(JSON.stringify(template.buttonStyles));
  }

  saveState();
  applyToPreview();
  closeEditDrawer();
  alert('템플릿이 적용되었습니다: ' + template.name);
}

function toggleSection(id, val) {
  sectionEnabled[id] = val;
  saveState();
  applyToPreview();
}

function onSectionBgChange(input) {
  var id  = input.dataset.section;
  var hex = input.value;
  sectionBgColors[id] = hex;
  var swatch = input.parentNode;
  swatch.classList.add('has-color');
  swatch.style.background = hex;
  saveState();
  applyToPreview();
}

/* ── 드래그 앤 드롭 ── */
function initDragDrop() {
  var items   = document.querySelectorAll('.section-item');
  var dragged = null;
  items.forEach(function(item) {
    item.addEventListener('dragstart', function() {
      dragged = this;
      setTimeout(function() { dragged.classList.add('dragging'); }, 0);
    });
    item.addEventListener('dragend', function() {
      this.classList.remove('dragging');
      document.querySelectorAll('.section-item').forEach(function(el) { el.classList.remove('drag-over'); });
    });
    item.addEventListener('dragover', function(e) {
      e.preventDefault();
      document.querySelectorAll('.section-item').forEach(function(el) { el.classList.remove('drag-over'); });
      if (this !== dragged) this.classList.add('drag-over');
    });
    item.addEventListener('drop', function(e) {
      e.preventDefault();
      if (this !== dragged) {
        var ids     = Array.from(document.querySelectorAll('.section-item')).map(function(el) { return el.dataset.id; });
        var fromIdx = ids.indexOf(dragged.dataset.id);
        var toIdx   = ids.indexOf(this.dataset.id);
        sectionOrder.splice(fromIdx, 1);
        sectionOrder.splice(toIdx, 0, dragged.dataset.id);
        renderSectionList();
        saveState();
        applyToPreview();
      }
    });
  });
}

/* ── 버튼 배너 편집 ── */
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

/* 2-1: 편집 드로어 열기/닫기 */
function toggleSectionEdit(id) {
  if (openEditPanelId === id) { closeEditDrawer(); return; }
  openEditDrawer(id);
}

function openEditDrawer(id) {
  var drawer = document.getElementById('edit-drawer');
  var body   = document.getElementById('edit-drawer-body');
  var title  = document.getElementById('edit-drawer-title');
  var schema = FAIR_BUILDER_SCHEMA[id];
  if (!drawer || !body) return;
  var bpLabel = previewBreakpoint === 'desktop' ? '🖥️ PC' : (previewBreakpoint === 'tablet' ? '📱 태블릿' : '📱 모바일');
  title.textContent = (schema ? schema.name : id) + ' 편집 (' + bpLabel + ')';
  if (id === 'section_gradient') {
    body.innerHTML = buildGradientPanel();
  } else if (id === 'section_visual') {
    body.innerHTML = buildVisualPanel();
  } else if (SECTION_DOM_MAP[id]) {
    loadFieldsFromPreview(id);
    body.innerHTML = buildSectionPanel(id);
  } else {
    body.innerHTML = '<div class="ep-title" style="color:#4b5563;">편집 기능 준비 중</div>';
  }
  drawer.classList.add('open');
  drawer.setAttribute('aria-hidden', 'false');
  openEditPanelId = id;
  /* 섹션 아이템 편집 중 강조 */
  document.querySelectorAll('.section-item').forEach(function(el) {
    el.classList.toggle('editing', el.dataset.id === id);
  });
  body.scrollTop = 0;
}

function closeEditDrawer() {
  var drawer = document.getElementById('edit-drawer');
  if (!drawer) return;
  drawer.classList.remove('open');
  drawer.setAttribute('aria-hidden', 'true');
  openEditPanelId = null;
  document.querySelectorAll('.section-item.editing').forEach(function(el) {
    el.classList.remove('editing');
  });
}

/* ESC 키로 드로어 닫기 */
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && openEditPanelId) closeEditDrawer();
});

function colorRow(i, key, val, label) {
  return '<div class="ep-field"><label>' + label + '</label>' +
    '<div class="ep-color-wrap">' +
      '<div class="ep-color-preview" style="background:' + val + '">' +
        '<input type="color" value="' + val + '" oninput="updateBtn(' + i + ',\'' + key + '\',this.value);this.parentNode.style.background=this.value;syncEpHex(this,' + i + ',\'' + key + '\')">' +
      '</div>' +
      '<input type="text" class="ep-hex" id="ep-' + key + '-' + i + '" value="' + val + '" maxlength="7" oninput="if(/^#[0-9a-fA-F]{6}$/.test(this.value)){var p=this.previousElementSibling;p.style.background=this.value;p.querySelector(\'input[type=color]\').value=this.value;updateBtn(' + i + ',\'' + key + '\',this.value)}">' +
    '</div></div>';
}

function buildGradientPanel() {
  var btns = buttonStyles['section_gradient'] || [];
  var h = '<div class="ep-title">버튼 배너 편집</div>';
  h += buildBgImagePanel('section_gradient');
  btns.forEach(function(b, i) {
    h += '<div class="ep-btn-card">';
    h += '<div class="ep-btn-header">버튼 ' + (i + 1) + '</div>';
    h += '<div class="ep-field"><label>버튼 텍스트</label><input type="text" value="' + esc(b.text) + '" oninput="updateBtn(' + i + ',\'text\',this.value)"></div>';
    h += '<div class="ep-field"><label>링크 URL</label><input type="text" value="' + esc(b.href) + '" oninput="updateBtn(' + i + ',\'href\',this.value)"></div>';
    h += '<div class="ep-field"><label>너비 (% 또는 px)</label><input type="text" value="' + esc(b.width) + '" placeholder="예: 40% 또는 400px" oninput="updateBtn(' + i + ',\'width\',this.value)"></div>';
    h += colorRow(i, 'bgColor', b.bgColor, '배경색');
    h += '<div class="ep-row"><label>인셋 쉐도우</label>' +
      '<label class="toggle"><input type="checkbox" ' + (b.shadowEnabled ? 'checked' : '') + ' onchange="updateBtn(' + i + ',\'shadowEnabled\',this.checked)"><span class="toggle-slider"></span></label>' +
      '<div class="ep-color-wrap">' +
        '<div class="ep-color-preview" style="background:' + b.shadowColor + '">' +
          '<input type="color" value="' + b.shadowColor + '" oninput="updateBtn(' + i + ',\'shadowColor\',this.value);this.parentNode.style.background=this.value;syncEpHex(this,' + i + ',\'shadowColor\')">' +
        '</div>' +
        '<input type="text" class="ep-hex" id="ep-shadowColor-' + i + '" value="' + b.shadowColor + '" maxlength="7" oninput="if(/^#[0-9a-fA-F]{6}$/.test(this.value)){var p=this.previousElementSibling;p.style.background=this.value;p.querySelector(\'input[type=color]\').value=this.value;updateBtn(' + i + ',\'shadowColor\',this.value)}">' +
      '</div></div>';
    h += '<div class="ep-row"><label>호버 효과</label>' +
      '<label class="toggle"><input type="checkbox" ' + (b.hoverEnabled ? 'checked' : '') + ' onchange="updateBtn(' + i + ',\'hoverEnabled\',this.checked);toggleEpHoverSub(' + i + ',this.checked)"><span class="toggle-slider"></span></label>' +
      '<span class="ep-hint">PC (≥1025px)</span></div>';
    h += '<div class="ep-hover-sub" id="ep-hover-sub-' + i + '" style="' + (b.hoverEnabled ? '' : 'display:none') + '">';
    h += colorRow(i, 'hoverBgColor', b.hoverBgColor, '호버 배경색');
    h += colorRow(i, 'hoverShadowColor', b.hoverShadowColor, '호버 쉐도우색');
    h += '</div>';
    h += '</div>';
  });
  h += buildSpacingPanel('section_gradient');
  h += buildAdvancedStylePanel('section_gradient');
  return h;
}

function toggleEpHoverSub(i, show) {
  var sub = document.getElementById('ep-hover-sub-' + i);
  if (sub) sub.style.display = show ? '' : 'none';
}

function syncEpHex(colorInput, i, key) {
  var hex = document.getElementById('ep-' + key + '-' + i);
  if (hex) hex.value = colorInput.value;
}

/* ── 섹션 데이터 읽기 (iframe → state) ── */
function loadFieldsFromPreview(sectionId) {
  if (!previewReady) return;
  var doc = getPreviewDoc();
  if (!doc) return;
  var map = SECTION_DOM_MAP[sectionId];
  if (!map) return;
  var sEl = doc.querySelector('[data-builder-section="' + sectionId + '"]');
  if (!sEl) return;
  var data = {};
  Object.keys(map).forEach(function(fk) {
    var m = map[fk];
    if (m._repeater) {
      var nodes = sEl.querySelectorAll(m.container);
      data[fk] = Array.from(nodes).map(function(node) {
        var item = {};
        Object.keys(m.fields).forEach(function(sfk) {
          var fm = m.fields[sfk];
          var el = fm.sel ? node.querySelector(fm.sel) : node;
          var v = el ? (el[fm.prop] || '') : '';
          item[sfk] = typeof v === 'string' ? v.trim() : v;
        });
        return item;
      });
    } else {
      var el = sEl.querySelector(m.sel);
      var v = el ? (el[m.prop] || '') : '';
      data[fk] = typeof v === 'string' ? v.trim() : v;
    }
  });
  sectionData[sectionId] = data;
}

/* ── 섹션 데이터 적용 (state → iframe) ── */
function applyFieldsToPreview(sectionId) {
  var doc = getPreviewDoc();
  if (!doc) return;
  var map = SECTION_DOM_MAP[sectionId];
  if (!map) return;
  var sEl = doc.querySelector('[data-builder-section="' + sectionId + '"]');
  if (!sEl) return;
  var data = sectionData[sectionId];
  if (!data) return;
  Object.keys(map).forEach(function(fk) {
    var m = map[fk];
    var val = data[fk];
    if (val === undefined) return;
    if (m._repeater) {
      var nodes = sEl.querySelectorAll(m.container);
      nodes.forEach(function(node, i) {
        if (!val[i]) return;
        Object.keys(m.fields).forEach(function(sfk) {
          var fm = m.fields[sfk];
          if (val[i][sfk] === undefined) return;
          if (fm.multi) {
            node.querySelectorAll(fm.sel).forEach(function(e) { e[fm.prop] = val[i][sfk]; });
          } else {
            var el = fm.sel ? node.querySelector(fm.sel) : node;
            if (el) el[fm.prop] = val[i][sfk];
          }
        });
      });
    } else {
      if (m.multi) {
        sEl.querySelectorAll(m.sel).forEach(function(e) { e[m.prop] = val; });
      } else {
        var el = sEl.querySelector(m.sel);
        if (el) el[m.prop] = val;
      }
    }
  });
}

function applyAllFieldsToPreview() {
  Object.keys(sectionData).forEach(function(id) { applyFieldsToPreview(id); });
}

/* ── 필드 값 업데이트 ── */
function updateField(sectionId, path, val) {
  if (!sectionData[sectionId]) sectionData[sectionId] = {};
  var parts = path.split('.');
  var obj = sectionData[sectionId];
  for (var i = 0; i < parts.length - 1; i++) {
    var k = isNaN(parts[i]) ? parts[i] : +parts[i];
    if (obj == null || typeof obj !== 'object') return;
    obj = obj[k];
  }
  if (obj == null || typeof obj !== 'object') return;
  var last = parts[parts.length - 1];
  obj[isNaN(last) ? last : +last] = val;
  saveState();
  applyFieldsToPreview(sectionId);
}

/* S3: Repeater 아이템 추가 */
function addRepeaterItem(sectionId, fieldKey) {
  if (!sectionData[sectionId]) sectionData[sectionId] = {};
  if (!sectionData[sectionId][fieldKey]) sectionData[sectionId][fieldKey] = [];
  var arr = sectionData[sectionId][fieldKey];
  var schema = FAIR_BUILDER_SCHEMA[sectionId];
  var field = schema ? schema.fields[fieldKey] : null;
  if (!field || field.type !== 'repeater') return;
  if (arr.length >= field.maxItems) return; // maxItems 체크

  // 새 아이템 객체 생성 (기본값 적용)
  var newItem = {};
  Object.keys(field.fields).forEach(function(sfk) {
    newItem[sfk] = field.fields[sfk].default || '';
  });
  arr.push(newItem);
  saveState();
  applyFieldsToPreview(sectionId);
  // 드로어 갱신
  if (openEditPanelId === sectionId) {
    var body = document.getElementById('edit-drawer-body');
    if (body) {
      loadFieldsFromPreview(sectionId);
      body.innerHTML = buildSectionPanel(sectionId);
      body.scrollTop = body.scrollHeight;
    }
  }
}

/* S3: Repeater 아이템 제거 */
function removeRepeaterItem(sectionId, fieldKey, itemIndex) {
  if (!sectionData[sectionId] || !sectionData[sectionId][fieldKey]) return;
  var arr = sectionData[sectionId][fieldKey];
  if (arr.length <= 1) return; // 최소 1개 유지
  arr.splice(itemIndex, 1);
  saveState();
  applyFieldsToPreview(sectionId);
  // 드로어 갱신
  if (openEditPanelId === sectionId) {
    var body = document.getElementById('edit-drawer-body');
    if (body) {
      loadFieldsFromPreview(sectionId);
      body.innerHTML = buildSectionPanel(sectionId);
    }
  }
}

/* ── 섹션 편집 폼 빌더 ── */
function buildSectionPanel(sectionId) {
  var schema = FAIR_BUILDER_SCHEMA[sectionId];
  var data   = sectionData[sectionId] || {};
  var map    = SECTION_DOM_MAP[sectionId] || {};
  var h = '<div class="ep-title">' + schema.name + ' 편집</div>';
  h += buildBgImagePanel(sectionId);
  if (sectionId === 'section_event_info') h += buildPosterLayoutCtrl();
  Object.keys(schema.fields).forEach(function(fk) {
    var field = schema.fields[fk];
    if (!map[fk]) return; // DOM_MAP에 없는 필드는 폼에서 제외
    if (field.type === 'repeater') {
      var items = data[fk] || [];
      h += '<div class="ep-repeater-label">' + field.label;
      if (items.length < field.maxItems) {
        h += ' <button class="ep-add-btn" onclick="addRepeaterItem(\'' + sectionId + '\',\'' + fk + '\')">+ 추가</button>';
      }
      h += '</div>';
      items.forEach(function(item, i) {
        h += '<div class="ep-btn-card"><div class="ep-btn-header">' + field.itemLabel + ' ' + (i + 1);
        if (items.length > 1) {
          h += ' <button class="ep-remove-btn" onclick="event.stopPropagation();removeRepeaterItem(\'' + sectionId + '\',\'' + fk + '\',' + i + ')">✕</button>';
        }
        h += '</div>';
        Object.keys(field.fields).forEach(function(sfk) {
          if (field.fields[sfk].type === 'repeater') return;
          if (!map[fk]._repeater || !map[fk].fields || !map[fk].fields[sfk]) return; // 리피터 내 미매핑 필드 제외
          h += buildFieldInput(sectionId, fk + '.' + i + '.' + sfk, field.fields[sfk], item[sfk]);
        });
        h += '</div>';
      });
    } else {
      h += buildFieldInput(sectionId, fk, field, data[fk]);
    }
  });
  h += buildColorPanel(sectionId);
  h += buildSpacingPanel(sectionId);
  h += buildAdvancedStylePanel(sectionId);
  /* Adv: 템플릿 저장/적용 버튼 */
  h += '<div class="ep-template-group">' +
    '<button class="ep-template-btn" onclick="saveSectionTemplate(\'' + sectionId + '\')" title="현재 섹션의 필드+스타일을 템플릿으로 저장">💾 템플릿 저장</button>' +
    '<button class="ep-template-btn" onclick="applySectionTemplate(\'' + sectionId + '\')" title="저장된 템플릿을 이 섹션에 적용">📋 템플릿 적용</button>' +
  '</div>';
  return h;
}

function buildFieldInput(sectionId, path, field, val) {
  val = val !== undefined ? String(val) : (field.default || '');
  var cb = 'updateField(\'' + sectionId + '\',\'' + path + '\',this.value)';
  var label = '<label>' + field.label + '</label>';
  var inputId = 'field-' + sectionId + '-' + path.replace(/\./g, '-');

  if (field.type === 'textarea') {
    return '<div class="ep-field">' + label + '<textarea class="ep-textarea" oninput="' + cb + '">' + esc(val) + '</textarea></div>';
  } else if (field.type === 'image') {
    var thumbId = 'thumb-' + inputId;
    return '<div class="ep-field">' + label +
      '<span class="ep-hint" style="display:block;margin-bottom:4px;">(이미지 경로 또는 파일 업로드)</span>' +
      '<div class="ep-bgimg-row">' +
        '<input type="text" class="ep-bgimg-input" id="' + inputId + '" value="' + esc(val) + '" placeholder="URL" oninput="' + cb + '">' +
        '<label class="ep-bgimg-upload" title="파일 업로드">📁' +
          '<input type="file" accept="image/*" style="display:none" onchange="onFieldImgFile(this,\'' + sectionId + '\',\'' + path + '\')">' +
        '</label>' +
      '</div>' +
      (val ? '<img id="' + thumbId + '" class="ep-bgimg-thumb" src="' + esc(val) + '">'
           : '<img id="' + thumbId + '" class="ep-bgimg-thumb" style="display:none">') +
    '</div>';
  } else if (field.type === 'link') {
    return '<div class="ep-field">' + label + '<span class="ep-hint" style="display:block;margin-bottom:4px;">(URL)</span>' +
      '<input type="text" value="' + esc(val) + '" placeholder="https://..." oninput="' + cb + '"></div>';
  }
  return '<div class="ep-field">' + label + '<input type="text" value="' + esc(val) + '" oninput="' + cb + '"></div>';
}

  { name: '여기어때잘난체', family: "'YeogiOttaeJalnan'", weights: [400] },
  { name: '프리텐다드', family: "'Pretendard'", weights: [100, 200, 300, 400, 500, 600, 700, 800, 900] },

/* 비주얼 이미지 그룹 (PC/M 묶음, on/off 토글 지원) */
var VISUAL_IMAGE_GROUPS = [
  {

/* 비주얼 이미지 on/off 상태 */
var visualImageToggle = {
  online: true,
  offline: true,
  rightvisual: true
};

function buildVisualPanel() {
  var doc = getPreviewDoc();
  var sEl = doc ? doc.querySelector('[data-builder-section="section_visual"]') : null;
  var h = '<div class="ep-title">메인 비주얼 편집</div>';

  /* Step 2: 요소 탭 + 추가/삭제 버튼 */
  var texts = sectionData.section_visual && sectionData.section_visual.mvisual_texts ? sectionData.section_visual.mvisual_texts : [];
  h += '<div class="ep-spacing-title">텍스트 요소 (' + texts.length + ')</div>';
  h += '<div style="display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap;">';
  texts.forEach(function(t, i) {
    h += '<button class="ep-add-btn" style="background:#1e3a8a;color:#93c5fd;flex:1;padding:6px;font-size:11px;border:1px solid #3b82f6;cursor:pointer;" onclick="switchVisualTextTab(' + i + ')">' +
      '요소 ' + (i+1) + '</button>';
  });
  h += '</div>';
  if (texts.length < 5) {
    h += '<button class="ep-add-btn" style="width:100%;background:#059669;margin-bottom:8px;" onclick="addVisualText()">+ 요소 추가</button>';
  }

  /* Step 1: 선택된 요소의 텍스트 편집 */
  h += '<div class="ep-spacing-title">제목 텍스트</div>';
  var activeIdx = window.visualTextActiveIdx !== undefined ? window.visualTextActiveIdx : 0;
  var activeText = texts[activeIdx];
  if (activeText) {  /* sEl 체크 제거 — iframe 로드 여부와 무관하게 폰트 드롭다운 표시 */
    var pcVal = activeText.pcText || '';
    var mVal = activeText.mText || '';
    h += '<div class="ep-field"><label>PC 제목</label><input type="text" value="' + esc(pcVal) + '" oninput="updateVisualText(' + activeIdx + ',\'pc\',this.value)"></div>';
    h += '<div class="ep-field"><label>모바일 제목 (줄바꿈은 &lt;br&gt; 사용)</label><textarea class="ep-textarea" oninput="updateVisualText(' + activeIdx + ',\'m\',this.value)">' + esc(mVal) + '</textarea></div>';

    /* 폰트 선택 */
    var fontFamily = activeText.fontFamily || 'inherit';
    var fontWeight = activeText.fontWeight || '400';
    h += '<div class="ep-field"><label>폰트</label>' +
      '<select id="visual-font-select-' + activeIdx + '" onchange="updateVisualFontStyle(' + activeIdx + ')">' +
        WEBFONTS.map(function(f) { return '<option value="' + f.family + '" ' + (fontFamily === f.family ? 'selected' : '') + '>' + f.name + '</option>'; }).join('') +
      '</select></div>' +
      '<div class="ep-field"><label>굵기</label>' +
      '<select id="visual-weight-select-' + activeIdx + '" onchange="updateVisualFontStyle(' + activeIdx + ')">' +
        (function() {
          var currentFont = WEBFONTS.find(f => f.family === fontFamily) || WEBFONTS[0];
          return currentFont.weights.map(function(w) { return '<option value="' + w + '" ' + (fontWeight === String(w) ? 'selected' : '') + '>' + w + '</option>'; }).join('');
        })() +
      '</select></div>';

    /* Step 3: 여백 설정 */
    h += '<div style="margin-top:12px;padding-top:10px;border-top:1px solid #2e3a52;">' +
      '<div class="ep-spacing-title">여백 (margin)</div>';
    ['Top', 'Bottom', 'Left', 'Right'].forEach(function(dir) {
      var val = activeText['margin' + dir] || '';
      h += '<div class="ep-field" style="display:flex;align-items:center;gap:6px;">' +
        '<label style="width:50px;font-size:10px;">' + dir + '</label>' +
        '<input type="number" style="flex:1;background:#1e293b;border:1px solid #2e3a52;border-radius:4px;color:#e2e8f0;font-size:11px;padding:3px 5px;" value="' + val + '" placeholder="px" oninput="updateVisualElementSpacing(' + activeIdx + ',\'margin' + dir + '\',this.value)">' +
        '<span style="font-size:10px;color:#6b7280;">px</span>' +
      '</div>';
    });
    h += '<div class="ep-spacing-title" style="margin-top:10px;">여백 (padding)</div>';
    ['Top', 'Bottom', 'Left', 'Right'].forEach(function(dir) {
      var val = activeText['padding' + dir] || '';
      h += '<div class="ep-field" style="display:flex;align-items:center;gap:6px;">' +
        '<label style="width:50px;font-size:10px;">' + dir + '</label>' +
        '<input type="number" style="flex:1;background:#1e293b;border:1px solid #2e3a52;border-radius:4px;color:#e2e8f0;font-size:11px;padding:3px 5px;" value="' + val + '" placeholder="px" oninput="updateVisualElementSpacing(' + activeIdx + ',\'padding' + dir + '\',this.value)">' +
        '<span style="font-size:10px;color:#6b7280;">px</span>' +
      '</div>';
    });
    h += '</div>';

    /* 요소 삭제 버튼 */
    if (texts.length > 1) {
      h += '<button class="ep-remove-btn" style="width:100%;background:#7f1d1d;color:#fca5a5;padding:6px;margin-top:8px;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600;" onclick="removeVisualText(' + activeIdx + ')">이 요소 삭제</button>';
    }
  }

  h += buildBgImagePanel('section_visual');
  /* V2: 우측 패널 토글 */
  h += '<div class="ep-row" style="margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #2e3a52;">' +
    '<label style="font-size:11px;">우측 이미지 패널 표시</label>' +
    '<label class="toggle"><input type="checkbox" id="visual-right-chk" ' + (visualRightVisible ? 'checked' : '') + ' onchange="toggleVisualRight(this.checked)"><span class="toggle-slider"></span></label>' +
  '</div>';
  /* V1: 이미지 필드 목록 */
  h += '<div class="ep-spacing-title">비주얼 이미지 교체</div>';

  /* 그룹별 on/off 토글 */
  VISUAL_IMAGE_GROUPS.forEach(function(group, gIdx) {
    var isActive = visualImageToggle[group.groupId];
    h += '<div style="margin-bottom:12px;border:1px solid #334155;border-radius:4px;padding:8px;background:#1e293b;">' +
      '<button style="width:100%;padding:8px;background:' + (isActive ? '#059669' : '#666') + ';color:#fff;border:none;border-radius:4px;cursor:pointer;font-weight:bold;font-size:12px;" ' +
        'onclick="toggleVisualImageGroup(\'' + group.groupId + '\')">' +
        (isActive ? '✓' : '✕') + ' ' + group.label +
      '</button>';

    if (isActive) {
      group.images.forEach(function(imgDef, iIdx) {
        var imgIdx = (gIdx * 10) + iIdx;
        var curSrc = '';
        if (sEl) { var img = sEl.querySelector(imgDef.sel); if (img) curSrc = img.getAttribute('src') || ''; }
        h += '<div class="ep-field" style="margin-top:8px;">' +
          '<label style="font-size:11px;">' + (imgDef.label ? '- ' + imgDef.label : group.label) + '</label>' +
          '<div class="ep-bgimg-row">' +
            '<input type="text" class="ep-bgimg-input" id="vi-url-' + imgIdx + '" value="' + esc(curSrc) + '" placeholder="URL" oninput="updateVisualImage(' + gIdx + ',' + iIdx + ',this.value)">' +
            '<label class="ep-bgimg-upload" title="파일 업로드">📁' +
              '<input type="file" accept="image/*" style="display:none" onchange="onVisualImgFile(this,' + gIdx + ',' + iIdx + ')">' +
            '</label>' +
          '</div>' +
          (curSrc
            ? '<img id="vi-thumb-' + imgIdx + '" class="ep-bgimg-thumb" src="' + esc(curSrc) + '">'
            : '<img id="vi-thumb-' + imgIdx + '" class="ep-bgimg-thumb" style="display:none">') +
        '</div>';
      });
    }
    h += '</div>';
  });
  h += buildSpacingPanel('section_visual');
  return h;
}

/* Step 3: 요소 여백 업데이트 */
function updateVisualElementSpacing(idx, prop, val) {
  var texts = sectionData.section_visual && sectionData.section_visual.mvisual_texts ? sectionData.section_visual.mvisual_texts : [];
  if (!texts[idx]) return;
  texts[idx][prop] = val;
  renderVisualTexts();
  saveState();
}

/* Step 2: 요소 추가 */
window.visualTextActiveIdx = 0;
function addVisualText() {
  var texts = sectionData.section_visual && sectionData.section_visual.mvisual_texts ? sectionData.section_visual.mvisual_texts : [];
  if (!sectionData.section_visual) sectionData.section_visual = {};
  if (!sectionData.section_visual.mvisual_texts) sectionData.section_visual.mvisual_texts = [];

  var newIdx = texts.length;
  sectionData.section_visual.mvisual_texts.push({
    index: newIdx + 1,
    pcText: '새로운 제목 ' + (newIdx + 1),
    pcHtml: '',  /* 포맷팅 포함 HTML */
    mText: '새로운 제목<br>' + (newIdx + 1),
    mHtml: '',   /* 포맷팅 포함 HTML */
    fontFamily: 'inherit',
    fontWeight: '400',
    /* Step 3: 여백 기본값 */
    marginTop: '', marginBottom: '', marginLeft: '', marginRight: '',
    paddingTop: '', paddingBottom: '', paddingLeft: '', paddingRight: ''
  });

  window.visualTextActiveIdx = newIdx;
  renderVisualTexts();
  openEditPanel('section_visual');
  saveState();
}

/* Step 2: 요소 삭제 */
function removeVisualText(idx) {
  var texts = sectionData.section_visual && sectionData.section_visual.mvisual_texts ? sectionData.section_visual.mvisual_texts : [];
  if (texts.length <= 1) {
    alert('최소 1개 요소는 유지해야 합니다.');
    return;
  }
  if (confirm('요소 ' + (idx+1) + '을(를) 삭제하시겠습니까?')) {
    sectionData.section_visual.mvisual_texts.splice(idx, 1);
    if (window.visualTextActiveIdx >= sectionData.section_visual.mvisual_texts.length) {
      window.visualTextActiveIdx = sectionData.section_visual.mvisual_texts.length - 1;
    }
    renderVisualTexts();
    openEditPanel('section_visual');
    saveState();
  }
}

/* Step 2: 요소 탭 전환 */
function switchVisualTextTab(idx) {
  window.visualTextActiveIdx = idx;
  openEditPanel('section_visual');
}

function updateVisualImage(gIdx, iIdx, url) {
  var doc = getPreviewDoc();
  if (!doc) return;
  var sEl = doc.querySelector('[data-builder-section="section_visual"]');
  if (!sEl) return;

  var group = VISUAL_IMAGE_GROUPS[gIdx];
  if (!group || !group.images[iIdx]) return;

  var imgDef = group.images[iIdx];
  var img = sEl.querySelector(imgDef.sel);
  if (!img) return;

  img.src = url;
  _saveExtraPath('section_visual', '_img:', img, url);
  saveState();

  var thumbId = 'vi-thumb-' + (gIdx * 10 + iIdx);
  var thumb = document.getElementById(thumbId);
  if (thumb) { thumb.src = url; thumb.style.display = url ? 'block' : 'none'; }
}

/* 비주얼 이미지 그룹 on/off 토글 */
function toggleVisualImageGroup(groupId) {
  visualImageToggle[groupId] = !visualImageToggle[groupId];
  openEditPanel('section_visual');  /* 패널 새로고침 */
}

/* Step 1-2: 텍스트 업데이트 (인덱스 기반) */
function updateVisualText(idx, type, val) {
  var texts = sectionData.section_visual && sectionData.section_visual.mvisual_texts ? sectionData.section_visual.mvisual_texts : [];
  if (!texts[idx]) return;

  if (type === 'pc') {
    texts[idx].pcText = val;
    texts[idx].pcHtml = '';  /* 좌측 패널 수정 시 HTML 초기화 (포맷팅 리셋) */
  } else if (type === 'm') {
    texts[idx].mText = val;
    texts[idx].mHtml = '';   /* 좌측 패널 수정 시 HTML 초기화 (포맷팅 리셋) */
  }
  renderVisualTexts();
  saveState();
}

/* Step 2: 메인 비주얼 텍스트 렌더링 (iframe) */
function renderVisualTexts() {
  var doc = getPreviewDoc();
  if (!doc) return;
  var container = doc.querySelector('.mvisual-texts-container');
  if (!container) return;

  var texts = sectionData.section_visual && sectionData.section_visual.mvisual_texts ? sectionData.section_visual.mvisual_texts : [];
  container.innerHTML = '';

  texts.forEach(function(textData, i) {
    var div = doc.createElement('div');
    div.className = 'mvisual-text-' + (i+1);
    div.setAttribute('data-text-index', i+1);

    /* Step 3: 여백 적용 */
    if (textData.marginTop) div.style.marginTop = textData.marginTop + 'px';
    if (textData.marginBottom) div.style.marginBottom = textData.marginBottom + 'px';
    if (textData.marginLeft) div.style.marginLeft = textData.marginLeft + 'px';
    if (textData.marginRight) div.style.marginRight = textData.marginRight + 'px';
    if (textData.paddingTop) div.style.paddingTop = textData.paddingTop + 'px';
    if (textData.paddingBottom) div.style.paddingBottom = textData.paddingBottom + 'px';
    if (textData.paddingLeft) div.style.paddingLeft = textData.paddingLeft + 'px';
    if (textData.paddingRight) div.style.paddingRight = textData.paddingRight + 'px';

    var pcDiv = doc.createElement('div');
    pcDiv.className = 'mvisual-text-pc d-xxs-none d-lg-block';
    pcDiv.setAttribute('data-builder-section', 'section_visual');
    pcDiv.setAttribute('data-builder-field', 'mvisual_texts.' + i + '.pcHtml');
    pcDiv.setAttribute('data-builder-prop', 'innerHTML');
    /* 포맷팅이 저장된 HTML이 있으면 사용, 아니면 텍스트 fallback */
    pcDiv.innerHTML = textData.pcHtml || textData.pcText || '';
    if (textData.fontFamily) pcDiv.style.fontFamily = textData.fontFamily;
    if (textData.fontWeight) pcDiv.style.fontWeight = textData.fontWeight;
    /* 편집 모드 중이면 즉시 blur 리스너 attach */
    if (editMode) makeEditable(pcDiv, 'section_visual', 'mvisual_texts.' + i + '.pcHtml', 'innerHTML');

    var mDiv = doc.createElement('div');
    mDiv.className = 'mvisual-text-m d-xxs-block d-lg-none';
    mDiv.setAttribute('data-builder-section', 'section_visual');
    mDiv.setAttribute('data-builder-field', 'mvisual_texts.' + i + '.mHtml');
    mDiv.setAttribute('data-builder-prop', 'innerHTML');
    /* 포맷팅이 저장된 HTML이 있으면 사용, 아니면 텍스트 fallback */
    mDiv.innerHTML = textData.mHtml || textData.mText || '';
    if (textData.fontFamily) mDiv.style.fontFamily = textData.fontFamily;
    if (textData.fontWeight) mDiv.style.fontWeight = textData.fontWeight;
    /* 편집 모드 중이면 즉시 blur 리스너 attach */
    if (editMode) makeEditable(mDiv, 'section_visual', 'mvisual_texts.' + i + '.mHtml', 'innerHTML');

    div.appendChild(pcDiv);
    div.appendChild(mDiv);
    container.appendChild(div);
  });

  /* 편집 모드 CSS 재적용 */
  if (editMode) injectEditModeCSS(doc);
}

/* 폰트 + 굵기 변경 (인덱스 기반) */
function updateVisualFontStyle(idx) {
  var fontSelect = document.getElementById('visual-font-select-' + idx);
  var weightSelect = document.getElementById('visual-weight-select-' + idx);
  if (!fontSelect || !weightSelect) return;

  var fontFamily = fontSelect.value;
  var fontWeight = weightSelect.value;

  var texts = sectionData.section_visual && sectionData.section_visual.mvisual_texts ? sectionData.section_visual.mvisual_texts : [];
  if (!texts[idx]) return;

  texts[idx].fontFamily = fontFamily;
  texts[idx].fontWeight = fontWeight;

  /* weight 드롭다운 동적 업데이트 */
  var currentFont = WEBFONTS.find(f => f.family === fontFamily);
  if (currentFont && weightSelect.innerHTML) {
    weightSelect.innerHTML = currentFont.weights.map(function(w) {
      return '<option value="' + w + '" ' + (fontWeight === String(w) ? 'selected' : '') + '>' + w + '</option>';
    }).join('');
  }

  renderVisualTexts();
  saveState();
}

window.onVisualImgFile = function(input, gIdx, iIdx) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    var dataUrl = ev.target.result;
    var thumbId = 'vi-url-' + (gIdx * 10 + iIdx);
    var urlInput = document.getElementById(thumbId);
    if (urlInput) urlInput.value = dataUrl;
    updateVisualImage(gIdx, iIdx, dataUrl);
  };
  reader.readAsDataURL(file);
};

/* 2-3: 필드 이미지 파일 업로드 */
window.onFieldImgFile = function(input, sectionId, path) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    var dataUrl = ev.target.result;
    var inputId = 'field-' + sectionId + '-' + path.replace(/\./g, '-');
    var urlInput = document.getElementById(inputId);
    if (urlInput) urlInput.value = dataUrl;
    updateField(sectionId, path, dataUrl);
    var thumbId = 'thumb-' + inputId;
    var thumb = document.getElementById(thumbId);
    if (thumb) { thumb.src = dataUrl; thumb.style.display = 'block'; }
  };
  reader.readAsDataURL(file);
};

function toggleVisualRight(val) {
  visualRightVisible = val;
  var doc = getPreviewDoc();
  if (doc) {
    var el = doc.querySelector('[data-builder-section="section_visual"] .main-visual-right');
    if (el) el.style.display = val ? '' : 'none';
  }
  saveState();
}

function applyVisualRightToPreview() {
