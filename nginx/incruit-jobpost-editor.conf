# Nginx 설정 - Incruit Jobpost Editor
# AWS EC2 배포용 (정적파일 + convert-server/cors-proxy 프록시)
geo $is_internal_ip {
    default             0;

    222.106.54.0/24     1;  # IN-Corp VPN
    222.106.59.0/24     1;  # IN-Corp Client
    210.206.88.0/24     1;  # TCC-Corp
    192.168.200.0/24    1;  # 192.168.200 대역
    10.10.0.0/20        1;  # 사내 내부 네트워크
    172.16.199.0/24     1;  # SSL-VPN 사내
    172.20.50.0/24      1;  # SSL-VPN TCC
    172.16.250.0/24     1;  # IDC VPN
    222.111.218.55/32   1;  # 내부 크롤러
    127.0.0.1/32        1;  # Localhost
    121.161.234.220/32  1;  # zeushome
}

server {
    listen 80;
    listen [::]:80;

    server_name ai-studio.incru.it _;

    root /var/www/incruit-jobpost-editor;

    # ============================================
    # 실제 클라이언트 IP 추출 (CloudFront X-Forwarded-For)
    # Security Group에서 CloudFront IP만 허용하므로 0.0.0.0/0 신뢰 가능
    # ============================================
    set_real_ip_from  0.0.0.0/0;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # ============================================
    # 내부 IP 차단
    # ============================================
    if ($is_internal_ip = 0) {
        return 403;
    }

    index index.html;
    charset utf-8;

    access_log /var/log/nginx/incruit-editor-access.log;
    error_log  /var/log/nginx/incruit-editor-error.log warn;

    # ============================================
    # 보안 헤더
    # ============================================
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ============================================
    # 문서변환 API / Playwright 렌더 API → convert-server (Docker :8082)
    # /api/convert, /api/render-kv, /api/render-full, /api/hwp-* 등 모두 포함
    # ============================================
    location /api/ {
        proxy_pass         http://127.0.0.1:8082;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;       # Playwright 캡처/문서 변환 대기
        client_max_body_size 50M;      # 업로드/HTML 본문 크기 제한
    }

    location /api/health {
        proxy_pass http://127.0.0.1:8082/health;
    }

    # ============================================
    # CORS Proxy → cors-proxy (Docker :8787)
    # Anthropic API 중계 (AWS 환경에서 사용)
    # proxy_pass 끝에 슬래시 없음 — 요청 경로(/proxy/...)를 그대로 backend로 전달해
    # cors-proxy.py의 path.startswith('/proxy') 체크가 통과되도록 함.
    # ============================================
    location /proxy/ {
        proxy_pass       http://127.0.0.1:8787;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ============================================
    # 정적 파일 서빙 (기존 유지)
    # ============================================
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Gzip 압축
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript
        application/xml+rss image/svg+xml;
    gzip_min_length 1000;

    # 숨김 파일 차단
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # 성능 최적화
    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;
}